<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Team Leader Dashboard - Kampung Inggris Pontianak</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { display: ['Lexend', 'system-ui', 'sans-serif'] },
          borderRadius: {
            DEFAULT: '1rem',
            lg: '1.25rem',
            xl: '1.5rem',
            '2xl': '1.75rem',
            '3xl': '2rem'
          }
        }
      }
    };
  </script>
  <style>
    :root { --dock-bottom: max(18px, env(safe-area-inset-bottom)); }
    * { -webkit-tap-highlight-color: transparent; transition: background-color 420ms ease, color 420ms ease, border-color 420ms ease, box-shadow 420ms ease, opacity 260ms ease; }
    body { font-family: Lexend, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .fade-in { animation: fadeIn .45s ease both; }
    .slide-up { animation: slideUp .5s ease both; }
    .dock-pop { animation: dockPop .45s cubic-bezier(.2,.9,.2,1.2) both; }
    .modal-pop { animation: modalPop .28s cubic-bezier(.2,.9,.2,1.1) both; }
    .toast-in { animation: toastIn .32s ease both; }
    .theme-switching { pointer-events: none; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes dockPop { from { opacity:0; transform:translateY(20px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes modalPop { from { opacity:0; transform:translateY(18px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastIn { from { opacity:0; transform:translateY(14px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    input, select, textarea { color-scheme: light; }
    .dark input, .dark select, .dark textarea { color-scheme: dark; }
    .glass-light { background: rgba(255,255,255,.74); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .glass-dark { background: rgba(15,23,42,.74); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .dock-glass-light { background: rgba(255,255,255,.78); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); }
    .dock-glass-dark { background: rgba(15,23,42,.80); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); }
    .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, .45); border-radius: 999px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, .7); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24; }
    @media (prefers-reduced-motion: reduce) { *, .fade-in, .slide-up, .dock-pop, .modal-pop, .toast-in { transition: none !important; animation: none !important; } }
  </style>
</head>
<body class="bg-[#020617] text-white">
  <div id="app"></div>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyn-nmRA_GFjwK36-gz3Va7JezQaG-Pe22WnBcL52_3g9QSwNeIk6ys1s5roovrOB0A4A/exec';
    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'team_leader_dashboard_theme';
    const SUPPLY_SETTINGS_KEY = 'team_leader_supply_color_settings';

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const SHIFT_OPTIONS = [
      { value: 'General', label: 'General / All Shifts' },
      { value: 'Shift 1', label: 'Shift 1' },
      { value: 'Shift 2', label: 'Shift 2' },
      { value: 'Shift 3', label: 'Shift 3' }
    ];
    const DEFAULT_SUPPLY_SETTINGS = { lowMax: 50, mediumMin: 51, mediumMax: 100, highMin: 101 };

    const today = new Date();
    const todayString = new Date().toISOString().slice(0, 10);

    const state = {
      theme: localStorage.getItem(THEME_KEY) || 'dark',
      activeMenu: 'dashboard',
      user: null,
      loading: true,
      saving: false,
      accessError: '',
      toast: null,
      confirmDialog: null,
      inputDate: todayString,
      supplyRows: [],
      records: [],
      editingRecord: null,
      editRecordForm: { paperUsed: '', printingUsed: '' },
      recapMonth: today.getMonth() + 1,
      recapYear: today.getFullYear(),
      monthlyRecap: null,
      supplySettings: loadJson(SUPPLY_SETTINGS_KEY, DEFAULT_SUPPLY_SETTINGS),
      filters: { date: '', month: '', year: '' },
      activitySettings: null,
      activitySheetId: '',
      activitySubMenu: 'daily',
      activityBooted: false,
      activityLoading: false,
      activitySyncing: false,
      activityDate: todayString,
      activityShift: 'Shift 1',
      activityRows: [],
      activityNotes: '',
      notesFilters: { date: '', dateFrom: '', dateTo: '', shift: '', limit: 50 },
      loadedNotes: [],
      notesLoaded: false,
      notesLoading: false
    };

    function loadJson(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (_) { return fallback; }
    }

    async function fetchAPI(action, payload = {}) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, payload })
        });
        if (!response.ok) throw new Error('Network response was not ok');
        return await response.json();
      } catch (error) {
        console.error(`API Error (${action}):`, error);
        throw error;
      }
    }

    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch]));
    const num = (value) => Number(value || 0);
    const isDark = () => state.theme === 'dark';
    const token = () => localStorage.getItem(SESSION_KEY);

    function applyTheme() {
      document.documentElement.classList.toggle('dark', isDark());
      document.body.className = isDark() ? 'bg-[#020617] text-white' : 'bg-slate-100 text-slate-950';
      localStorage.setItem(THEME_KEY, state.theme);
    }

    function icon(name, extra = '') {
      const map = {
        dashboard: 'monitoring', chart: 'bar_chart_4_bars', paper: 'description', printer: 'print', check: 'check_circle',
        activity: 'checklist', edit: 'edit_square', database: 'database', settings: 'tune', user: 'person', logout: 'logout',
        sun: 'light_mode', moon: 'dark_mode', layers: 'layers', trash: 'delete', alert: 'warning', spark: 'auto_awesome',
        note: 'notes', sheet: 'table_chart', checklist: 'checklist_rtl', calendar: 'calendar_month', empty: 'inbox', refresh: 'refresh', close: 'close'
      };
      return `<span class="material-symbols-outlined ${extra}">${map[name] || name}</span>`;
    }

    function cardClass() { return isDark() ? 'glass-dark border border-white/10 shadow-2xl shadow-black/20' : 'glass-light border border-white shadow-xl shadow-slate-300/40'; }
    function softBoxClass() { return isDark() ? 'bg-white/5 border border-white/10' : 'bg-slate-950/5 border border-slate-200'; }
    function mutedClass() { return isDark() ? 'text-white/55 text-sm' : 'text-slate-500 text-sm'; }
    function badgeClass() { return isDark() ? 'inline-flex items-center rounded-full bg-white/10 border border-white/10 px-3 py-2 text-xs font-black text-white/80' : 'inline-flex items-center rounded-full bg-slate-950/5 border border-slate-200 px-3 py-2 text-xs font-black text-slate-600'; }
    function inputClass(disabled = false) { return `${isDark() ? 'bg-black/30 border-white/10 text-white placeholder:text-white/25 focus:border-white/40 focus:ring-white/20' : 'bg-white border-slate-200 text-slate-950 placeholder:text-slate-400 focus:border-slate-950/30 focus:ring-slate-950/10'} w-full h-11 rounded-2xl px-4 text-sm outline-none disabled:opacity-60 ${disabled ? 'cursor-not-allowed' : ''}`; }
    function textareaClass() { return `${isDark() ? 'bg-black/30 border-white/10 text-white placeholder:text-white/25 focus:border-white/40 focus:ring-white/20' : 'bg-white border-slate-200 text-slate-950 placeholder:text-slate-400 focus:border-slate-950/30 focus:ring-slate-950/10'} w-full rounded-2xl px-4 py-3 text-sm outline-none`; }
    function primaryButtonClass() { return `${isDark() ? 'bg-white text-slate-950 hover:bg-slate-200' : 'bg-slate-950 text-white hover:bg-slate-800'} h-11 px-5 rounded-2xl font-black text-sm transition active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed`; }
    function secondaryButtonClass() { return `${isDark() ? 'bg-white/10 text-white border-white/10 hover:bg-white/15' : 'bg-white text-slate-950 border-slate-200 hover:bg-slate-50'} h-11 px-5 rounded-2xl border font-black text-sm transition active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed`; }
    function smallButtonClass(active = false) { return active ? primaryButtonClass() : secondaryButtonClass(); }
    function iconButtonClass() { return `${isDark() ? 'bg-white/10 text-white border-white/10 hover:bg-white/15' : 'bg-white text-slate-950 border-slate-200 hover:bg-slate-50'} w-11 h-11 rounded-2xl border inline-flex items-center justify-center`; }

    function field(label, id, value, type='text', placeholder='', disabled=false, oninput='') {
      const handler = oninput ? `oninput="${oninput}"` : '';
      return `<div><label class="${isDark() ? 'block text-sm text-white/60 mb-2' : 'block text-sm text-slate-500 mb-2'}">${esc(label)}</label><input id="${esc(id)}" type="${esc(type)}" value="${esc(value)}" placeholder="${esc(placeholder)}" ${disabled ? 'disabled' : ''} ${handler} class="${inputClass(disabled)}"/></div>`;
    }
    function selectField(label, id, value, options, onchange='') {
      const handler = onchange ? `onchange="${onchange}"` : '';
      return `<div><label class="${isDark() ? 'block text-sm text-white/60 mb-2' : 'block text-sm text-slate-500 mb-2'}">${esc(label)}</label><select id="${esc(id)}" ${handler} class="${inputClass()}">${options.map(o => `<option value="${esc(o.value)}" ${String(o.value)===String(value)?'selected':''}>${esc(o.label)}</option>`).join('')}</select></div>`;
    }

    function showToast(type, text) {
      state.toast = { type, text };
      render();
      setTimeout(() => { state.toast = null; render(); }, 3400);
    }
    const showSuccess = (text) => showToast('success', text);
    const showError = (text) => showToast('error', text);

    function openConfirm(config) {
      state.confirmDialog = {
        title: config.title || 'Are you sure?',
        message: config.message || 'This action needs confirmation.',
        confirmText: config.confirmText || 'Confirm',
        cancelText: config.cancelText || 'Cancel',
        tone: config.tone || 'danger',
        action: config.action
      };
      render();
    }
    function closeConfirm() { state.confirmDialog = null; render(); }
    function confirmAction() { const action = state.confirmDialog?.action; closeConfirm(); if (action && Actions[action]) Actions[action](); }

    async function boot() {
      state.loading = true; state.accessError = ''; render();
      try {
        if (!token()) return redirectToLogin();
        const sessionResponse = await fetchAPI('getUserSession', { token: token() });
        if (!sessionResponse.success) { localStorage.removeItem(SESSION_KEY); return redirectToLogin(); }
        if (sessionResponse.user.role !== 'Team Leader') { state.accessError = 'Akses ditolak. Halaman ini hanya untuk Team Leader.'; state.loading = false; return render(); }
        state.user = sessionResponse.user;
        await Promise.all([loadSupplyMatrix(token(), state.inputDate, true), loadRecords(token(), null, true), loadMonthlyRecap(token(), state.recapMonth, state.recapYear, true), loadMasterActivityTasks(token())]);
      } catch (err) { state.accessError = 'Gagal memuat Team Leader Dashboard.'; }
      finally { state.loading = false; render(); }
    }
    function redirectToLogin() { window.location.href = 'index.html'; }

    async function loadMasterActivityTasks(t) {
      try {
        const response = await fetchAPI('getTeamLeaderActivityTasks', { token: t, filters: { includeInactive: false } });
        if (response.success) localStorage.setItem('gas_master_activity_tasks', JSON.stringify(response.data || []));
      } catch (err) { console.warn('Failed to cache master tasks', err); }
    }
    async function loadSupplyMatrix(t = token(), dateParam = state.inputDate, silent=false) {
      const response = await fetchAPI('getDailySupplyInputMatrix', { token: t, date: dateParam });
      if (response.success) state.supplyRows = response.data || []; else showError(response.message || 'Gagal memuat matrix supplies.');
      if (!silent) render();
    }
    async function loadRecords(t = token(), customFilters = null, silent=false) {
      const response = await fetchAPI('getDailySupplies', { token: t, filters: customFilters || state.filters });
      if (response.success) state.records = response.data || []; else showError(response.message || 'Gagal memuat records supplies.');
      if (!silent) render();
    }
    async function loadMonthlyRecap(t = token(), month = state.recapMonth, year = state.recapYear, silent=false) {
      const response = await fetchAPI('getMonthlySuppliesRecap', { token: t, month: Number(month), year: Number(year) });
      if (response.success) state.monthlyRecap = response.data; else showError(response.message || 'Gagal memuat monthly supplies recap.');
      if (!silent) render();
    }

    function setMenu(menu) {
      state.activeMenu = menu;
      render();
      if (menu === 'activity' && state.user && !state.activityBooted) bootActivity();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function toggleTheme() { document.body.classList.add('theme-switching'); state.theme = isDark() ? 'light' : 'dark'; applyTheme(); render(); setTimeout(() => document.body.classList.remove('theme-switching'), 450); }

    async function changeInputDate(value) { state.inputDate = value; render(); await loadSupplyMatrix(token(), value); }
    function updateSupplyValue(index, field, value) {
      const row = state.supplyRows[index]; if (!row) return;
      row[field] = value;
      row.isEdited = String(row.paperUsed || '') !== String(row.originalPaperUsed || '') || String(row.printingUsed || '') !== String(row.originalPrintingUsed || '');
      const preview = $(`supply-preview-${index}`); if (preview) { preview.outerHTML = supplyPreviewSpan(row, index); }
      const status = $(`supply-status-${index}`); if (status) status.outerHTML = statusPill(row.isSaved, row.isEdited, `supply-status-${index}`);
    }
    function confirmSaveSupply() {
      const rowsToSave = state.supplyRows.filter(r => r.paperUsed !== '' && r.paperUsed != null || r.printingUsed !== '' && r.printingUsed != null);
      if (!rowsToSave.length) return showError('Belum ada data paper/printing yang diisi.');
      openConfirm({ title:'Save all supplies?', message:'Data supplies per inventory item akan disimpan. Jika item di tanggal yang sama sudah ada, sistem akan update tanpa duplicate.', confirmText:'Save All', tone:'success', action:'saveSupplyBulk' });
    }
    async function saveSupplyBulk() {
      state.saving = true; render();
      try {
        const rowsToSave = state.supplyRows.filter(r => r.paperUsed !== '' && r.paperUsed != null || r.printingUsed !== '' && r.printingUsed != null);
        const response = await fetchAPI('saveDailySuppliesBulk', { token: token(), date: state.inputDate, rows: rowsToSave });
        if (!response.success) return showError(response.message || 'Gagal menyimpan supplies.');
        await Promise.all([loadSupplyMatrix(token(), state.inputDate, true), loadRecords(token(), null, true), loadMonthlyRecap(token(), state.recapMonth, state.recapYear, true)]);
        showSuccess(response.message || 'Supplies berhasil disimpan.');
      } catch (err) { showError('Terjadi error saat menyimpan supplies.'); }
      finally { state.saving = false; render(); }
    }
    function requestDeleteSupply(id) { state.pendingDeleteSupplyId = id; openConfirm({ title:'Delete supply record?', message:'Data paper dan printing inventory item ini akan dihapus. Aksi ini tidak bisa dibatalkan.', confirmText:'Delete', tone:'danger', action:'deleteSupply' }); }
    async function deleteSupply() {
      state.saving = true; render();
      try {
        const response = await fetchAPI('deleteDailySupply', { token: token(), id: state.pendingDeleteSupplyId });
        if (!response.success) return showError(response.message || 'Gagal menghapus supplies.');
        await Promise.all([loadSupplyMatrix(token(), state.inputDate, true), loadRecords(token(), null, true), loadMonthlyRecap(token(), state.recapMonth, state.recapYear, true)]);
        showSuccess(response.message || 'Supplies berhasil dihapus.');
      } catch (err) { showError('Terjadi error saat menghapus supplies.'); }
      finally { state.saving = false; state.pendingDeleteSupplyId = null; render(); }
    }
    function openEditRecord(index) { const item = state.records[index]; state.editingRecord = item; state.editRecordForm = { paperUsed: item?.['Paper Used'] || 0, printingUsed: item?.['Printing Used'] || 0 }; render(); }
    function closeEditRecord() { state.editingRecord = null; render(); }
    async function submitEditRecord() {
      state.editRecordForm.paperUsed = $('editPaperUsed')?.value || '';
      state.editRecordForm.printingUsed = $('editPrintingUsed')?.value || '';
      state.saving = true; render();
      try {
        const response = await fetchAPI('updateDailySupply', { token: token(), id: state.editingRecord.ID, payload: state.editRecordForm });
        if (!response.success) return showError(response.message || 'Gagal update record.');
        state.editingRecord = null;
        await Promise.all([loadRecords(token(), null, true), loadSupplyMatrix(token(), state.inputDate, true), loadMonthlyRecap(token(), state.recapMonth, state.recapYear, true)]);
        showSuccess(response.message || 'Record berhasil diupdate.');
      } catch (err) { showError('Terjadi error saat update record.'); }
      finally { state.saving = false; render(); }
    }
    async function applyFilters() { state.filters = { date: $('filterDate')?.value || '', month: $('filterMonth')?.value || '', year: $('filterYear')?.value || '' }; await loadRecords(token(), state.filters); }
    async function clearFilters() { state.filters = { date:'', month:'', year:'' }; await loadRecords(token(), state.filters); }
    async function changeRecapMonth(value) { state.recapMonth = Number(value); render(); await loadMonthlyRecap(token(), state.recapMonth, state.recapYear); }
    async function changeRecapYear(value) { state.recapYear = Number(value); render(); await loadMonthlyRecap(token(), state.recapMonth, state.recapYear); }
    function saveSettingsFromForm() {
      const clean = { lowMax: Number($('lowMax')?.value), mediumMin: Number($('mediumMin')?.value), mediumMax: Number($('mediumMax')?.value), highMin: Number($('highMin')?.value) };
      if (Object.values(clean).some(Number.isNaN)) return showError('Settings harus berupa angka.');
      state.supplySettings = clean; localStorage.setItem(SUPPLY_SETTINGS_KEY, JSON.stringify(clean)); showSuccess('Settings warna supplies berhasil disimpan.'); render();
    }
    function resetSettings() { state.supplySettings = { ...DEFAULT_SUPPLY_SETTINGS }; localStorage.setItem(SUPPLY_SETTINGS_KEY, JSON.stringify(state.supplySettings)); showSuccess('Settings dikembalikan ke default.'); render(); }

    async function bootActivity() {
      state.activityLoading = true; render();
      try {
        const response = await fetchAPI('getTeamLeaderActivitySettings', { token: token() });
        if (!response.success) return showError(response.message || 'Gagal memuat activity settings.');
        state.activitySettings = response.data || null;
        state.activitySheetId = response.data ? response.data['Activity Sheet ID'] || '' : '';
        state.activityBooted = true;
        if (state.activitySettings && state.activitySheetId) await loadActivityMatrix(token(), state.activityDate, state.activityShift, true);
      } catch (err) { showError('Terjadi error saat memuat Activity Tracker.'); }
      finally { state.activityLoading = false; render(); }
    }
    async function saveActivitySheet() {
      state.activitySheetId = $('activitySheetId')?.value || state.activitySheetId;
      if (!state.activitySheetId.trim()) return showError('Activity Sheet ID wajib diisi.');
      state.saving = true; render();
      try {
        const response = await fetchAPI('saveTeamLeaderActivitySheetId', { token: token(), sheetId: state.activitySheetId });
        if (!response.success) return showError(response.message || 'Gagal menyimpan Activity Sheet ID.');
        state.activitySettings = response.data || null;
        state.activitySheetId = response.data ? response.data['Activity Sheet ID'] || state.activitySheetId : state.activitySheetId;
        state.activityBooted = true;
        await loadActivityMatrix(token(), state.activityDate, state.activityShift, true);
        showSuccess(response.message || 'Activity Sheet berhasil disiapkan.');
      } catch (err) { showError('Terjadi error saat setup Activity Sheet.'); }
      finally { state.saving = false; render(); }
    }
    async function loadActivityMatrix(t = token(), date = state.activityDate, shift = state.activityShift, silent=false) {
      if (!shift) return showError('Shift wajib dipilih.');
      const cacheKey = `activity_matrix_${date}_${shift}`;
      const cachedData = localStorage.getItem(cacheKey);
      const masterTasksStr = localStorage.getItem('gas_master_activity_tasks');
      let background = false;
      if (cachedData) {
        const parsed = loadRawJson(cachedData, {}); state.activityRows = parsed.rows || []; state.activityNotes = parsed.notes || ''; background = true;
      } else if (masterTasksStr) {
        const masterTasks = loadRawJson(masterTasksStr, []);
        state.activityRows = masterTasks.filter(task => {
          const taskShift = String(task.Shift || '').trim().toLowerCase(); const target = shift.trim().toLowerCase();
          return !target || !taskShift || taskShift === target || taskShift.includes('all') || taskShift.includes('general');
        }).map(task => ({ taskId: task.ID, existingCheckId:'', isSaved:false, isDone:false, originalIsDone:false, shift, taskName:task['Task Name'], description:task.Description, sortOrder:task['Sort Order'] }));
        state.activityNotes = ''; background = true;
      }
      state.activitySyncing = background; state.activityLoading = !background; if (!silent) render();
      try {
        const response = await fetchAPI('getTeamLeaderActivityMatrix', { token: t, date, shift });
        if (response.success) {
          state.activityRows = response.data || []; state.activityNotes = response.notes || '';
          localStorage.setItem(cacheKey, JSON.stringify({ rows: response.data || [], notes: response.notes || '' }));
        } else if (!background) { state.activityRows = []; state.activityNotes = ''; showError(response.message || 'Gagal memuat activity checklist.'); }
      } catch (err) { if (!background) showError('Terjadi error saat memuat checklist activity.'); }
      finally { state.activityLoading = false; state.activitySyncing = false; render(); }
    }
    function loadRawJson(str, fallback) { try { return JSON.parse(str) || fallback; } catch (_) { return fallback; } }
    async function changeActivityDate(value) { state.activityDate = value; render(); if (state.activitySettings) await loadActivityMatrix(token(), value, state.activityShift); }
    async function changeActivityShift(value) { state.activityShift = value; render(); if (state.activitySettings) await loadActivityMatrix(token(), state.activityDate, value); }
    function updateActivityCheck(index, checked) { const row = state.activityRows[index]; if (!row) return; row.isDone = checked; row.isEdited = checked !== row.originalIsDone; const status = $(`activity-status-${index}`); if (status) status.outerHTML = statusPill(row.isSaved, row.isEdited, `activity-status-${index}`); updateActivityProgress(); }
    function updateActivityProgress() { const total = state.activityRows.length; const done = state.activityRows.filter(r => r.isDone).length; const text = $('activityProgressText'); const bar = $('activityProgressBar'); if (text) text.textContent = `${done} dari ${total} task selesai.`; if (bar) bar.style.width = total ? `${(done / total) * 100}%` : '0%'; }
    function confirmSaveActivity() {
      state.activityNotes = $('activityNotes')?.value || state.activityNotes;
      if (!state.activitySettings) return showError('Setup Activity Sheet terlebih dahulu.');
      if (!state.activityRows.length) return showError('Belum ada task activity untuk shift ini.');
      if (!state.activityNotes.trim()) return showError('Daily notes wajib diisi.');
      openConfirm({ title:'Save daily activity?', message:'Checklist dan notes untuk tanggal serta shift ini akan disimpan atau diupdate tanpa duplicate.', confirmText:'Save Activity', tone:'success', action:'saveDailyActivity' });
    }
    async function saveDailyActivity() {

        await loadActivityMatrix(token(), state.activityDate, state.activityShift, true);
        showSuccess(response.message || 'Daily activity berhasil disimpan.');

    async function loadActivityNotes() {

        const response = await fetchAPI('getTeamLeaderActivityNotes', { token: token(), filters: state.notesFilters });

      const savedToday = state.supplyRows.filter(row => row.isSaved).length;
      const activityDone = state.activityRows.filter(row => row.isDone).length;
      return { totalPaper, totalPrinting, totalRecords: state.records.length, savedToday, activityDone, activityTotal: state.activityRows.length };

    function activitySetupCard() { return `<section class="${cardClass()} rounded-3xl p-5 sm:p-6"><div class="grid grid-cols-1 lg:grid-cols-[1fr_420px] gap-6 items-start"><div><div class="flex items-center gap-3 mb-5">${icon('sheet','text-[34px]')}<div><h2 class="text-xl font-black">Activity Sheet Setup</h2><p class="${mutedClass()}">Simpan Activity Tracker di spreadsheet pribadi Team Leader agar data harian tetap ringan dan cepat.</p></div></div><div class="${softBoxClass()} rounded-2xl p-4"><p class="text-sm font-bold mb-2">Required access</p><p class="${mutedClass()}">Pastikan spreadsheet yang dimasukkan bisa diakses oleh script/web app. Sistem akan membuat sheet ActivityChecks dan ActivityNotes otomatis.</p></div>${state.activitySettings ? `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4">${infoBox('Username',state.activitySettings.Username)}${infoBox('Branch',state.activitySettings.Branch)}${infoBox('Status',state.activitySettings.Status)}${infoBox('Updated At',state.activitySettings['Updated At'])}</div>` : ''}</div><div class="${softBoxClass()} rounded-3xl p-5">${field('Activity Sheet ID / URL','activitySheetId',state.activitySheetId,'text','Paste Sheet ID or Google Sheet URL')}<button onclick="saveActivitySheet()" ${state.saving?'disabled':''} class="${primaryButtonClass()} mt-5 w-full">${state.saving?'Setting Up...':state.activitySettings?'Update Activity Sheet':'Save & Setup Activity Sheet'}</button></div></div></section>`; }
    function activityDailyView() { const done = state.activityRows.filter(r=>r.isDone).length; return `<section class="grid grid-cols-1 xl:grid-cols-[370px_1fr] gap-6"><div class="${cardClass()} rounded-3xl p-5 sm:p-6 h-fit"><div class="flex items-center gap-3 mb-5">${icon('checklist','text-[30px]')}<div><h2 class="text-lg font-black">Daily Shift Checklist</h2><p class="${mutedClass()}">Notes wajib diisi setiap hari.</p></div></div><div class="grid grid-cols-1 gap-4">${field('Activity Date','activityDate',state.activityDate,'date','','false',"changeActivityDate(this.value)")}${selectField('Shift','activityShift',state.activityShift,SHIFT_OPTIONS,"changeActivityShift(this.value)")}</div><div class="${softBoxClass()} rounded-2xl p-4 mt-5"><p class="text-sm font-bold mb-2">Progress</p><p id="activityProgressText" class="${mutedClass()}">${done} dari ${state.activityRows.length} task selesai.</p><div class="${isDark() ? 'mt-3 h-3 rounded-full bg-white/10' : 'mt-3 h-3 rounded-full bg-slate-200'} overflow-hidden"><div id="activityProgressBar" class="h-full bg-emerald-500 rounded-full" style="width:${state.activityRows.length ? (done/state.activityRows.length)*100 : 0}%"></div></div></div><button onclick="loadActivityMatrix()" ${state.activityLoading||state.activitySyncing?'disabled':''} class="${secondaryButtonClass()} w-full mt-5">${state.activityLoading?'Loading...':state.activitySyncing?'Syncing...':'Refresh Checklist'}</button><button onclick="confirmSaveActivity()" ${state.saving||state.activityLoading||state.activitySyncing?'disabled':''} class="${primaryButtonClass()} mt-3 w-full">${state.saving?'Saving...':'Save Daily Activity'}</button></div><div class="${cardClass()} rounded-3xl p-5 sm:p-6 overflow-hidden"><div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5"><div><h2 class="text-lg font-black">Checklist Items</h2><p class="${mutedClass()}">Task aktif untuk shift yang dipilih.</p></div><span class="${badgeClass()}">${state.activityRows.length} Tasks</span></div>${state.activityRows.length ? `<div class="max-h-[44vh] overflow-y-auto custom-scroll pr-1 space-y-3 mb-5">${state.activityRows.map((row,i)=>`<label class="${softBoxClass()} rounded-2xl p-4 flex items-start gap-4 cursor-pointer"><input type="checkbox" ${row.isDone?'checked':''} onchange="updateActivityCheck(${i}, this.checked)" class="mt-1 w-5 h-5 rounded accent-emerald-500"><div class="flex-1"><div class="flex flex-wrap items-center gap-2 mb-1"><p class="font-black">${esc(row.taskName)}</p>${statusPill(row.isSaved,row.isEdited,`activity-status-${i}`)}</div><p class="${mutedClass()}">${esc(row.description || 'No description.')}</p></div></label>`).join('')}</div>` : emptyState('Belum ada task aktif untuk shift ini yang disiapkan oleh Management.')}<div><label class="${isDark() ? 'block text-sm text-white/60 mb-2' : 'block text-sm text-slate-500 mb-2'}">Daily Notes *</label><textarea id="activityNotes" rows="6" oninput="state.activityNotes=this.value" placeholder="Tulis catatan shift hari ini. Wajib diisi agar TL berikutnya bisa memahami kondisi terakhir." class="${textareaClass()}">${esc(state.activityNotes)}</textarea></div></div></section>`; }
    function activityNotesView() { return `<section class="${cardClass()} rounded-3xl p-5 sm:p-6 overflow-hidden"><div class="flex items-center gap-3 mb-5">${icon('note','text-[30px]')}<div><h2 class="text-lg font-black">Notes Viewer</h2><p class="${mutedClass()}">Notes tidak diload otomatis. Klik Load Notes agar data besar tidak membebani dashboard.</p></div></div><div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-5">${field('Exact Date','notesExactDate',state.notesFilters.date,'date')}${field('Date From','notesDateFrom',state.notesFilters.dateFrom,'date')}${field('Date To','notesDateTo',state.notesFilters.dateTo,'date')}${selectField('Shift','notesShift',state.notesFilters.shift,[{value:'',label:'All Shift'},...SHIFT_OPTIONS])}${field('Limit','notesLimit',state.notesFilters.limit,'number')}</div><div class="flex flex-col sm:flex-row gap-3 mb-5"><button onclick="loadActivityNotes()" ${state.notesLoading?'disabled':''} class="${primaryButtonClass()}">${state.notesLoading?'Loading Notes...':'Load Notes'}</button><button onclick="clearLoadedNotes()" class="${secondaryButtonClass()}">Clear Loaded Notes</button></div>${!state.notesLoaded ? emptyState('Notes belum dimuat. Gunakan tombol Load Notes untuk mengambil data.') : responsiveTable(['Date','Shift','Notes','Updated At'], state.loadedNotes.map(item=>[esc(item.Date),esc(item.Shift),`<div class="max-w-xl whitespace-normal leading-relaxed">${esc(item.Notes)}</div>`,esc(item['Updated At'])]), 'Tidak ada notes sesuai filter.')}</section>`; }

    function settingsView() { const s = state.supplySettings; return `<section class="grid grid-cols-1 lg:grid-cols-[430px_1fr] gap-6 slide-up"><div class="${cardClass()} rounded-3xl p-5 sm:p-6 h-fit"><div class="flex items-center gap-3 mb-5">${icon('settings','text-[30px]')}<div><h2 class="text-lg font-black">Supply Color Settings</h2><p class="${mutedClass()}">Atur batas warna paper + printing.</p></div></div><div class="space-y-4">${field('Merah jika ≤','lowMax',s.lowMax,'number')}${field('Kuning mulai dari','mediumMin',s.mediumMin,'number')}${field('Kuning sampai','mediumMax',s.mediumMax,'number')}${field('Hijau jika ≥','highMin',s.highMin,'number')}<div class="flex gap-3"><button onclick="saveSettingsFromForm()" class="${primaryButtonClass()}">Save Settings</button><button onclick="resetSettings()" class="${secondaryButtonClass()}">Reset</button></div></div></div><div class="${cardClass()} rounded-3xl p-5 sm:p-6"><h2 class="text-lg font-black mb-5">Preview</h2><div class="grid grid-cols-1 sm:grid-cols-3 gap-3"><div class="rounded-3xl border p-5 bg-red-500/15 text-red-500 border-red-500/20"><p class="text-sm font-black">≤ ${esc(s.lowMax)}</p><h3 class="text-4xl font-black mt-2">30</h3></div><div class="rounded-3xl border p-5 bg-amber-500/15 text-amber-500 border-amber-500/20"><p class="text-sm font-black">${esc(s.mediumMin)} - ${esc(s.mediumMax)}</p><h3 class="text-4xl font-black mt-2">75</h3></div><div class="rounded-3xl border p-5 bg-emerald-500/15 text-emerald-500 border-emerald-500/20"><p class="text-sm font-black">≥ ${esc(s.highMin)}</p><h3 class="text-4xl font-black mt-2">120</h3></div></div><div class="${softBoxClass()} rounded-2xl p-4 mt-5"><p class="text-sm font-bold mb-2">Default rules</p><p class="${mutedClass()}">Default: ≤50 merah, 51–100 kuning, ≥101 hijau. Warna dihitung dari total Paper + Printing per inventory item.</p></div></div></section>`; }
    function profileView() { const u = state.user || {}; return `<section class="${cardClass()} rounded-3xl p-6 slide-up max-w-2xl"><div class="flex items-center gap-4 mb-6"><div class="${isDark() ? 'w-16 h-16 rounded-3xl bg-white text-slate-950' : 'w-16 h-16 rounded-3xl bg-slate-950 text-white'} flex items-center justify-center">${icon('user','text-[34px]')}</div><div><h2 class="text-xl font-black">${esc(u.username)}</h2><p class="${mutedClass()}">${esc(u.role)} • ${esc(u.branch)}</p></div></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${infoBox('Username',u.username)}${infoBox('Role',u.role)}${infoBox('Branch',u.branch)}${infoBox('Login Time',u.loginTime)}</div></section>`; }

    function responsiveTable(headers, rows, emptyText) { if (!rows.length) return emptyState(emptyText); return `<div class="overflow-hidden rounded-2xl"><div class="overflow-auto custom-scroll" style="max-height:62vh"><table class="w-full min-w-[780px] text-sm"><thead class="${isDark() ? 'sticky top-0 z-10 bg-slate-900/95 backdrop-blur-xl' : 'sticky top-0 z-10 bg-white/95 backdrop-blur-xl'}"><tr class="${isDark() ? 'text-left text-white/45 border-b border-white/10' : 'text-left text-slate-500 border-b border-slate-200'}">${headers.map(h=>`<th class="py-3 pr-4 font-bold first:pl-1">${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr class="${isDark() ? 'border-b border-white/5' : 'border-b border-slate-100'}">${row.map(cell=>`<td class="py-3 pr-4 first:pl-1">${cell || '-'}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`; }
    function statusPill(isSaved, isEdited, id='') { let text='New', cls='bg-blue-500/15 text-blue-500 border-blue-500/20'; if (isSaved && isEdited) { text='Edited'; cls='bg-amber-500/15 text-amber-500 border-amber-500/20'; } else if (isSaved) { text='Saved'; cls='bg-emerald-500/15 text-emerald-500 border-emerald-500/20'; } return `<span ${id?`id="${esc(id)}"`:''} class="inline-flex h-8 items-center px-3 rounded-full border text-xs font-black ${cls}">${text}</span>`; }
    function supplyLegend() { const s=state.supplySettings; return `<div class="flex flex-wrap gap-2 text-xs font-black"><span class="px-3 py-2 rounded-full bg-red-500/15 text-red-500 border border-red-500/20">≤ ${esc(s.lowMax)}</span><span class="px-3 py-2 rounded-full bg-amber-500/15 text-amber-500 border border-amber-500/20">${esc(s.mediumMin)}-${esc(s.mediumMax)}</span><span class="px-3 py-2 rounded-full bg-emerald-500/15 text-emerald-500 border border-emerald-500/20">≥ ${esc(s.highMin)}</span></div>`; }
    function emptyState(text) { return `<div class="${softBoxClass()} rounded-3xl p-8 text-center"><div class="mx-auto w-14 h-14 rounded-3xl flex items-center justify-center mb-4 bg-slate-500/10">${icon('empty','opacity-60 text-[30px]')}</div><p class="${mutedClass()}">${esc(text)}</p></div>`; }
    function infoBox(label,value) { return `<div class="${softBoxClass()} rounded-2xl p-4"><p class="${mutedClass()}">${esc(label)}</p><p class="font-black mt-1">${esc(value || '-')}</p></div>`; }
    function getSupplyColorClass(value, type) { if (value === '' || value == null || Number.isNaN(Number(value))) return type === 'bar' ? 'w-full rounded-t-xl bg-slate-400/20' : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black'; const n = Number(value); const s = state.supplySettings; if (n <= Number(s.lowMax)) return type === 'bar' ? 'w-full rounded-t-xl bg-red-500/70' : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-red-500/15 text-red-500 border border-red-500/20 font-black'; if (n >= Number(s.mediumMin) && n <= Number(s.mediumMax)) return type === 'bar' ? 'w-full rounded-t-xl bg-amber-500/70' : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-amber-500/15 text-amber-500 border border-amber-500/20 font-black'; if (n >= Number(s.highMin)) return type === 'bar' ? 'w-full rounded-t-xl bg-emerald-500/70' : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-emerald-500/15 text-emerald-500 border border-emerald-500/20 font-black'; return type === 'bar' ? 'w-full rounded-t-xl bg-slate-400/40' : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black'; }
    function toastView() { if (!state.toast) return ''; const success = state.toast.type === 'success'; const cls = success ? (isDark() ? 'bg-emerald-500/15 text-emerald-100 border-emerald-400/20' : 'bg-emerald-50 text-emerald-700 border-emerald-200') : (isDark() ? 'bg-red-500/15 text-red-100 border-red-400/20' : 'bg-red-50 text-red-700 border-red-200'); return `<div class="fixed left-4 right-4 bottom-32 z-50 flex justify-center pointer-events-none"><div class="toast-in pointer-events-auto max-w-md w-full rounded-3xl border px-4 py-4 shadow-2xl backdrop-blur-xl ${cls}"><div class="flex items-start gap-3"><div class="mt-0.5">${icon(success?'check':'alert')}</div><p class="text-sm font-bold leading-relaxed">${esc(state.toast.text)}</p></div></div></div>`; }
    function confirmDialogView() { const d = state.confirmDialog; if (!d) return ''; const danger = d.tone === 'danger', success = d.tone === 'success'; const iconCls = danger ? 'bg-red-500/15 text-red-500 border-red-500/20' : success ? 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20' : isDark() ? 'bg-white/10 text-white border-white/10' : 'bg-slate-950/5 text-slate-950 border-slate-200'; const confirmCls = danger ? 'bg-red-500 text-white hover:bg-red-600' : success ? 'bg-emerald-500 text-white hover:bg-emerald-600' : isDark() ? 'bg-white text-slate-950 hover:bg-slate-200' : 'bg-slate-950 text-white hover:bg-slate-800'; return `<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6"><div onclick="closeConfirm()" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div><div class="${cardClass()} relative w-full max-w-md rounded-[2rem] p-6 modal-pop"><div class="w-14 h-14 rounded-3xl border flex items-center justify-center mb-5 ${iconCls}">${icon(danger?'trash':success?'check':'spark','text-[30px]')}</div><h3 class="text-xl font-black mb-2">${esc(d.title)}</h3><p class="${mutedClass()} leading-relaxed mb-6">${esc(d.message)}</p><div class="flex gap-3"><button onclick="closeConfirm()" class="${secondaryButtonClass()} flex-1">${esc(d.cancelText)}</button><button onclick="confirmAction()" class="h-11 px-5 rounded-2xl font-black transition active:scale-[0.98] flex-1 ${confirmCls}">${esc(d.confirmText)}</button></div></div></div>`; }
    function recordEditModal() { const r = state.editingRecord; if (!r) return ''; return `<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6"><div onclick="closeEditRecord()" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div><div class="${cardClass()} relative w-full max-w-md rounded-[2rem] p-6 modal-pop"><div class="flex items-center justify-between mb-5"><h3 class="text-xl font-black">Edit Record</h3><button onclick="closeEditRecord()" class="${iconButtonClass()} !w-8 !h-8 !rounded-xl">${icon('close','text-[18px]')}</button></div><div class="mb-5"><p class="font-black text-lg">${esc(r['Trainer Name'])}</p><p class="${mutedClass()}">${esc(r['Jam/Section'])} • ${esc(r.Level)}</p><p class="${mutedClass()} mt-1 font-semibold">${esc(r.Date)}</p></div><div class="space-y-4"><div class="grid grid-cols-2 gap-3">${field('Paper Used','editPaperUsed',state.editRecordForm.paperUsed,'number')}${field('Printing Used','editPrintingUsed',state.editRecordForm.printingUsed,'number')}</div><div class="flex gap-3 mt-4"><button onclick="closeEditRecord()" class="${secondaryButtonClass()} flex-1">Cancel</button><button onclick="submitEditRecord()" ${state.saving?'disabled':''} class="${primaryButtonClass()} flex-1">${state.saving?'Saving...':'Save'}</button></div></div></div></div>`; }

    window.addEventListener('DOMContentLoaded', () => { applyTheme(); render(); boot(); });
  </script>
</body>
</html>
