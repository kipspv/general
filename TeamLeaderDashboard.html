<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Team Leader Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root { --dock-bottom: max(18px, env(safe-area-inset-bottom)); }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .fade-in { animation: fadeIn 0.35s ease both; }
    .slide-up { animation: slideUp 0.38s ease both; }
    .dock-pop { animation: dockPop 0.35s cubic-bezier(.2,.9,.2,1.2) both; }
    .modal-pop { animation: modalPop 0.24s cubic-bezier(.2,.9,.2,1.1) both; }
    .toast-in { animation: toastIn 0.26s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dockPop {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(14px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    input, select, textarea { color-scheme: light; }
    .dark input, .dark select, .dark textarea { color-scheme: dark; }

    .glass-light {
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-dark {
      background: rgba(15,23,42,.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .dock-glass-light {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .dock-glass-dark {
      background: rgba(15,23,42,.84);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scroll::-webkit-scrollbar-track { background: transparent; }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, .45);
      border-radius: 999px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, .7); }

    @media (prefers-reduced-motion: reduce) {
      *, .fade-in, .slide-up, .dock-pop, .modal-pop, .toast-in {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyNngZ57fzkW_GcM6nAxwKoEGL-oIwkK7_URfXVmAF8XIdunWx792jGQWYNXnfkxyYiMQ/exec';
    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'team_leader_dashboard_theme';
    const SUPPLY_SETTINGS_KEY = 'team_leader_supply_color_settings';

    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const SHIFT_OPTIONS = [
      { value: 'General', label: 'General / All Shifts' },
      { value: 'Shift 1', label: 'Shift 1' },
      { value: 'Shift 2', label: 'Shift 2' },
      { value: 'Shift 3', label: 'Shift 3' }
    ];

    const DEFAULT_SUPPLY_SETTINGS = {
      lowMax: 50,
      mediumMin: 51,
      mediumMax: 100,
      highMin: 101
    };

    const TODAY = new Date().toISOString().slice(0, 10);

    const state = {
      loading: true,
      saving: false,
      theme: safeGet(THEME_KEY) || 'dark',
      activeMenu: 'dashboard',
      user: null,
      accessError: '',
      toast: null,
      confirmDialog: null,
      confirmAction: null,

      inputDate: TODAY,
      supplyRows: [],
      records: [],
      editingRecord: null,
      editRecordForm: { paperUsed: '', printingUsed: '' },

      recapMonth: new Date().getMonth() + 1,
      recapYear: new Date().getFullYear(),
      monthlyRecap: null,

      supplySettings: loadSupplySettings(),

      filters: { date: '', month: '', year: '' },

      activitySettings: null,
      activitySheetId: '',
      activitySubMenu: 'daily',
      activityBooted: false,
      activityLoading: false,
      activitySyncing: false,
      activityDate: TODAY,
      activityShift: 'Shift 1',
      activityRows: [],
      activityNotes: '',
      notesFilters: {
        date: '',
        dateFrom: '',
        dateTo: '',
        shift: '',
        limit: 50
      },
      loadedNotes: [],
      notesLoaded: false,
      notesLoading: false
    };

    const root = document.getElementById('root');

    async function apiCall(action, data = {}) {
      if (!GAS_API_URL || GAS_API_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS API URL belum diisi.');
      }

      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action,
          ...data
        })
      });

      if (!response.ok) {
        throw new Error('HTTP error ' + response.status);
      }

      return response.json();
    }

    function safeGet(key) {
      try { return localStorage.getItem(key); } catch (error) { return ''; }
    }

    function safeSet(key, value) {
      try { localStorage.setItem(key, value); } catch (error) {}
    }

    function safeRemove(key) {
      try { localStorage.removeItem(key); } catch (error) {}
    }

    function loadSupplySettings() {
      try {
        const saved = safeGet(SUPPLY_SETTINGS_KEY);
        return saved ? JSON.parse(saved) : Object.assign({}, DEFAULT_SUPPLY_SETTINGS);
      } catch (error) {
        return Object.assign({}, DEFAULT_SUPPLY_SETTINGS);
      }
    }

    function saveSupplySettings() {
      safeSet(SUPPLY_SETTINGS_KEY, JSON.stringify(state.supplySettings));
    }

    function isDark() {
      return state.theme === 'dark';
    }

    function esc(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function redirectToLogin() {
      window.location.href = 'Index.html';
    }

    function pageClass() {
      return isDark()
        ? 'dark min-h-screen bg-[#020617] text-white'
        : 'min-h-screen bg-slate-100 text-slate-950';
    }

    function cardClass() {
      return isDark()
        ? 'glass-dark border border-white/10 shadow-2xl shadow-black/20'
        : 'glass-light border border-white shadow-xl shadow-slate-300/40';
    }

    function softBoxClass() {
      return isDark()
        ? 'bg-white/5 border border-white/10'
        : 'bg-slate-950/5 border border-slate-200';
    }

    function mutedClass() {
      return isDark()
        ? 'text-sm text-white/50'
        : 'text-sm text-slate-500';
    }

    function badgeClass() {
      return isDark()
        ? 'inline-flex h-9 items-center px-4 rounded-full bg-white/10 border border-white/10 text-white/80 text-sm font-black'
        : 'inline-flex h-9 items-center px-4 rounded-full bg-slate-950/5 border border-slate-200 text-slate-700 text-sm font-black';
    }

    function inputClass(disabled) {
      if (disabled) {
        return isDark()
          ? 'w-full h-11 rounded-2xl bg-white/5 border border-white/10 text-white/40 px-4 outline-none cursor-not-allowed'
          : 'w-full h-11 rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 px-4 outline-none cursor-not-allowed';
      }

      return isDark()
        ? 'w-full h-11 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 outline-none focus:ring-2 focus:ring-white/30'
        : 'w-full h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 outline-none focus:ring-2 focus:ring-slate-300';
    }

    function textareaClass(disabled) {
      if (disabled) {
        return isDark()
          ? 'w-full rounded-2xl bg-white/5 border border-white/10 text-white/40 px-4 py-3 outline-none cursor-not-allowed resize-none'
          : 'w-full rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 px-4 py-3 outline-none cursor-not-allowed resize-none';
      }

      return isDark()
        ? 'w-full rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 py-3 outline-none focus:ring-2 focus:ring-white/30 resize-none'
        : 'w-full rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 py-3 outline-none focus:ring-2 focus:ring-slate-300 resize-none';
    }

    function primaryButtonClass() {
      return isDark()
        ? 'w-full h-11 rounded-2xl bg-white text-slate-950 font-black hover:bg-slate-200 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed'
        : 'w-full h-11 rounded-2xl bg-slate-950 text-white font-black hover:bg-slate-800 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed';
    }

    function secondaryButtonClass() {
      return isDark()
        ? 'h-11 px-4 rounded-2xl bg-white/10 border border-white/10 text-white font-black hover:bg-white/15 disabled:opacity-60 disabled:cursor-not-allowed'
        : 'h-11 px-4 rounded-2xl bg-white border border-slate-200 text-slate-700 font-black hover:bg-slate-50 disabled:opacity-60 disabled:cursor-not-allowed';
    }

    function iconButtonClass() {
      return isDark()
        ? 'w-11 h-11 rounded-2xl bg-white/10 border border-white/10 text-white hover:bg-white/15 flex items-center justify-center'
        : 'w-11 h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 hover:bg-slate-50 flex items-center justify-center';
    }

    function smallButtonClass(active) {
      if (active) {
        return isDark()
          ? 'h-10 px-4 rounded-2xl bg-white text-slate-950 text-sm font-black'
          : 'h-10 px-4 rounded-2xl bg-slate-950 text-white text-sm font-black';
      }

      return isDark()
        ? 'h-10 px-4 rounded-2xl bg-white/10 border border-white/10 text-white/75 text-sm font-black hover:bg-white/15'
        : 'h-10 px-4 rounded-2xl bg-white border border-slate-200 text-slate-600 text-sm font-black hover:bg-slate-50';
    }

    function icon(name, cls) {
      const className = cls || 'w-5 h-5';

      const icons = {
        chart:
          '<path d="M3 3v18h18" />' +
          '<path d="M7 16V9" />' +
          '<path d="M12 16V5" />' +
          '<path d="M17 16v-3" />',
        layers:
          '<path d="M12 3 3 8l9 5 9-5-9-5Z" />' +
          '<path d="m3 13 9 5 9-5" />' +
          '<path d="m3 18 9 5 9-5" />',
        paper:
          '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />' +
          '<path d="M14 2v6h6" />' +
          '<path d="M8 13h8" />' +
          '<path d="M8 17h6" />',
        printer:
          '<path d="M6 9V2h12v7" />' +
          '<path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />' +
          '<path d="M6 14h12v8H6z" />',
        edit:
          '<path d="M12 20h9" />' +
          '<path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" />',
        database:
          '<ellipse cx="12" cy="5" rx="8" ry="3" />' +
          '<path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5" />' +
          '<path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />',
        settings:
          '<path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />' +
          '<path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 7.03 3.84l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.18.36.5.72 1 .9.33.12.7.1 1.1.1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" />',
        user:
          '<path d="M20 21a8 8 0 0 0-16 0" />' +
          '<circle cx="12" cy="7" r="4" />',
        check: '<path d="m20 6-11 11-5-5" />',
        alert:
          '<path d="M12 9v4" />' +
          '<path d="M12 17h.01" />' +
          '<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />',
        trash:
          '<path d="M3 6h18" />' +
          '<path d="M8 6V4h8v2" />' +
          '<path d="M19 6l-1 14H6L5 6" />' +
          '<path d="M10 11v6" />' +
          '<path d="M14 11v6" />',
        sun:
          '<circle cx="12" cy="12" r="4" />' +
          '<path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />',
        moon: '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />',
        logout:
          '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />' +
          '<path d="M16 17l5-5-5-5" />' +
          '<path d="M21 12H9" />',
        spark: '<path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z" />',
        empty:
          '<path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />' +
          '<path d="M3.3 7 12 12l8.7-5" />' +
          '<path d="M12 22V12" />',
        activity: '<path d="M22 12h-4l-3 8-6-16-3 8H2" />',
        checklist:
          '<path d="M9 11l2 2 4-4" />' +
          '<path d="M21 12a9 9 0 1 1-9-9" />',
        note:
          '<path d="M4 4h16v16H4z" />' +
          '<path d="M8 8h8" />' +
          '<path d="M8 12h8" />' +
          '<path d="M8 16h5" />',
        sheet:
          '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />' +
          '<path d="M14 2v6h6" />' +
          '<path d="M8 13h8" />' +
          '<path d="M8 17h8" />',
        x:
          '<path d="M18 6 6 18" />' +
          '<path d="m6 6 12 12" />'
      };

      return (
        '<svg class="' + className + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
          (icons[name] || icons.spark) +
        '</svg>'
      );
    }

    function getSupplyColorClass(value, type) {
      const settings = state.supplySettings;

      if (value === '' || value === null || value === undefined) {
        return type === 'bar'
          ? 'rounded-t-xl bg-slate-400/20'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      const number = Number(value);

      if (isNaN(number)) {
        return 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      if (number <= Number(settings.lowMax)) {
        return type === 'bar'
          ? 'rounded-t-xl bg-red-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-red-500/15 text-red-500 border border-red-500/20 font-black';
      }

      if (number >= Number(settings.mediumMin) && number <= Number(settings.mediumMax)) {
        return type === 'bar'
          ? 'rounded-t-xl bg-amber-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-amber-500/15 text-amber-500 border border-amber-500/20 font-black';
      }

      if (number >= Number(settings.highMin)) {
        return type === 'bar'
          ? 'rounded-t-xl bg-emerald-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-emerald-500/15 text-emerald-500 border border-emerald-500/20 font-black';
      }

      return type === 'bar'
        ? 'rounded-t-xl bg-slate-400/40'
        : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
    }

    function render() {
      document.documentElement.classList.toggle('dark', isDark());

      if (state.loading) {
        root.innerHTML = renderLoading();
        return;
      }

      if (state.accessError && !state.user) {
        root.innerHTML = renderAccessError();
        return;
      }

      root.innerHTML = renderApp();
    }

    function renderLoading() {
      return `
        <div class="${pageClass()}">
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="text-center fade-in">
              <div class="w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4 ${isDark() ? 'border-white/20 border-t-white' : 'border-slate-300 border-t-slate-950'}"></div>
              <p class="${isDark() ? 'text-white/70 text-sm' : 'text-slate-500 text-sm'}">Loading Team Leader Dashboard...</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderAccessError() {
      return `
        <div class="${pageClass()}">
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="${cardClass()} max-w-md w-full rounded-3xl p-6 text-center">
              <h1 class="text-xl font-black mb-2">Access Error</h1>
              <p class="text-red-500 text-sm mb-5">${esc(state.accessError)}</p>
              <button data-action="logout" class="${primaryButtonClass()}">Back to Login</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      const stats = calculateStats();

      return `
        <div class="${pageClass()}">
          ${renderBackgroundGlow()}

          <div class="relative min-h-screen pb-32">
            ${renderHeader()}

            <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
              <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 slide-up">
                ${renderStatCard('Paper Used', stats.totalPaper, 'paper')}
                ${renderStatCard('Printing Used', stats.totalPrinting, 'printer')}
                ${renderStatCard('Saved Today', stats.savedToday, 'check')}
                ${renderStatCard('Activity Done', stats.activityDone + '/' + stats.activityTotal, 'activity')}
              </section>

              ${state.activeMenu === 'dashboard' ? renderDashboardView() : ''}
              ${state.activeMenu === 'input' ? renderInputView() : ''}
              ${state.activeMenu === 'records' ? renderRecordsView() : ''}
              ${state.activeMenu === 'activity' ? renderActivityView() : ''}
              ${state.activeMenu === 'settings' ? renderSettingsView() : ''}
              ${state.activeMenu === 'profile' ? renderProfileView() : ''}
            </main>

            ${renderDock()}
            ${renderToast()}
            ${renderConfirmDialog()}
            ${renderEditRecordModal()}
          </div>
        </div>
      `;
    }

    function renderHeader() {
      const user = state.user || {};

      return `
        <header class="${isDark() ? 'sticky top-0 z-30 bg-[#020617]/80 backdrop-blur-xl border-b border-white/10' : 'sticky top-0 z-30 bg-slate-100/80 backdrop-blur-xl border-b border-slate-200'}">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between gap-4">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <div class="${isDark() ? 'w-9 h-9 rounded-2xl bg-white text-slate-950 flex items-center justify-center' : 'w-9 h-9 rounded-2xl bg-slate-950 text-white flex items-center justify-center'}">
                    ${icon('spark', 'w-5 h-5')}
                  </div>
                  <h1 class="text-xl sm:text-2xl font-black">Team Leader Dashboard</h1>
                </div>
                <p class="${mutedClass()}">${esc(user.username)} • ${esc(user.role)} • ${esc(user.branch)}</p>
              </div>

              <div class="flex items-center gap-2">
                <button data-action="toggle-theme" class="${iconButtonClass()}" title="Toggle theme">
                  ${icon(state.theme === 'dark' ? 'sun' : 'moon', 'w-5 h-5')}
                </button>

                <button data-action="confirm-logout" class="${iconButtonClass()}" title="Logout">
                  ${icon('logout', 'w-5 h-5')}
                </button>
              </div>
            </div>
          </div>
        </header>
      `;
    }

    function renderStatCard(label, value, iconName) {
      return `
        <div class="${cardClass()} rounded-3xl p-4 sm:p-5">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="${mutedClass()}">${esc(label)}</p>

    function renderDashboardView() {
      const recap = state.monthlyRecap || {};
      const summary = recap.summary || {};
      const classes = recap.classes || [];
      const dailyTotals = recap.dailyTotals || [];
      const daysInMonth = recap.daysInMonth || 31;

      const maxPaper = Math.max.apply(null, dailyTotals.map(function(item) {
        return Number(item.paperTotal || 0);
      }).concat([1]));

      const maxPrinting = Math.max.apply(null, dailyTotals.map(function(item) {
        return Number(item.printingTotal || 0);
      }).concat([1]));

      let monthOptions = '';
      MONTH_NAMES.forEach(function(name, index) {
        const value = index + 1;
        monthOptions += `<option value="${value}" ${Number(state.recapMonth) === value ? 'selected' : ''}>${name}</option>`;
      });

      let chartBars = '';
      dailyTotals.forEach(function(item) {
        const paperHeight = Math.max(8, (Number(item.paperTotal || 0) / maxPaper) * 210);
        const printingHeight = Math.max(8, (Number(item.printingTotal || 0) / maxPrinting) * 210);

        chartBars += `
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="text-[10px] font-black opacity-70">${esc(item.paperTotal)}/${esc(item.printingTotal)}</div>
            <div class="flex items-end gap-1 h-[220px]">
              <div title="Paper Used" class="${getSupplyColorClass(Number(item.paperTotal || 0), 'bar')}" style="height:${paperHeight}px;width:10px"></div>
              <div title="Printing Used" class="rounded-t-xl bg-blue-500/70" style="height:${printingHeight}px;width:10px"></div>
            </div>
            <div class="text-[10px] opacity-60">${esc(item.day)}</div>
          </div>
        `;
      });

      let dayHeaders = '';
      for (let i = 1; i <= daysInMonth; i++) {
        dayHeaders += `<th class="py-3 px-2 text-center min-w-[58px]">${i}</th>`;
      }

      let itemRows = '';
      classes.forEach(function(row) {
        let cells = '';

        (row.days || []).forEach(function(day) {
          const total = Number(day.paperUsed || 0) + Number(day.printingUsed || 0);
          const valueText = day.paperUsed === '' && day.printingUsed === ''
            ? '-'
            : (day.paperUsed || 0) + '/' + (day.printingUsed || 0);

          cells += `
            <td class="py-2 px-2 text-center">
              <span class="${getSupplyColorClass(total, 'cell')}">${esc(valueText)}</span>
            </td>
          `;
        });

        itemRows += `
          <tr class="${isDark() ? 'border-b border-white/5' : 'border-b border-slate-100'}">
            <td class="${isDark() ? 'sticky left-0 z-10 py-3 pr-4 bg-slate-900/95' : 'sticky left-0 z-10 py-3 pr-4 bg-white/95'}">
              <p class="font-black">${esc(row.trainerName)}</p>
              <p class="opacity-55">${esc(row.jamSection)} • ${esc(row.level)}</p>
            </td>
            ${cells}
            <td class="py-3 px-3 text-center font-black">${esc(row.totalPaper)}/${esc(row.totalPrinting)}</td>
          </tr>
        `;
      });

      return `
        <section class="space-y-6 slide-up">
          <div class="${cardClass()} rounded-3xl p-5 sm:p-6">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <div class="flex items-center gap-3">
                ${icon('chart', 'w-8 h-8')}

                  <h2 class="text-xl font-black">Supplies Dashboard</h2>
                  <p class="${mutedClass()}">Monthly recap supplies per inventory item.</p>
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3 w-full lg:w-auto">
                <div>
                  <label class="${isDark() ? 'block text-sm text-white/60 mb-2' : 'block text-sm text-slate-500 mb-2'}">Month</label>
                  <select data-change="recap-month" class="${inputClass()}">${monthOptions}</select>
                </div>

                <div>
                  <label class="${isDark() ? 'block text-sm text-white/60 mb-2' : 'block text-sm text-slate-500 mb-2'}">Year</label>
                  <input data-change="recap-year" type="number" value="${esc(state.recapYear)}" class="${inputClass()}">
                </div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
            ${renderStatCard('Total Paper', summary.totalPaper || 0, 'paper')}
            ${renderStatCard('Total Printing', summary.totalPrinting || 0, 'printer')}
            ${renderStatCard('Active Items', summary.activeClassCount || 0, 'layers')}
            ${renderStatCard('Filled Records', summary.filledRecords || 0, 'database')}
          </div>

          <div class="${cardClass()} rounded-3xl p-5 sm:p-6">
            <div class="flex items-center justify-between gap-3 mb-5">

            </div>

            <div class="overflow-x-auto custom-scroll pb-2">

            </div>

            <div class="mt-4 flex flex-wrap gap-2 text-xs font-black">
              <span class="px-3 py-2 rounded-full bg-emerald-500/15 text-emerald-500 border border-emerald-500/20">Paper</span>

                    </tr>
                  </thead>
                  <tbody>${itemRows}</tbody>
                </table>
              </div>
            `}
          </div>
        </section>
      `;
    }

      return `

      `;

    function calculateStats() {
      const totalPaper = state.records.reduce(function(sum, item) {
        return sum + Number(item['Paper Used'] || 0);
      }, 0);

      const totalPrinting = state.records.reduce(function(sum, item) {
        return sum + Number(item['Printing Used'] || 0);
      }, 0);

      const savedToday = state.supplyRows.filter(function(row) {
        return row.isSaved;
      }).length;

      const activityDone = state.activityRows.filter(function(row) {
        return row.isDone;
      }).length;

      return {
        totalPaper: totalPaper,
        totalPrinting: totalPrinting,
        totalRecords: state.records.length,
        savedToday: savedToday,
        activityDone: activityDone,
        activityTotal: state.activityRows.length
      };
    }

    function showToast(type, text) {
      state.toast = { type: type, text: text };
      render();

      setTimeout(function() {
        state.toast = null;
        render();
      }, 3200);
    }

    function showSuccess(text) {
      showToast('success', text);
    }

    function showError(text) {
      showToast('error', text);
    }

    function openConfirm(config) {
      state.confirmAction = config.onConfirm;
      state.confirmDialog = {
        title: config.title || 'Are you sure?',
        message: config.message || 'This action needs confirmation.',
        confirmText: config.confirmText || 'Confirm',
        cancelText: config.cancelText || 'Cancel',
        tone: config.tone || 'danger'
      };
      render();
    }

    function closeConfirm() {
      state.confirmAction = null;
      state.confirmDialog = null;
      render();
    }

    async function boot() {
      state.loading = true;
      state.accessError = '';
      render();

      try {
        const token = safeGet(SESSION_KEY);

        if (!token) {
          redirectToLogin();
          return;
        }

        const sessionResponse = await apiCall('getUserSession', { token });

        if (!sessionResponse || !sessionResponse.success) {
          safeRemove(SESSION_KEY);
          redirectToLogin();
          return;
        }

        if (!sessionResponse.user || sessionResponse.user.role !== 'Team Leader') {
          state.accessError = 'Akses ditolak. Halaman ini hanya untuk Team Leader.';
          state.loading = false;
          render();
          return;
        }

        state.user = sessionResponse.user;

        await Promise.all([
          loadSupplyMatrix(token, state.inputDate, false),
          loadRecords(token, null, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false),
          loadMasterActivityTasks(token)
        ]);

      } catch (error) {
        console.error(error);
        state.accessError = error && error.message ? error.message : 'Gagal memuat Team Leader Dashboard.';
      } finally {
        state.loading = false;
        render();
      }
    }

    async function loadMasterActivityTasks(token) {
      try {
        const response = await apiCall('getTeamLeaderActivityTasks', {
          token,
          filters: JSON.stringify({ includeInactive: false })
        });

        if (response && response.success) {
          safeSet('gas_master_activity_tasks', JSON.stringify(response.data || []));
        }
      } catch (error) {
        console.warn('Failed to cache master tasks', error);
      }
    }

    async function loadSupplyMatrix(tokenParam, dateParam, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getDailySupplyInputMatrix', {
        token,
        date: dateParam || state.inputDate
      });

      if (response && response.success) {
        state.supplyRows = (response.data || []).map(function(row) {
          row.isEdited = false;
          return row;
        });
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat matrix supplies.');
      }

      if (shouldRender !== false) render();
    }

    async function loadRecords(tokenParam, customFilters, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getDailySupplies', {
        token,
        filters: JSON.stringify(customFilters || state.filters)
      });

      if (response && response.success) {
        state.records = response.data || [];
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat records supplies.');
      }

      if (shouldRender !== false) render();
    }

    async function loadMonthlyRecap(tokenParam, monthParam, yearParam, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getMonthlySuppliesRecap', {
        token,
        month: Number(monthParam),
        year: Number(yearParam)
      });

      if (response && response.success) {
        state.monthlyRecap = response.data;
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat monthly supplies recap.');
      }

      if (shouldRender !== false) render();
    }

    async function changeInputDate(value) {
      state.inputDate = value;
      render();

      try {
        await loadSupplyMatrix(null, value, true);
      } catch (error) {
        showError('Gagal memuat matrix supplies.');
      }
    }

    function updateSupplyInput(index, field, value) {
      const row = state.supplyRows[index];
      if (!row) return;

      row[field] = value;

      row.isEdited =
        String(row.paperUsed || '') !== String(row.originalPaperUsed || '') ||
        String(row.printingUsed || '') !== String(row.originalPrintingUsed || '');

      const total = Number(row.paperUsed || 0) + Number(row.printingUsed || 0);
      const preview = (row.paperUsed || 0) + '/' + (row.printingUsed || 0);

      document.querySelectorAll('[data-supply-preview-index="' + index + '"]').forEach(function(el) {
        el.className = getSupplyColorClass(total, 'cell');
        el.textContent = preview;
      });

      document.querySelectorAll('[data-supply-status-index="' + index + '"]').forEach(function(el) {
        el.innerHTML = renderStatusPill(row.isSaved, row.isEdited);
      });
    }

    function confirmSaveSupply() {
      const rowsToSave = state.supplyRows.filter(function(row) {
        const hasPaper = row.paperUsed !== '' && row.paperUsed !== null && row.paperUsed !== undefined;
        const hasPrinting = row.printingUsed !== '' && row.printingUsed !== null && row.printingUsed !== undefined;
        return hasPaper || hasPrinting;
      });

      if (!rowsToSave.length) {
        showError('Belum ada data paper/printing yang diisi.');
        return;
      }

      openConfirm({
        title: 'Save all supplies?',
        message: 'Data supplies per inventory item akan disimpan. Jika item di tanggal yang sama sudah ada, sistem akan update tanpa duplicate.',
        confirmText: 'Save All',
        tone: 'success',
        onConfirm: saveSupplyBulk
      });
    }

    async function saveSupplyBulk() {
      closeConfirm();

      const rowsToSave = state.supplyRows.filter(function(row) {
        const hasPaper = row.paperUsed !== '' && row.paperUsed !== null && row.paperUsed !== undefined;
        const hasPrinting = row.printingUsed !== '' && row.printingUsed !== null && row.printingUsed !== undefined;
        return hasPaper || hasPrinting;
      });

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('saveDailySuppliesBulk', {
          token,
          date: state.inputDate,
          rows: JSON.stringify(rowsToSave)
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menyimpan supplies.');
          return;
        }

        await Promise.all([
          loadSupplyMatrix(token, state.inputDate, false),
          loadRecords(token, null, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Supplies berhasil disimpan.');

      } catch (error) {
        showError('Terjadi error saat menyimpan supplies.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function requestDeleteSupply(id) {
      openConfirm({
        title: 'Delete supply record?',
        message: 'Data paper dan printing inventory item ini akan dihapus. Aksi ini tidak bisa dibatalkan.',
        confirmText: 'Delete',
        tone: 'danger',
        onConfirm: function() {
          deleteSupply(id);
        }
      });
    }

    async function deleteSupply(id) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('deleteDailySupply', {
          token,
          id
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menghapus supplies.');
          return;
        }

        await Promise.all([
          loadSupplyMatrix(token, state.inputDate, false),
          loadRecords(token, null, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Supplies berhasil dihapus.');

      } catch (error) {
        showError('Terjadi error saat menghapus supplies.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function openEditRecord(index) {
      const item = state.records[index];
      if (!item) return;

      state.editingRecord = item;
      state.editRecordForm = {
        paperUsed: item['Paper Used'] || 0,
        printingUsed: item['Printing Used'] || 0
      };

      render();
    }

    async function submitEditRecord(event) {
      event.preventDefault();

      if (!state.editingRecord) return;

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const payload = {
          paperUsed: state.editRecordForm.paperUsed,
          printingUsed: state.editRecordForm.printingUsed
        };

        const response = await apiCall('updateDailySupply', {
          token,
          id: state.editingRecord.ID,
          payload: JSON.stringify(payload)
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal update record.');
          return;
        }

        state.editingRecord = null;

        await Promise.all([
          loadRecords(token, null, false),
          loadSupplyMatrix(token, state.inputDate, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Record berhasil diupdate.');

      } catch (error) {
        showError('Terjadi error saat update record.');
      } finally {
        state.saving = false;
        render();
      }
    }

    async function applyFilters() {
      try {
        await loadRecords(null, state.filters, true);
      } catch (error) {
        showError('Gagal menerapkan filter.');
      }
    }

    async function clearFilters() {
      state.filters = { date: '', month: '', year: '' };
      render();

      try {
        await loadRecords(null, state.filters, true);
      } catch (error) {
        showError('Gagal membersihkan filter.');
      }
    }

    async function changeRecapMonth(value) {
      state.recapMonth = Number(value);
      render();

      try {
        await loadMonthlyRecap(null, state.recapMonth, state.recapYear, true);
      } catch (error) {
        showError('Gagal memuat monthly supplies recap.');
      }
    }

    async function changeRecapYear(value) {
      state.recapYear = Number(value);
      render();

      try {
        await loadMonthlyRecap(null, state.recapMonth, state.recapYear, true);
      } catch (error) {
        showError('Gagal memuat monthly supplies recap.');
      }
    }

    async function bootActivity() {
      if (state.activityBooted) return;

      state.activityLoading = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('getTeamLeaderActivitySettings', { token });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal memuat activity settings.');
          return;
        }

        state.activitySettings = response.data || null;
        state.activitySheetId = response.data ? response.data['Activity Sheet ID'] || '' : '';
        state.activityBooted = true;

        if (response.data && response.data['Activity Sheet ID']) {
          await loadActivityMatrix(token, state.activityDate, state.activityShift, false);
        }

      } catch (error) {
        showError('Terjadi error saat memuat Activity Tracker.');
      } finally {
        state.activityLoading = false;
        render();
      }
    }

    async function saveActivitySheet() {
      if (!String(state.activitySheetId || '').trim()) {
        showError('Activity Sheet ID wajib diisi.');
        return;
      }

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('saveTeamLeaderActivitySheetId', {
          token,
          sheetId: state.activitySheetId
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menyimpan Activity Sheet ID.');
          return;
        }

        state.activitySettings = response.data || null;
        state.activitySheetId = response.data ? response.data['Activity Sheet ID'] || '' : state.activitySheetId;
        state.activityBooted = true;

        await loadActivityMatrix(token, state.activityDate, state.activityShift, false);

        showSuccess(response.message || 'Activity Sheet berhasil disiapkan.');

      } catch (error) {
        showError('Terjadi error saat setup Activity Sheet.');
      } finally {
        state.saving = false;
        render();
      }
    }

    async function loadActivityMatrix(tokenParam, dateParam, shiftParam, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const cleanDate = dateParam || state.activityDate;
      const cleanShift = shiftParam || state.activityShift;

      if (!cleanShift) {
        showError('Shift wajib dipilih.');
        return;
      }

      const cacheKey = 'activity_matrix_' + cleanDate + '_' + cleanShift;
      const cachedData = safeGet(cacheKey);
      const masterTasksStr = safeGet('gas_master_activity_tasks');

      let isBackgroundSync = false;

      if (cachedData) {
        try {
          const parsed = JSON.parse(cachedData);
          state.activityRows = parsed.rows || [];
          state.activityNotes = parsed.notes || '';
          isBackgroundSync = true;
        } catch (error) {}
      } else if (masterTasksStr) {
        try {
          const masterTasks = JSON.parse(masterTasksStr);
          const filteredTasks = masterTasks.filter(function(t) {
            const taskShift = String(t.Shift || '').trim().toLowerCase();
            const targetShift = cleanShift.trim().toLowerCase();
            return !targetShift || !taskShift || taskShift === targetShift || taskShift.includes('all') || taskShift.includes('general');
          });

          state.activityRows = filteredTasks.map(function(t) {
            return {
              taskId: t.ID,
              existingCheckId: '',
              isSaved: false,
              isDone: false,
              originalIsDone: false,
              shift: cleanShift,
              taskName: t['Task Name'],
              description: t.Description,
              sortOrder: t['Sort Order']
            };
          });

          state.activityNotes = '';
          isBackgroundSync = true;
        } catch (error) {}
      }

      if (isBackgroundSync) {
        state.activitySyncing = true;
      } else {
        state.activityLoading = true;
      }

      if (shouldRender !== false) render();

      try {
        const response = await apiCall('getTeamLeaderActivityMatrix', {
          token,
          date: cleanDate,
          shift: cleanShift
        });

        if (response && response.success) {
          state.activityRows = (response.data || []).map(function(row) {
            row.isEdited = false;
            return row;
          });
          state.activityNotes = response.notes || '';

          safeSet(cacheKey, JSON.stringify({
            rows: response.data || [],
            notes: response.notes || ''
          }));
        } else if (!isBackgroundSync) {
          state.activityRows = [];
          state.activityNotes = '';
          showError(response && response.message ? response.message : 'Gagal memuat activity checklist.');
        }

      } catch (error) {
        if (!isBackgroundSync) {
          showError('Terjadi error saat memuat checklist activity.');
        }
      } finally {
        state.activityLoading = false;
        state.activitySyncing = false;
        if (shouldRender !== false) render();
      }
    }

    async function changeActivityDate(value) {
      state.activityDate = value;
      render();

      if (state.activitySettings) {
        await loadActivityMatrix(null, value, state.activityShift, true);
      }
    }

    async function changeActivityShift(value) {
      state.activityShift = value;
      render();

      if (state.activitySettings) {
        await loadActivityMatrix(null, state.activityDate, value, true);
      }
    }

    function updateActivityCheck(index, checked) {
      const row = state.activityRows[index];
      if (!row) return;

      row.isDone = checked;
      row.isEdited = checked !== row.originalIsDone;

      document.querySelectorAll('[data-activity-status-index="' + index + '"]').forEach(function(el) {
        el.innerHTML = renderStatusPill(row.isSaved, row.isEdited);
      });

      const doneCount = state.activityRows.filter(function(item) { return item.isDone; }).length;
      const doneEl = document.querySelector('[data-activity-done-count]');
      const progressEl = document.querySelector('[data-activity-progress]');

      if (doneEl) doneEl.textContent = doneCount;
      if (progressEl) {
        progressEl.style.width = state.activityRows.length ? ((doneCount / state.activityRows.length) * 100) + '%' : '0%';
      }
    }

    function confirmSaveActivity() {
      if (!state.activitySettings) {
        showError('Setup Activity Sheet terlebih dahulu.');
        return;
      }

      if (!state.activityRows.length) {
        showError('Belum ada task activity untuk shift ini.');
        return;
      }

      if (!String(state.activityNotes || '').trim()) {
        showError('Daily notes wajib diisi.');
        return;
      }

      openConfirm({
        title: 'Save daily activity?',
        message: 'Checklist dan notes untuk tanggal serta shift ini akan disimpan atau diupdate tanpa duplicate.',
        confirmText: 'Save Activity',
        tone: 'success',
        onConfirm: saveDailyActivity
      });
    }

    async function saveDailyActivity() {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('saveTeamLeaderDailyActivity', {
          token,
          date: state.activityDate,
          shift: state.activityShift,
          rows: JSON.stringify(state.activityRows),
          notes: state.activityNotes
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menyimpan daily activity.');
          return;
        }

        const cacheKey = 'activity_matrix_' + state.activityDate + '_' + state.activityShift;

        safeSet(cacheKey, JSON.stringify({
          rows: state.activityRows.map(function(r) {
            return Object.assign({}, r, {
              isSaved: true,
              originalIsDone: r.isDone,
              isEdited: false
            });
          }),
          notes: state.activityNotes
        }));

        await loadActivityMatrix(token, state.activityDate, state.activityShift, false);
        showSuccess(response.message || 'Daily activity berhasil disimpan.');

      } catch (error) {
        showError('Terjadi error saat menyimpan daily activity.');
      } finally {
        state.saving = false;
        render();
      }
    }

    async function loadActivityNotes() {
      if (!state.activitySettings) {
        showError('Setup Activity Sheet terlebih dahulu.');
        return;
      }

      state.notesLoading = true;
      state.notesLoaded = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('getTeamLeaderActivityNotes', {
          token,
          filters: JSON.stringify(state.notesFilters)
        });

        if (response && response.success) {
          state.loadedNotes = response.data || [];
        } else {
          state.loadedNotes = [];
          showError(response && response.message ? response.message : 'Gagal memuat notes.');
        }

      } catch (error) {
        showError('Terjadi error saat memuat notes.');
      } finally {
        state.notesLoading = false;
        render();
      }
    }

    function clearLoadedNotes() {
      state.loadedNotes = [];
      state.notesLoaded = false;
      render();
    }

    function saveSettings(event) {
      event.preventDefault();

      const clean = {
        lowMax: Number(getSettingValue('lowMax')),
        mediumMin: Number(getSettingValue('mediumMin')),
        mediumMax: Number(getSettingValue('mediumMax')),
        highMin: Number(getSettingValue('highMin'))
      };

      if (
        isNaN(clean.lowMax) ||
        isNaN(clean.mediumMin) ||
        isNaN(clean.mediumMax) ||
        isNaN(clean.highMin)
      ) {
        showError('Semua settings harus berupa angka.');
        return;
      }

      state.supplySettings = clean;
      saveSupplySettings();
      showSuccess('Settings warna supplies berhasil disimpan.');
      render();
    }

    function getSettingValue(key) {
      const el = root.querySelector('[data-setting-field="' + key + '"]');
      return el ? el.value : '';
    }

    function resetSettings() {
      state.supplySettings = Object.assign({}, DEFAULT_SUPPLY_SETTINGS);
      saveSupplySettings();
      showSuccess('Settings dikembalikan ke default.');
      render();
    }

    function requestLogout() {
      openConfirm({
        title: 'Logout from dashboard?',
        message: 'Session kamu akan diakhiri dan kamu akan kembali ke halaman login.',
        confirmText: 'Logout',
        tone: 'neutral',
        onConfirm: handleLogout
      });
    }

    async function handleLogout() {
      closeConfirm();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('logoutUser', { token });

        safeRemove(SESSION_KEY);

        if (response && response.redirectUrl) {
          window.location.href = response.redirectUrl;
          return;
        }
      } catch (error) {
        safeRemove(SESSION_KEY);
      }

      redirectToLogin();
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      safeSet(THEME_KEY, state.theme);
      render();
    }

    root.addEventListener('click', function(event) {
      const target = event.target.closest('button, [data-action], [data-menu], [data-edit-record], [data-delete-supply], [data-activity-submenu]');
      if (!target) return;

      const action = target.getAttribute('data-action');

      if (target.hasAttribute('data-menu')) {
        state.activeMenu = target.getAttribute('data-menu');
        render();

        if (state.activeMenu === 'activity' && state.user && !state.activityBooted) {
          bootActivity();
        }

        return;
      }

      if (target.hasAttribute('data-activity-submenu')) {
        state.activitySubMenu = target.getAttribute('data-activity-submenu');
        render();
        return;
      }

      if (target.hasAttribute('data-edit-record')) {
        openEditRecord(Number(target.getAttribute('data-edit-record')));
        return;
      }

      if (target.hasAttribute('data-delete-supply')) {
        requestDeleteSupply(target.getAttribute('data-delete-supply'));
        return;
      }

      if (action === 'toggle-theme') toggleTheme();
      if (action === 'confirm-logout') requestLogout();
      if (action === 'logout') handleLogout();
      if (action === 'close-confirm') closeConfirm();
      if (action === 'run-confirm' && typeof state.confirmAction === 'function') state.confirmAction();
      if (action === 'confirm-save-supply') confirmSaveSupply();
      if (action === 'apply-filters') applyFilters();
      if (action === 'clear-filters') clearFilters();
      if (action === 'close-edit-record') {
        state.editingRecord = null;
        render();
      }
      if (action === 'save-activity-sheet') saveActivitySheet();
      if (action === 'refresh-activity') loadActivityMatrix(null, state.activityDate, state.activityShift, true);
      if (action === 'confirm-save-activity') confirmSaveActivity();
      if (action === 'load-notes') loadActivityNotes();
      if (action === 'clear-loaded-notes') clearLoadedNotes();
      if (action === 'reset-settings') resetSettings();
    });

    root.addEventListener('input', function(event) {
      const target = event.target;

      if (target.hasAttribute('data-supply-input')) {
        updateSupplyInput(
          Number(target.getAttribute('data-supply-input')),
          target.getAttribute('data-supply-field'),
          target.value
        );
        return;
      }

      if (target.hasAttribute('data-filter')) {
        state.filters[target.getAttribute('data-filter')] = target.value;
        return;
      }

      if (target.hasAttribute('data-edit-record-field')) {
        state.editRecordForm[target.getAttribute('data-edit-record-field')] = target.value;
        return;
      }

      if (target.hasAttribute('data-activity-sheet-id')) {
        state.activitySheetId = target.value;
        return;
      }

      if (target.hasAttribute('data-activity-notes')) {
        state.activityNotes = target.value;
        return;
      }

      if (target.hasAttribute('data-notes-filter')) {
        state.notesFilters[target.getAttribute('data-notes-filter')] = target.value;
        return;
      }
    });

    root.addEventListener('change', function(event) {
      const target = event.target;
      const change = target.getAttribute('data-change');

      if (change === 'input-date') {
        changeInputDate(target.value);
        return;
      }

      if (change === 'recap-month') {
        changeRecapMonth(target.value);
        return;
      }

      if (change === 'recap-year') {
        changeRecapYear(target.value);
        return;
      }

      if (change === 'activity-date') {
        changeActivityDate(target.value);
        return;
      }

      if (change === 'activity-shift') {
        changeActivityShift(target.value);
        return;
      }

      if (target.hasAttribute('data-activity-check')) {
        updateActivityCheck(Number(target.getAttribute('data-activity-check')), target.checked);
        return;
      }

      if (target.hasAttribute('data-notes-filter')) {
        state.notesFilters[target.getAttribute('data-notes-filter')] = target.value;
      }
    });

    root.addEventListener('submit', function(event) {
      const form = event.target;

      if (form.getAttribute('data-form') === 'edit-record') {
        submitEditRecord(event);
        return;
      }

      if (form.getAttribute('data-form') === 'settings') {
        saveSettings(event);
        return;
      }
    });

    render();
    boot();
  </script>
