```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --dock-bottom: max(18px, env(safe-area-inset-bottom));
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }

    .fade-in { animation: fadeIn 0.35s ease both; }
    .slide-up { animation: slideUp 0.38s ease both; }
    .dock-pop { animation: dockPop 0.35s cubic-bezier(.2,.9,.2,1.2) both; }
    .modal-pop { animation: modalPop 0.24s cubic-bezier(.2,.9,.2,1.1) both; }
    .toast-in { animation: toastIn 0.26s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dockPop {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(14px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    input, select { color-scheme: light; }
    .dark input, .dark select { color-scheme: dark; }

    .glass-light {
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-dark {
      background: rgba(15,23,42,.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .dock-glass-light {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .dock-glass-dark {
      background: rgba(15,23,42,.84);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, .45);
      border-radius: 999px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, .7);
    }

    @media (prefers-reduced-motion: reduce) {
      *, .fade-in, .slide-up, .dock-pop, .modal-pop, .toast-in {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwMHj5protGmQ1WXzMEziBu0J6Gq2f8sGEy4B81aph2bPJvcNpn1clYuPZ_bzgsgdkh/exec';
    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'admin_dashboard_theme';
    const ATTENDANCE_SETTINGS_KEY = 'admin_attendance_color_settings';

    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const DEFAULT_ATTENDANCE_SETTINGS = {
      lowMax: 5,
      mediumMin: 6,
      mediumMax: 7,
      highMin: 8
    };

    const state = {
      loading: true,
      saving: false,
      theme: safeGet(THEME_KEY) || 'dark',
      activeMenu: 'dashboard',
      user: null,
      accessError: '',
      toast: null,
      confirmDialog: null,
      confirmAction: null,

      classes: [],
      dailyStudents: [],
      matrixDate: new Date().toISOString().slice(0, 10),
      matrixRows: [],

      recapMonth: new Date().getMonth() + 1,
      recapYear: new Date().getFullYear(),
      monthlyRecap: null,

      attendanceSettings: loadAttendanceSettings(),

      classForm: {
        id: '',
        trainerName: '',
        level: '',
        jamSection: '',
        branch: '',
        status: 'Active'
      },

      filters: {
        date: '',
        month: '',
        year: ''
      }
    };

    const root = document.getElementById('root');

    function safeGet(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        return '';
      }
    }

    function safeSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {}
    }

    function safeRemove(key) {
      try {
        localStorage.removeItem(key);
      } catch (error) {}
    }

    function loadAttendanceSettings() {
      try {
        const saved = safeGet(ATTENDANCE_SETTINGS_KEY);
        return saved ? JSON.parse(saved) : Object.assign({}, DEFAULT_ATTENDANCE_SETTINGS);
      } catch (error) {
        return Object.assign({}, DEFAULT_ATTENDANCE_SETTINGS);
      }
    }

    function saveAttendanceSettings() {
      safeSet(ATTENDANCE_SETTINGS_KEY, JSON.stringify(state.attendanceSettings));
    }

    async function apiCall(action, data = {}) {
      if (!GAS_API_URL || GAS_API_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS API URL belum diisi.');
      }

      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action,
          ...data
        })
      });

      if (!response.ok) {
        throw new Error('HTTP error ' + response.status);
      }

      return response.json();
    }

    function isDark() {
      return state.theme === 'dark';
    }

    function esc(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function redirectToLogin() {
      window.location.href = 'Index.html';
    }

    function pageClass() {
      return isDark()
        ? 'dark min-h-screen bg-[#020617] text-white'
        : 'min-h-screen bg-slate-100 text-slate-950';
    }

    function cardClass() {
      return isDark()
        ? 'glass-dark border border-white/10 shadow-2xl shadow-black/20'
        : 'glass-light border border-white shadow-xl shadow-slate-300/40';
    }

    function softBoxClass() {
      return isDark()
        ? 'bg-white/5 border border-white/10'
        : 'bg-slate-950/5 border border-slate-200';
    }

    function mutedClass() {
      return isDark()
        ? 'text-sm text-white/50'
        : 'text-sm text-slate-500';
    }

    function badgeClass() {
      return isDark()
        ? 'inline-flex h-9 items-center px-4 rounded-full bg-white/10 border border-white/10 text-white/80 text-sm font-black'
        : 'inline-flex h-9 items-center px-4 rounded-full bg-slate-950/5 border border-slate-200 text-slate-700 text-sm font-black';
    }

    function inputClass(disabled) {
      if (disabled) {
        return isDark()
          ? 'w-full h-11 rounded-2xl bg-white/5 border border-white/10 text-white/40 px-4 outline-none cursor-not-allowed'
          : 'w-full h-11 rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 px-4 outline-none cursor-not-allowed';
      }

      return isDark()
        ? 'w-full h-11 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 outline-none focus:ring-2 focus:ring-white/30'
        : 'w-full h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 outline-none focus:ring-2 focus:ring-slate-300';
    }

    function primaryButtonClass() {
      return isDark()
        ? 'w-full h-11 rounded-2xl bg-white text-slate-950 font-black hover:bg-slate-200 active:scale-[0.98] disabled:opacity-60'
        : 'w-full h-11 rounded-2xl bg-slate-950 text-white font-black hover:bg-slate-800 active:scale-[0.98] disabled:opacity-60';
    }

    function secondaryButtonClass() {
      return isDark()
        ? 'h-11 px-4 rounded-2xl bg-white/10 border border-white/10 text-white font-black hover:bg-white/15'
        : 'h-11 px-4 rounded-2xl bg-white border border-slate-200 text-slate-700 font-black hover:bg-slate-50';
    }

    function iconButtonClass() {
      return isDark()
        ? 'w-11 h-11 rounded-2xl bg-white/10 border border-white/10 text-white hover:bg-white/15 flex items-center justify-center'
        : 'w-11 h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 hover:bg-slate-50 flex items-center justify-center';
    }

    function icon(name, cls) {
      const className = cls || 'w-5 h-5';

      const icons = {
        chart:
          '<path d="M3 3v18h18" />' +
          '<path d="M7 16V9" />' +
          '<path d="M12 16V5" />' +
          '<path d="M17 16v-3" />',

        edit:
          '<path d="M12 20h9" />' +
          '<path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" />',

        database:
          '<ellipse cx="12" cy="5" rx="8" ry="3" />' +
          '<path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5" />' +
          '<path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />',

        layers:
          '<path d="M12 3 3 8l9 5 9-5-9-5Z" />' +
          '<path d="m3 13 9 5 9-5" />' +
          '<path d="m3 18 9 5 9-5" />',

        settings:
          '<path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />' +
          '<path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 7.03 3.84l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.18.36.5.72 1 .9.33.12.7.1 1.1.1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" />',

        user:
          '<path d="M20 21a8 8 0 0 0-16 0" />' +
          '<circle cx="12" cy="7" r="4" />',

        calendar:
          '<path d="M8 2v4M16 2v4M3 10h18" />' +
          '<rect x="3" y="4" width="18" height="18" rx="3" />',

        check:
          '<path d="m20 6-11 11-5-5" />',

        alert:
          '<path d="M12 9v4" />' +
          '<path d="M12 17h.01" />' +
          '<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />',

        trash:
          '<path d="M3 6h18" />' +
          '<path d="M8 6V4h8v2" />' +
          '<path d="M19 6l-1 14H6L5 6" />' +
          '<path d="M10 11v6" />' +
          '<path d="M14 11v6" />',

        users:
          '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />' +
          '<circle cx="9" cy="7" r="4" />' +
          '<path d="M22 21v-2a4 4 0 0 0-3-3.87" />' +
          '<path d="M16 3.13a4 4 0 0 1 0 7.75" />',

        sun:
          '<circle cx="12" cy="12" r="4" />' +
          '<path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />',

        moon:
          '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />',

        logout:
          '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />' +
          '<path d="M16 17l5-5-5-5" />' +
          '<path d="M21 12H9" />',

        spark:
          '<path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z" />',

        empty:
          '<path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />' +
          '<path d="M3.3 7 12 12l8.7-5" />' +
          '<path d="M12 22V12" />'
      };

      return (
        '<svg class="' + className + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
          (icons[name] || icons.spark) +
        '</svg>'
      );
    }

    function getAttendanceColorClass(value, type) {
      const settings = state.attendanceSettings;

      if (value === '' || value === null || value === undefined) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-slate-400/20'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      const number = Number(value);

      if (isNaN(number)) {
        return 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      if (number <= Number(settings.lowMax)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-red-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-red-500/15 text-red-500 border border-red-500/20 font-black';
      }

      if (number >= Number(settings.mediumMin) && number <= Number(settings.mediumMax)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-amber-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-amber-500/15 text-amber-500 border border-amber-500/20 font-black';
      }

      if (number >= Number(settings.highMin)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-emerald-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-emerald-500/15 text-emerald-500 border border-emerald-500/20 font-black';
      }

      return type === 'bar'
        ? 'w-full rounded-t-xl bg-slate-400/40'
        : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
    }

    function render() {
      document.documentElement.classList.toggle('dark', isDark());

      if (state.loading) {
        root.innerHTML = renderLoading();
        return;
      }

      if (state.accessError && !state.user) {
        root.innerHTML = renderAccessError();
        return;
      }

      root.innerHTML = renderApp();
    }

    function renderLoading() {
      return `
        <div class="${pageClass()}">
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="text-center fade-in">
              <div class="w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4 ${isDark() ? 'border-white/20 border-t-white' : 'border-slate-300 border-t-slate-950'}"></div>
              <p class="${isDark() ? 'text-white/70 text-sm' : 'text-slate-500 text-sm'}">Loading Admin Dashboard...</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderAccessError() {
      return `
        <div class="${pageClass()}">
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="${cardClass()} max-w-md w-full rounded-3xl p-6 text-center">
              <h1 class="text-xl font-black mb-2">Access Error</h1>
              <p class="text-red-500 text-sm mb-5">${esc(state.accessError)}</p>
              <button data-action="logout" class="${primaryButtonClass()}">Back to Login</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      const stats = calculateStats();

      return `
        <div class="${pageClass()}">
          ${renderBackgroundGlow()}

          <div class="relative min-h-screen pb-32">
            ${renderHeader()}

            <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
              <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 slide-up">
                ${renderStatCard('Active Class', stats.activeClasses, 'layers')}
                ${renderStatCard('Filled Today', stats.filledMatrix, 'edit')}
                ${renderStatCard('Saved Today', stats.savedMatrix, 'check')}
                ${renderStatCard('Murid Hadir', stats.totalStudents, 'users')}
              </section>

              ${state.activeMenu === 'dashboard' ? renderDashboardView() : ''}
              ${state.activeMenu === 'daily' ? renderDailyInputView() : ''}
              ${state.activeMenu === 'records' ? renderRecordsView() : ''}
              ${state.activeMenu === 'classes' ? renderClassesView() : ''}
              ${state.activeMenu === 'settings' ? renderSettingsView() : ''}
              ${state.activeMenu === 'profile' ? renderProfileView() : ''}
            </main>

            ${renderDock()}
            ${renderToast()}
            ${renderConfirmDialog()}
          </div>
        </div>
      `;
    }

    function renderHeader() {
      const user = state.user || {};

      return `
        <header class="${isDark() ? 'sticky top-0 z-30 bg-[#020617]/80 backdrop-blur-xl border-b border-white/10' : 'sticky top-0 z-30 bg-slate-100/80 backdrop-blur-xl border-b border-slate-200'}">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between gap-4">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <div class="${isDark() ? 'w-9 h-9 rounded-2xl bg-white text-slate-950 flex items-center justify-center' : 'w-9 h-9 rounded-2xl bg-slate-950 text-white flex items-center justify-center'}">
                    ${icon('spark', 'w-5 h-5')}
                  </div>
                  <h1 class="text-xl sm:text-2xl font-black">Admin Dashboard</h1>
                </div>
                <p class="${mutedClass()}">${esc(user.username)} • ${esc(user.role)} • ${esc(user.branch)}</p>
              </div>

              <div class="flex items-center gap-2">
                <button data-action="toggle-theme" class="${iconButtonClass()}" title="Toggle theme">
                  ${icon(state.theme === 'dark' ? 'sun' : 'moon', 'w-5 h-5')}
                </button>

                <button data-action="confirm-logout" class="${iconButtonClass()}" title="Logout">
                  ${icon('logout', 'w-5 h-5')}
                </button>
              </div>
            </div>
          </div>
        </header>
      `;
    }

    function renderStatCard(label, value, iconName) {
      return `
        <div class="${cardClass()} rounded-3xl p-4 sm:p-5">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="${mutedClass()}">${esc(label)}</p>
              <h3 class="text-2xl sm:text-3xl font-black mt-1">${esc(value)}</h3>
            </div>
            <div class="${isDark() ? 'w-11 h-11 rounded-2xl bg-white/10 flex items-center justify-center' : 'w-11 h-11 rounded-2xl bg-slate-950/5 flex items-center justify-center'}">
              ${icon(iconName, 'w-5 h-5')}
            </div>
          </div>
        </div>
      `;
    }

    function renderDashboardView() {
      const recap = state.monthlyRecap || {};
      const summary = recap.summary || {};
      const dailyTotals = recap.dailyTotals || [];
      const classes = recap.classes || [];
      const daysInMonth = recap.daysInMonth || 31;
      const maxTotal = Math.max.apply(null, dailyTotals.map(function(item) {
        return Number(item.total || 0);
      }).concat([1]));

      let monthOptions = '';
      MONTH_NAMES.forEach(function(name, index) {
        const value = index + 1;
        monthOptions += `<option value="${value}" ${Number(state.recapMonth) === value ? 'selected' : ''}>${name}</option>`;
      });

      let chartBars = '';
      dailyTotals.forEach(function(item) {
        const height = Math.max(8, (Number(item.total || 0) / maxTotal) * 210);
        chartBars += `
          <div class="flex-1 flex flex-col items-center gap-2">
            <div class="text-[11px] font-black opacity-70">${esc(item.total)}</div>
            <div class="${getAttendanceColorClass(Number(item.total || 0), 'bar')}" style="height:${height}px"></div>
            <div class="text-[10px] opacity-60">${esc(item.day)}</div>
          </div>
        `;
      });

      const daysInfo = [];
      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(state.recapYear, state.recapMonth - 1, i);
        daysInfo.push({
          date: i,
          dayName: d.toLocaleDateString('en-US', { weekday: 'short' }),
          isWeekend: d.getDay() === 0 || d.getDay() === 6
        });
      }

      let tableHeader = '';
      daysInfo.forEach(function(info) {
        tableHeader += `
          <th class="py-2 px-1 text-center min-w-[44px] ${info.isWeekend ? (isDark() ? 'bg-red-500/10' : 'bg-red-50') : ''}">
            <div class="text-[10px] uppercase opacity-50 mb-0.5">${esc(info.dayName)}</div>
            <div class="font-bold">${esc(info.date)}</div>
          </th>
        `;
      });

      let tableRows = '';
      classes.forEach(function(row) {
        let dayCells = '';

        (row.days || []).forEach(function(day, index) {
          const info = daysInfo[index] || {};
          dayCells += `
            <td class="py-2 px-1 text-center ${info.isWeekend ? (isDark() ? 'bg-red-500/10' : 'bg-red-50') : ''}">
              <span class="${getAttendanceColorClass(day.value, 'cell')}">
                ${day.value === '' ? '-' : esc(day.value)}
              </span>
            </td>

          : 'bg-red-50 text-red-700 border-red-200';

      return `
        <div class="fixed left-4 right-4 bottom-32 z-50 flex justify-center pointer-events-none">
          <div class="toast-in pointer-events-auto max-w-md w-full rounded-3xl border px-4 py-4 shadow-2xl backdrop-blur-xl ${boxClass}">
            <div class="flex items-start gap-3">
              <div>${icon(success ? 'check' : 'alert', 'w-5 h-5')}</div>
              <p class="text-sm font-bold leading-relaxed">${esc(state.toast.text)}</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderConfirmDialog() {
      if (!state.confirmDialog) return '';

      const d = state.confirmDialog;
      const danger = d.tone === 'danger';
      const success = d.tone === 'success';

      const iconClass = danger
        ? 'bg-red-500/15 text-red-500 border-red-500/20'
        : success
          ? 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20'
          : isDark()
            ? 'bg-white/10 text-white border-white/10'
            : 'bg-slate-950/5 text-slate-950 border-slate-200';

      const confirmClass = danger
        ? 'bg-red-500 text-white hover:bg-red-600'
        : success
          ? 'bg-emerald-500 text-white hover:bg-emerald-600'
          : isDark()
            ? 'bg-white text-slate-950 hover:bg-slate-200'
            : 'bg-slate-950 text-white hover:bg-slate-800';

      return `
        <div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6">
          <div data-action="close-confirm" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

          <div class="${cardClass()} relative w-full max-w-md rounded-[2rem] p-6 modal-pop">
            <div class="w-14 h-14 rounded-3xl border flex items-center justify-center mb-5 ${iconClass}">
              ${icon(danger ? 'trash' : success ? 'check' : 'spark', 'w-7 h-7')}
            </div>

            <h3 class="text-xl font-black mb-2">${esc(d.title)}</h3>
            <p class="${mutedClass()} leading-relaxed mb-6">${esc(d.message)}</p>

            <div class="flex gap-3">
              <button data-action="close-confirm" class="${secondaryButtonClass()} flex-1">${esc(d.cancelText)}</button>
              <button data-action="run-confirm" class="h-11 px-5 rounded-2xl font-black active:scale-[0.98] flex-1 ${confirmClass}">
                ${esc(d.confirmText)}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderAttendanceLegend() {
      const s = state.attendanceSettings;

      return `
        <div class="flex flex-wrap gap-2 text-xs font-black">
          <span class="px-3 py-2 rounded-full bg-red-500/15 text-red-500 border border-red-500/20">≤ ${esc(s.lowMax)}</span>
          <span class="px-3 py-2 rounded-full bg-amber-500/15 text-amber-500 border border-amber-500/20">${esc(s.mediumMin)}-${esc(s.mediumMax)}</span>
          <span class="px-3 py-2 rounded-full bg-emerald-500/15 text-emerald-500 border border-emerald-500/20">≥ ${esc(s.highMin)}</span>
        </div>
      `;
    }

    function renderStatusPill(row) {
      let text = 'New';
      let cls = 'bg-blue-500/15 text-blue-500 border-blue-500/20';

      if (row.isSaved && row.isEdited) {
        text = 'Edited';
        cls = 'bg-amber-500/15 text-amber-500 border-amber-500/20';
      } else if (row.isSaved) {
        text = 'Saved';
        cls = 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20';
      }

      return `<span class="inline-flex h-8 items-center px-3 rounded-full border text-xs font-black ${cls}">${text}</span>`;
    }

    function renderEmptyState(text) {
      return `
        <div class="${softBoxClass()} rounded-3xl p-8 text-center">
          <div class="mx-auto w-14 h-14 rounded-3xl flex items-center justify-center mb-4 bg-slate-500/10">
            ${icon('empty', 'w-7 h-7 opacity-60')}
          </div>
          <p class="${mutedClass()}">${esc(text)}</p>
        </div>
      `;
    }

    function renderInfoBox(label, value) {
      return `
        <div class="${softBoxClass()} rounded-2xl p-4">
          <p class="${mutedClass()}">${esc(label)}</p>
          <p class="font-black mt-1">${value ? esc(value) : '-'}</p>
        </div>
      `;
    }

    function renderBackgroundGlow() {
      return `
        <div class="fixed inset-0 pointer-events-none overflow-hidden">
          <div class="absolute -top-24 -left-24 w-72 h-72 rounded-full blur-3xl ${isDark() ? 'bg-blue-500/20' : 'bg-blue-300/40'}"></div>
          <div class="absolute top-1/3 -right-24 w-80 h-80 rounded-full blur-3xl ${isDark() ? 'bg-emerald-500/10' : 'bg-emerald-300/35'}"></div>
          <div class="absolute -bottom-32 left-1/3 w-80 h-80 rounded-full blur-3xl ${isDark() ? 'bg-purple-500/10' : 'bg-purple-300/30'}"></div>
        </div>
      `;
    }

    function calculateStats() {
      const totalStudents = state.dailyStudents.reduce(function(sum, item) {
        return sum + Number(item['Murid Hadir'] || 0);
      }, 0);

      const filledMatrix = state.matrixRows.filter(function(row) {
        return row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined;
      }).length;

      const savedMatrix = state.matrixRows.filter(function(row) {
        return row.isSaved;
      }).length;

      return {
        totalClasses: state.classes.length,
        activeClasses: state.classes.filter(function(item) {
          return item.Status === 'Active';
        }).length,
        totalReports: state.dailyStudents.length,
        totalStudents: totalStudents,
        filledMatrix: filledMatrix,
        savedMatrix: savedMatrix
      };
    }

    function showToast(type, text) {
      state.toast = { type: type, text: text };
      render();

      setTimeout(function() {
        state.toast = null;
        render();
      }, 3200);
    }

    function showSuccess(text) {
      showToast('success', text);
    }

    function showError(text) {
      showToast('error', text);
    }

    function openConfirm(config) {
      state.confirmAction = config.onConfirm;
      state.confirmDialog = {
        title: config.title || 'Are you sure?',
        message: config.message || 'This action needs confirmation.',
        confirmText: config.confirmText || 'Confirm',
        cancelText: config.cancelText || 'Cancel',
        tone: config.tone || 'danger'
      };
      render();
    }

    function closeConfirm() {
      state.confirmAction = null;
      state.confirmDialog = null;
      render();
    }

    async function boot() {
      state.loading = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);

        if (!token) {
          redirectToLogin();
          return;
        }

        const sessionResponse = await apiCall('getUserSession', { token });

        if (!sessionResponse || !sessionResponse.success) {
          safeRemove(SESSION_KEY);
          redirectToLogin();
          return;
        }

        if (!sessionResponse.user || sessionResponse.user.role !== 'Admin') {
          state.accessError = 'Akses ditolak. Halaman ini hanya untuk Admin.';
          state.loading = false;
          render();
          return;
        }

        state.user = sessionResponse.user;
        state.classForm.branch = sessionResponse.user.branch || '';

        await Promise.all([
          loadClasses(token, false),
          loadDailyStudents(token, null, false),
          loadDailyMatrix(token, state.matrixDate, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

      } catch (error) {
        console.error(error);
        state.accessError = error && error.message ? error.message : 'Gagal memuat dashboard.';
      } finally {
        state.loading = false;
        render();
      }
    }

    async function loadClasses(tokenParam, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getClassDetails', { token });

      if (response && response.success) {
        state.classes = response.data || [];
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat class.');
      }

      if (shouldRender !== false) render();
    }

    async function loadDailyStudents(tokenParam, customFilters, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getDailyStudents', {
        token,
        filters: JSON.stringify(customFilters || state.filters)
      });

      if (response && response.success) {
        state.dailyStudents = response.data || [];
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat data murid.');
      }

      if (shouldRender !== false) render();
    }

    async function loadDailyMatrix(tokenParam, dateParam, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getDailyInputMatrix', {
        token,
        date: dateParam || state.matrixDate
      });

      if (response && response.success) {
        state.matrixRows = (response.data || []).map(function(row) {
          row.isEdited = false;
          return row;
        });
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat matrix input.');
      }

      if (shouldRender !== false) render();
    }

    async function loadMonthlyRecap(tokenParam, monthParam, yearParam, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const response = await apiCall('getMonthlyDashboardRecap', {
        token,
        month: Number(monthParam),
        year: Number(yearParam)
      });

      if (response && response.success) {
        state.monthlyRecap = response.data;
      } else {
        showError(response && response.message ? response.message : 'Gagal memuat monthly recap.');
      }

      if (shouldRender !== false) render();
    }

    function updateMatrixInput(index, value) {
      const row = state.matrixRows[index];
      if (!row) return;

      row.muridHadir = value;
      row.isEdited = String(value) !== String(row.originalMuridHadir || '');

      document.querySelectorAll('[data-preview-index="' + index + '"]').forEach(function(el) {
        el.className = getAttendanceColorClass(value, 'cell');
        el.textContent = value === '' ? '-' : value;
      });

      document.querySelectorAll('[data-status-index="' + index + '"]').forEach(function(el) {
        el.innerHTML = renderStatusPill(row);
      });
    }

    async function changeMatrixDate(value) {
      state.matrixDate = value;
      render();

      try {
        await loadDailyMatrix(null, value, true);
      } catch (error) {
        showError('Gagal memuat matrix input.');
      }
    }

    async function changeRecapMonth(value) {
      state.recapMonth = Number(value);
      render();

      try {
        await loadMonthlyRecap(null, state.recapMonth, state.recapYear, true);
      } catch (error) {
        showError('Gagal memuat monthly recap.');
      }
    }

    async function changeRecapYear(value) {
      state.recapYear = Number(value);
      render();

      try {
        await loadMonthlyRecap(null, state.recapMonth, state.recapYear, true);
      } catch (error) {
        showError('Gagal memuat monthly recap.');
      }
    }

    function confirmSaveAllDaily() {
      const rowsToSave = state.matrixRows.filter(function(row) {
        return row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined;
      });

      if (!rowsToSave.length) {
        showError('Belum ada data murid yang diisi.');
        return;
      }

      openConfirm({
        title: 'Save all attendance?',
        message: 'Data yang belum ada akan dibuat. Data yang sudah ada di tanggal yang sama akan direvisi tanpa duplicate.',
        confirmText: 'Save All',
        tone: 'success',
        onConfirm: saveAllDaily
      });
    }

    async function saveAllDaily() {
      closeConfirm();

      const rowsToSave = state.matrixRows.filter(function(row) {
        return row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined;
      });

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('saveDailyStudentsBulk', {
          token,
          date: state.matrixDate,
          rows: JSON.stringify(rowsToSave)
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menyimpan bulk data.');
          return;
        }

        await Promise.all([
          loadDailyMatrix(token, state.matrixDate, false),
          loadDailyStudents(token, null, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Data berhasil disimpan.');

      } catch (error) {
        console.error(error);
        showError('Terjadi error saat menyimpan bulk data.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function requestDeleteDaily(id) {
      openConfirm({
        title: 'Delete daily record?',
        message: 'Data murid harian ini akan dihapus dari database. Aksi ini tidak bisa dibatalkan.',
        confirmText: 'Delete',
        tone: 'danger',
        onConfirm: function() {
          deleteDaily(id);
        }
      });
    }

    async function deleteDaily(id) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('deleteDailyStudent', {
          token,
          id
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menghapus data.');
          return;
        }

        await Promise.all([
          loadDailyStudents(token, null, false),
          loadDailyMatrix(token, state.matrixDate, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Data berhasil dihapus.');

      } catch (error) {
        showError('Terjadi error saat menghapus data.');
      } finally {
        state.saving = false;
        render();
      }
    }

    async function applyFilters() {
      try {
        await loadDailyStudents(null, state.filters, true);
      } catch (error) {
        showError('Gagal menerapkan filter.');
      }
    }

    async function clearFilters() {
      state.filters = { date: '', month: '', year: '' };
      render();

      try {
        await loadDailyStudents(null, state.filters, true);
      } catch (error) {
        showError('Gagal membersihkan filter.');
      }
    }

    async function submitClass(event) {
      event.preventDefault();

      if (!state.classForm.trainerName || !state.classForm.level || !state.classForm.jamSection || !state.classForm.branch) {
        showError('Trainer Name, Level, Jam/Section, dan Branch wajib diisi.');
        return;
      }

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);

        const payload = {
          trainerName: state.classForm.trainerName,
          level: state.classForm.level,
          jamSection: state.classForm.jamSection,
          branch: state.classForm.branch,
          status: state.classForm.status
        };

        const response = state.classForm.id
          ? await apiCall('updateClassDetail', {
              token,
              id: state.classForm.id,
              payload: JSON.stringify(payload)
            })
          : await apiCall('createClassDetail', {
              token,
              payload: JSON.stringify(payload)
            });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menyimpan class.');
          return;
        }

        resetClassForm(false);

        await Promise.all([
          loadClasses(token, false),
          loadDailyMatrix(token, state.matrixDate, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Class berhasil disimpan.');

      } catch (error) {
        showError('Terjadi error saat menyimpan class.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function editClass(index) {
      const item = state.classes[index];
      if (!item) return;

      state.classForm = {
        id: item.ID,
        trainerName: item['Trainer Name'],
        level: item.Level,
        jamSection: item['Jam/Section'],
        branch: item.Branch,
        status: item.Status || 'Active'
      };

      state.activeMenu = 'classes';
      render();

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function requestDeleteClass(id) {
      openConfirm({
        title: 'Delete class?',
        message: 'Class ini akan dihapus dari ClassDetails. Pastikan tidak sedang digunakan untuk input aktif.',
        confirmText: 'Delete',
        tone: 'danger',
        onConfirm: function() {
          deleteClass(id);
        }
      });
    }

    async function deleteClass(id) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('deleteClassDetail', {
          token,
          id
        });

        if (!response || !response.success) {
          showError(response && response.message ? response.message : 'Gagal menghapus class.');
          return;
        }

        await Promise.all([
          loadClasses(token, false),
          loadDailyMatrix(token, state.matrixDate, false),
          loadMonthlyRecap(token, state.recapMonth, state.recapYear, false)
        ]);

        showSuccess(response.message || 'Class berhasil dihapus.');

      } catch (error) {
        showError('Terjadi error saat menghapus class.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function resetClassForm(shouldRender) {
      state.classForm = {
        id: '',
        trainerName: '',
        level: '',
        jamSection: '',
        branch: state.user ? state.user.branch : '',
        status: 'Active'
      };

      if (shouldRender !== false) render();
    }

    function saveSettings(event) {
      event.preventDefault();

      const clean = {
        lowMax: Number(getSettingInput('lowMax')),
        mediumMin: Number(getSettingInput('mediumMin')),
        mediumMax: Number(getSettingInput('mediumMax')),
        highMin: Number(getSettingInput('highMin'))
      };

      if (
        isNaN(clean.lowMax) ||
        isNaN(clean.mediumMin) ||
        isNaN(clean.mediumMax) ||
        isNaN(clean.highMin)
      ) {
        showError('Semua settings harus berupa angka.');
        return;
      }

      state.attendanceSettings = clean;
      saveAttendanceSettings();
      showSuccess('Settings warna attendance berhasil disimpan.');
      render();
    }

    function getSettingInput(key) {
      const el = root.querySelector('[data-setting-field="' + key + '"]');
      return el ? el.value : '';
    }

    function resetSettings() {
      state.attendanceSettings = Object.assign({}, DEFAULT_ATTENDANCE_SETTINGS);
      saveAttendanceSettings();
      showSuccess('Settings dikembalikan ke default.');
      render();
    }

    function requestLogout() {
      openConfirm({
        title: 'Logout from dashboard?',
        message: 'Session kamu akan diakhiri dan kamu akan kembali ke halaman login.',
        confirmText: 'Logout',
        tone: 'neutral',
        onConfirm: handleLogout
      });
    }

    async function handleLogout() {
      closeConfirm();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('logoutUser', { token });

        safeRemove(SESSION_KEY);

        if (response && response.redirectUrl) {
          window.location.href = response.redirectUrl;
          return;
        }
      } catch (error) {
        safeRemove(SESSION_KEY);
      }

      redirectToLogin();
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      safeSet(THEME_KEY, state.theme);
      render();
    }

    root.addEventListener('click', function(event) {
      const target = event.target.closest('button, [data-action], [data-menu], [data-delete-daily], [data-edit-class], [data-delete-class]');
      if (!target) return;

      const action = target.getAttribute('data-action');

      if (target.hasAttribute('data-menu')) {
        state.activeMenu = target.getAttribute('data-menu');
        render();
        return;
      }

      if (action === 'toggle-theme') toggleTheme();
      if (action === 'confirm-logout') requestLogout();
      if (action === 'logout') handleLogout();
      if (action === 'close-confirm') closeConfirm();
      if (action === 'run-confirm' && typeof state.confirmAction === 'function') state.confirmAction();
      if (action === 'confirm-save-daily') confirmSaveAllDaily();
      if (action === 'apply-filters') applyFilters();
      if (action === 'clear-filters') clearFilters();
      if (action === 'reset-settings') resetSettings();
      if (action === 'reset-class-form') resetClassForm(true);

      if (target.hasAttribute('data-delete-daily')) {
        requestDeleteDaily(target.getAttribute('data-delete-daily'));
      }

      if (target.hasAttribute('data-edit-class')) {
        editClass(Number(target.getAttribute('data-edit-class')));
      }

      if (target.hasAttribute('data-delete-class')) {
        requestDeleteClass(target.getAttribute('data-delete-class'));
      }
    });

    root.addEventListener('input', function(event) {
      const target = event.target;

      if (target.hasAttribute('data-matrix-input')) {
        updateMatrixInput(Number(target.getAttribute('data-matrix-input')), target.value);
        return;
      }

      if (target.hasAttribute('data-filter')) {
        state.filters[target.getAttribute('data-filter')] = target.value;
        return;
      }

      if (target.hasAttribute('data-class-field')) {
        state.classForm[target.getAttribute('data-class-field')] = target.value;
        return;
      }
    });

    root.addEventListener('change', function(event) {
      const target = event.target;
      const change = target.getAttribute('data-change');

      if (change === 'matrix-date') {
        changeMatrixDate(target.value);
        return;
      }

      if (change === 'recap-month') {
        changeRecapMonth(target.value);
        return;
      }

      if (change === 'recap-year') {
        changeRecapYear(target.value);
        return;
      }

      if (target.hasAttribute('data-class-field')) {
        state.classForm[target.getAttribute('data-class-field')] = target.value;
      }
    });

    root.addEventListener('submit', function(event) {
      const form = event.target;

      if (form.getAttribute('data-form') === 'class') {
        submitClass(event);
        return;
      }

      if (form.getAttribute('data-form') === 'settings') {
        saveSettings(event);
        return;
      }
    });

    render();
    boot();
  </script>
</body>
</html>
