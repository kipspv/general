<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - GAS Management System</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .fade-in {
      animation: fadeIn 0.7s ease both;
    }

    .slide-up {
      animation: slideUp 0.65s ease both;
    }

    .float-soft {
      animation: floatSoft 5s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatSoft {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 overflow-hidden selection:bg-blue-500/30">

  <div id="loadingScreen" class="min-h-screen flex items-center justify-center">
    <div class="text-center fade-in">
      <div class="w-12 h-12 border-4 rounded-full animate-spin border-white/20 border-t-white mx-auto mb-4"></div>
      <p class="text-white/60 text-sm">Checking session...</p>
    </div>
  </div>

  <div id="loginScreen" class="hidden relative min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
      <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-blue-600/20 blur-[120px] mix-blend-screen float-soft"></div>
      <div class="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-emerald-600/10 blur-[120px] mix-blend-screen float-soft" style="animation-delay: -2s;"></div>
      <div class="absolute top-[20%] left-[40%] w-[30%] h-[30%] rounded-full bg-purple-600/10 blur-[100px] mix-blend-screen float-soft" style="animation-delay: -4s;"></div>
    </div>

    <main class="relative w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center">

      <div class="hidden lg:block slide-up" style="animation-delay: 0.1s;">
        <div class="mb-8">
          <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center mb-6 shadow-2xl shadow-white/10">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z"></path>
            </svg>
          </div>

          <h1 class="text-5xl font-black tracking-tight leading-tight mb-4">
            Management <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
              System Hub.
            </span>
          </h1>

          <p class="text-lg text-white/60 leading-relaxed max-w-md">
            Centralized platform untuk mengelola absensi kelas, tracking supply inventory, dan memonitor aktivitas Team Leader secara real-time.
          </p>
        </div>

        <div class="flex gap-3">
          <div class="rounded-2xl bg-white/10 border border-white/10 px-4 py-3 text-center">
            <p class="text-white text-sm font-semibold">Admin</p>
          </div>

          <div class="rounded-2xl bg-white/10 border border-white/10 px-4 py-3 text-center">
            <p class="text-white text-sm font-semibold">Team Leader</p>
          </div>

          <div class="rounded-2xl bg-white/10 border border-white/10 px-4 py-3 text-center">
            <p class="text-white text-sm font-semibold">Management</p>
          </div>
        </div>
      </div>

      <div class="w-full max-w-md mx-auto lg:mx-0 slide-up" style="animation-delay: 0.2s;">
        <section class="relative group">
          <div class="absolute inset-0 bg-gradient-to-r from-blue-500/20 to-emerald-500/20 rounded-[2.5rem] blur-xl opacity-50 group-hover:opacity-70 transition duration-500"></div>

          <div class="relative bg-[#0b1120]/80 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-8 sm:p-10 shadow-2xl">

            <div class="lg:hidden flex flex-col items-center mb-8 text-center">
              <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center mb-4 shadow-xl shadow-white/10">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z"></path>
                </svg>
              </div>

              <h2 class="text-2xl font-black tracking-tight">System Hub</h2>
            </div>

            <div class="mb-8">
              <h2 class="text-2xl font-black mb-2">Welcome back</h2>
              <p class="text-white/50 text-sm">Silakan login untuk mengakses dashboard kamu.</p>
            </div>

            <div id="errorBox" class="hidden mb-6 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 items-start gap-3 fade-in">
              <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <p id="errorText" class="text-sm text-red-400 font-medium leading-relaxed"></p>
            </div>

            <form id="loginForm" class="space-y-5">
              <div>
                <label class="block text-sm font-semibold text-white/70 mb-2 pl-1">
                  Username
                </label>

                <input
                  id="usernameInput"
                  type="text"
                  class="w-full h-12 rounded-2xl bg-black/40 border border-white/10 text-white px-4 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition disabled:opacity-50"
                  placeholder="Enter your username"
                  autocomplete="username"
                >
              </div>

              <div>
                <label class="block text-sm font-semibold text-white/70 mb-2 pl-1">
                  Password
                </label>

                <input
                  id="passwordInput"
                  type="password"
                  class="w-full h-12 rounded-2xl bg-black/40 border border-white/10 text-white px-4 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition disabled:opacity-50"
                  placeholder="••••••••"
                  autocomplete="current-password"
                >
              </div>

              <button
                id="loginButton"
                type="submit"
                class="w-full h-12 mt-4 rounded-2xl bg-white text-slate-950 font-black tracking-wide hover:bg-slate-200 active:scale-[0.98] transition-all disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center"
              >
                Login
              </button>
            </form>

          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyNngZ57fzkW_GcM6nAxwKoEGL-oIwkK7_URfXVmAF8XIdunWx792jGQWYNXnfkxyYiMQ/exec';
    const SESSION_KEY = 'gas_auth_token';

    const loadingScreen = document.getElementById('loadingScreen');
    const loginScreen = document.getElementById('loginScreen');
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginButton = document.getElementById('loginButton');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');

    function showLogin() {
      loadingScreen.classList.add('hidden');
      loginScreen.classList.remove('hidden');
    }

    function showLoadingScreen() {
      loadingScreen.classList.remove('hidden');
      loginScreen.classList.add('hidden');
    }

    function showError(message) {
      errorText.textContent = message || 'Terjadi kesalahan.';
      errorBox.classList.remove('hidden');
      errorBox.classList.add('flex');
    }

    function hideError() {
      errorText.textContent = '';
      errorBox.classList.add('hidden');
      errorBox.classList.remove('flex');
    }

    function setLoading(isLoading) {
      usernameInput.disabled = isLoading;
      passwordInput.disabled = isLoading;
      loginButton.disabled = isLoading;

      if (isLoading) {
        loginButton.innerHTML = '<div class="w-5 h-5 border-2 border-slate-950/20 border-t-slate-950 rounded-full animate-spin"></div>';
      } else {
        loginButton.textContent = 'Login';
      }
    }

    function safeGetToken() {
      try {
        return localStorage.getItem(SESSION_KEY);
      } catch (error) {
        console.warn('LocalStorage get failed:', error);
        return '';
      }
    }

    function safeSetToken(token) {
      try {
        localStorage.setItem(SESSION_KEY, token);
      } catch (error) {
        console.warn('LocalStorage set failed:', error);
      }
    }

    function safeRemoveToken() {
      try {
        localStorage.removeItem(SESSION_KEY);
      } catch (error) {
        console.warn('LocalStorage remove failed:', error);
      }
    }

    async function apiCall(action, data = {}) {
      if (!GAS_API_URL || GAS_API_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS API URL belum diisi.');
      }

      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          action,
          ...data,
        }),
      });

      if (!response.ok) {
        throw new Error('HTTP error ' + response.status);
      }

      return response.json();
    }

    async function checkActiveSession() {
      const token = safeGetToken();

      if (!token) {
        showLogin();
        return;
      }

      try {
        const response = await apiCall('checkSession', { token });

        if (response && response.success && response.redirectUrl) {
          window.location.href = response.redirectUrl;
          return;
        }

        safeRemoveToken();
        showLogin();

      } catch (error) {
        console.warn('Session check failed:', error);
        safeRemoveToken();
        showLogin();
      }
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        showError('Username dan password wajib diisi.');
        return;
      }

      hideError();
      setLoading(true);

      try {
        const response = await apiCall('loginUser', {
          username,
          password,
        });

        if (response && response.success) {
          safeSetToken(response.token);

          if (response.redirectUrl) {
            window.location.href = response.redirectUrl;
            return;
          }

          showError('Login berhasil, tapi URL dashboard tidak ditemukan.');
          setLoading(false);
          return;
        }

        showError(response && response.message ? response.message : 'Login gagal.');
        setLoading(false);

      } catch (error) {
        console.error('Login server error:', error);
        showError(error && error.message ? error.message : 'Terjadi error saat menghubungi server.');
        setLoading(false);
      }
    }

    loginForm.addEventListener('submit', handleLogin);

    showLoadingScreen();
    checkActiveSession();
  </script>
</body>
</html>
