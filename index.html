<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - GAS Management System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .fade-in {
      animation: fadeIn 0.45s ease both;
    }

    .slide-up {
      animation: slideUp 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="bg-slate-950 text-white">
  <div id="root"></div>

  <script>
    var h = React.createElement;

    var GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwoeuTI2M9CayhMN67KJuLMRLxH_oTvil7FVzH0yk2GGNM5OKse8KjNRgu-_xRmhZbGbQ/exec';

    var SESSION_KEY = 'gas_auth_token';

    var DASHBOARD_FILES = {
      AdminDashboard: 'AdminDashboard.html',
      TeamLeaderDashboard: 'TeamLeaderDashboard.html',
      ManagementDashboard: 'ManagementDashboard.html'
    };

    function safeGetStorage(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (error) {
        console.warn('Storage get blocked:', error);
        return null;
      }
    }

    function safeSetStorage(key, value) {
      try {
        window.localStorage.setItem(key, value);
        return true;
      } catch (error) {
        console.warn('Storage set blocked:', error);
        return false;
      }
    }

    function safeRemoveStorage(key) {
      try {
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        console.warn('Storage remove blocked:', error);
        return false;
      }
    }

    function getErrorMessage(error) {
      if (!error) return 'Unknown error';
      if (typeof error === 'string') return error;
      return error.message || String(error);
    }

    function trimText(text, limit) {
      var value = String(text || '');
      if (value.length <= limit) return value;
      return value.slice(0, limit) + '...';
    }

    function getDashboardUrl(pageName) {
      var clean = String(pageName || '').trim();
      if (!DASHBOARD_FILES[clean]) return '';
      return './' + DASHBOARD_FILES[clean];
    }

    function App() {
      var usernameState = React.useState('');
      var username = usernameState[0];
      var setUsername = usernameState[1];

      var passwordState = React.useState('');
      var password = passwordState[0];
      var setPassword = passwordState[1];

      var loadingState = React.useState(false);
      var loading = loadingState[0];
      var setLoading = loadingState[1];

      var initialLoadingState = React.useState(true);
      var initialLoading = initialLoadingState[0];
      var setInitialLoading = initialLoadingState[1];

      var errorState = React.useState('');
      var error = errorState[0];
      var setError = errorState[1];

      var successState = React.useState('');
      var success = successState[0];
      var setSuccess = successState[1];

      var debugOpenState = React.useState(true);
      var debugOpen = debugOpenState[0];
      var setDebugOpen = debugOpenState[1];

      var debugRowsState = React.useState([]);
      var debugRows = debugRowsState[0];
      var setDebugRows = debugRowsState[1];

      var rawResponseState = React.useState('');
      var rawResponse = rawResponseState[0];
      var setRawResponse = rawResponseState[1];

      var parsedResponseState = React.useState(null);
      var parsedResponse = parsedResponseState[0];
      var setParsedResponse = parsedResponseState[1];

      var statusState = React.useState('');
      var status = statusState[0];
      var setStatus = statusState[1];

      function addDebug(label, data) {
        var item = {
          time: new Date().toLocaleTimeString(),
          label: label,
          data: data || {}
        };

        console.log('[DEBUG]', label, data || {});

        setDebugRows(function (prev) {
          return [item].concat(prev).slice(0, 40);
        });
      }

      async function fetchAPI(action, payload) {
        var rawText = '';

        addDebug('POST started', {
          action: action,
          gasUrl: GAS_WEB_APP_URL
        });

        try {
          var response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify({
              action: action,
              payload: payload || {}
            })
          });

          rawText = await response.text();

          setStatus(String(response.status) + ' ' + String(response.statusText || ''));
          setRawResponse(rawText);

          addDebug('POST raw response', {
            action: action,
            status: response.status,
            ok: response.ok,
            preview: trimText(rawText, 300)
          });

          if (!response.ok) {
            throw new Error('HTTP error: ' + response.status);
          }

          var parsed;

          try {
            parsed = JSON.parse(rawText);
          } catch (jsonError) {
            throw new Error('GAS returned non-JSON response: ' + trimText(rawText, 150));
          }

          setParsedResponse(parsed);

          addDebug('POST parsed JSON', {
            action: action,
            success: parsed.success,
            message: parsed.message,
            redirectPage: parsed.redirectPage
          });

          return parsed;

        } catch (error) {
          addDebug('POST failed', {
            action: action,
            error: getErrorMessage(error),
            rawPreview: trimText(rawText, 300)
          });

          throw error;
        }
      }

      async function checkSession() {
        setInitialLoading(true);
        setError('');
        setSuccess('');

        var token = safeGetStorage(SESSION_KEY);

        addDebug('Session check started', {
          hasToken: !!token,
          currentUrl: window.location.href
        });

        if (!token) {
          setInitialLoading(false);
          return;
        }

        try {
          var response = await fetchAPI('checkSession', {
            token: token
          });

          if (response && response.success && response.redirectPage) {
            var dashboardUrl = getDashboardUrl(response.redirectPage);

            if (!dashboardUrl) {
              safeRemoveStorage(SESSION_KEY);
              setError('Invalid dashboard route from server: ' + String(response.redirectPage || '-'));
              setInitialLoading(false);
              return;
            }

            addDebug('Session valid, redirecting', {
              redirectPage: response.redirectPage,
              dashboardUrl: dashboardUrl
            });

            window.location.href = dashboardUrl;
            return;
          }

          safeRemoveStorage(SESSION_KEY);
          setInitialLoading(false);

        } catch (error) {
          safeRemoveStorage(SESSION_KEY);

          addDebug('Session check failed', {
            error: getErrorMessage(error)
          });

          setInitialLoading(false);
        }
      }

      async function handleLogin(event) {
        event.preventDefault();

        if (!username.trim() || !password.trim()) {
          setError('Username dan password wajib diisi.');
          return;
        }

        setLoading(true);
        setError('');
        setSuccess('');

        try {
          var response = await fetchAPI('loginUser', {
            username: username.trim(),
            password: password
          });

          if (!response || !response.success) {
            setError((response && response.message) || 'Login gagal.');
            setLoading(false);
            return;
          }

          if (!response.token) {
            setError('Login berhasil, tapi token tidak dikirim oleh backend.');
            setLoading(false);
            return;
          }

          var saved = safeSetStorage(SESSION_KEY, response.token);

          if (!saved) {
            setError('Browser blocked localStorage. Login token could not be saved.');
            setLoading(false);
            return;
          }

          var dashboardUrl = getDashboardUrl(response.redirectPage);

          if (!dashboardUrl) {
            setError('Login berhasil, tapi redirectPage tidak valid: ' + String(response.redirectPage || '-'));
            setLoading(false);
            return;
          }

          setSuccess('Login berhasil. Redirecting...');

          addDebug('Login success', {
            role: response.role,
            redirectPage: response.redirectPage,
            dashboardUrl: dashboardUrl
          });

          window.location.href = dashboardUrl;

        } catch (error) {
          setError('Server/API error: ' + getErrorMessage(error));
          setLoading(false);
        }
      }

      async function testGasGet() {
        setError('');
        setSuccess('');

        addDebug('GET test started', {
          gasUrl: GAS_WEB_APP_URL
        });

        try {
          var response = await fetch(GAS_WEB_APP_URL, {
            method: 'GET'
          });

          var rawText = await response.text();

          setStatus(String(response.status) + ' ' + String(response.statusText || ''));
          setRawResponse(rawText);

          var parsed = null;

          try {
            parsed = JSON.parse(rawText);
          } catch (error) {
            parsed = null;
          }

          setParsedResponse(parsed);

          addDebug('GET test finished', {
            status: response.status,
            ok: response.ok,
            preview: trimText(rawText, 300),
            parsed: parsed
          });

          if (response.ok) {
            setSuccess('GET test completed. Check debug panel.');
          } else {
            setError('GET test failed with HTTP ' + response.status);
          }

        } catch (error) {
          setError('GET test error: ' + getErrorMessage(error));

          addDebug('GET test failed', {
            error: getErrorMessage(error)
          });
        }
      }

      function clearToken() {
        safeRemoveStorage(SESSION_KEY);
        setSuccess('Token cleared.');
        setError('');

        addDebug('Token cleared manually', {});
      }

      function clearDebug() {
        setDebugRows([]);
        setRawResponse('');
        setParsedResponse(null);
        setStatus('');
      }

      React.useEffect(function () {
        addDebug('Index booted', {
          href: window.location.href,
          pathname: window.location.pathname,
          hasToken: !!safeGetStorage(SESSION_KEY)
        });

        checkSession();
      }, []);

      if (initialLoading) {
        return h(
          'div',
          { className: 'min-h-screen flex items-center justify-center px-4' },
          h(
            'div',
            { className: 'text-center fade-in' },
            h('div', { className: 'w-12 h-12 border-4 rounded-full animate-spin border-white/20 border-t-white mx-auto mb-4' }),
            h('p', { className: 'text-white/60 text-sm mb-5' }, 'Checking session...'),
            h(
              'button',
              {
                onClick: function () {
                  clearToken();
                  setInitialLoading(false);
                },
                className: 'h-10 px-5 rounded-2xl bg-white/10 border border-white/10 text-white text-sm font-bold hover:bg-white/15'
              },
              'Stop & Clear Session'
            )
          ),
          h(DebugPanel, {
            open: debugOpen,
            setOpen: setDebugOpen,
            debugRows: debugRows,
            rawResponse: rawResponse,
            parsedResponse: parsedResponse,
            status: status,
            onTestGas: testGasGet,
            onClearToken: clearToken,
            onClearDebug: clearDebug
          })
        );
      }

      return h(
        'div',
        { className: 'relative min-h-screen flex items-center justify-center px-4 py-10 overflow-hidden' },

        h('div', { className: 'absolute -top-32 -left-32 w-96 h-96 rounded-full bg-blue-600/20 blur-3xl' }),
        h('div', { className: 'absolute -bottom-32 -right-32 w-96 h-96 rounded-full bg-emerald-600/10 blur-3xl' }),
        h('div', { className: 'absolute top-1/4 left-1/3 w-96 h-96 rounded-full bg-purple-600/10 blur-3xl' }),

        h(
          'main',
          { className: 'relative w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-20 items-center' },

          h(
            'section',
            { className: 'hidden lg:block slide-up' },
            h(
              'div',
              { className: 'w-14 h-14 bg-white rounded-3xl flex items-center justify-center mb-6 shadow-2xl shadow-white/10' },
              h(
                'svg',
                {
                  width: '28',
                  height: '28',
                  viewBox: '0 0 24 24',
                  fill: 'none',
                  stroke: '#020617',
                  strokeWidth: '2.5',
                  strokeLinecap: 'round',
                  strokeLinejoin: 'round'
                },
                h('path', { d: 'M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z' })
              )
            ),
            h(
              'h1',
              { className: 'text-5xl font-black tracking-tight leading-tight mb-4' },
              'Management ',
              h('br'),
              h(
                'span',
                { className: 'text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400' },
                'System Hub.'
              )
            ),
            h(
              'p',
              { className: 'text-lg text-white/60 leading-relaxed max-w-md' },
              'Centralized platform untuk mengelola absensi kelas, supply inventory, dan aktivitas Team Leader.'
            ),
            h(
              'div',
              { className: 'mt-6 flex gap-3' },
              ['Admin', 'Team Leader', 'Management'].map(function (label) {
                return h(
                  'div',
                  {
                    key: label,
                    className: 'rounded-2xl bg-white/10 border border-white/10 px-4 py-3'
                  },
                  h('p', { className: 'text-sm font-semibold' }, label)
                );
              })
            ),
            h(
              'div',
              { className: 'mt-6 rounded-3xl border border-white/10 bg-white/5 p-4' },
              h('p', { className: 'text-sm font-black mb-2' }, 'Debug-safe build'),
              h(
                'p',
                { className: 'text-sm text-white/50 leading-relaxed' },
                'No Babel, no JSX, no import, no module. This page is pure browser-safe React.'
              )
            )
          ),

          h(
            'section',
            { className: 'w-full max-w-md mx-auto lg:mx-0 slide-up' },
            h(
              'div',
              { className: 'relative' },
              h('div', { className: 'absolute inset-0 bg-gradient-to-r from-blue-500/20 to-emerald-500/20 rounded-[2.5rem] blur-xl opacity-50' }),

              h(
                'div',
                { className: 'relative bg-[#0b1120]/85 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-8 sm:p-10 shadow-2xl' },

                h(
                  'div',
                  { className: 'mb-8' },
                  h('h2', { className: 'text-2xl font-black mb-2' }, 'Welcome back'),
                  h('p', { className: 'text-white/50 text-sm' }, 'Silakan login untuk mengakses dashboard kamu.')
                ),

                error
                  ? h(AlertBox, { type: 'error', text: error })
                  : null,

                success
                  ? h(AlertBox, { type: 'success', text: success })
                  : null,

                h(
                  'form',
                  {
                    onSubmit: handleLogin,
                    className: 'space-y-5'
                  },

                  h(
                    'div',
                    null,
                    h('label', { className: 'block text-sm font-semibold text-white/70 mb-2 pl-1' }, 'Username'),
                    h('input', {
                      type: 'text',
                      value: username,
                      disabled: loading,
                      autoComplete: 'username',
                      placeholder: 'Enter your username',
                      onChange: function (event) {
                        setUsername(event.target.value);
                      },
                      className: 'w-full h-12 rounded-2xl bg-black/40 border border-white/10 text-white px-4 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition disabled:opacity-50'
                    })
                  ),

                  h(
                    'div',
                    null,
                    h('label', { className: 'block text-sm font-semibold text-white/70 mb-2 pl-1' }, 'Password'),
                    h('input', {
                      type: 'password',
                      value: password,
                      disabled: loading,
                      autoComplete: 'current-password',
                      placeholder: '••••••••',
                      onChange: function (event) {
                        setPassword(event.target.value);
                      },
                      className: 'w-full h-12 rounded-2xl bg-black/40 border border-white/10 text-white px-4 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition disabled:opacity-50'
                    })
                  ),

                  h(
                    'button',
                    {
                      type: 'submit',
                      disabled: loading,
                      className: 'w-full h-12 rounded-2xl bg-white text-slate-950 font-black tracking-wide hover:bg-slate-200 active:scale-[0.98] transition-all disabled:opacity-70 disabled:cursor-not-allowed'
                    },
                    loading ? 'Logging in...' : 'Login'
                  )
                ),

                h(
                  'div',
                  { className: 'mt-6 grid grid-cols-2 gap-3' },
                  h(
                    'button',
                    {
                      type: 'button',
                      onClick: testGasGet,
                      className: 'h-10 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-blue-300 text-xs font-black hover:bg-blue-500/15'
                    },
                    'Test GAS'
                  ),
                  h(
                    'button',
                    {
                      type: 'button',
                      onClick: clearToken,
                      className: 'h-10 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-300 text-xs font-black hover:bg-red-500/15'
                    },
                    'Clear Token'
                  )
                ),

                h(
                  'button',
                  {
                    type: 'button',
                    onClick: function () {
                      setDebugOpen(true);
                    },
                    className: 'mt-3 w-full h-10 rounded-2xl bg-white/10 border border-white/10 text-white/70 text-xs font-black hover:bg-white/15'
                  },
                  'Open Debug Panel'
                )
              )
            )
          )
        ),

        h(DebugPanel, {
          open: debugOpen,
          setOpen: setDebugOpen,
          debugRows: debugRows,
          rawResponse: rawResponse,
          parsedResponse: parsedResponse,
          status: status,
          onTestGas: testGasGet,
          onClearToken: clearToken,
          onClearDebug: clearDebug
        })
      );
    }

    function AlertBox(props) {
      var isSuccess = props.type === 'success';

      return h(
        'div',
        {
          className: isSuccess
            ? 'mb-6 p-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 fade-in'
            : 'mb-6 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 fade-in'
        },
        h(
          'p',
          {
            className: isSuccess
              ? 'text-sm text-emerald-300 font-medium leading-relaxed'
              : 'text-sm text-red-300 font-medium leading-relaxed'
          },
          props.text
        )
      );
    }

    function DebugPanel(props) {
      if (!props.open) {
        return h(
          'button',
          {
            type: 'button',
            onClick: function () {
              props.setOpen(true);
            },
            className: 'fixed bottom-4 right-4 z-50 h-11 px-4 rounded-2xl bg-blue-500 text-white text-sm font-black shadow-2xl'
          },
          'Debug'
        );
      }

      return h(
        'aside',
        {
          className: 'fixed bottom-4 right-4 z-50 w-[calc(100vw-2rem)] max-w-xl max-h-[78vh] overflow-hidden rounded-3xl border border-white/10 bg-slate-950/95 text-white shadow-2xl backdrop-blur-2xl fade-in'
        },

        h(
          'div',
          { className: 'flex items-center justify-between gap-3 px-4 py-3 border-b border-white/10' },
          h(
            'div',
            null,
            h('h3', { className: 'text-sm font-black' }, 'Debug Panel'),
            h('p', { className: 'text-xs text-white/40' }, 'Frontend, GAS, token, raw response')
          ),
          h(
            'button',
            {
              type: 'button',
              onClick: function () {
                props.setOpen(false);
              },
              className: 'w-9 h-9 rounded-xl bg-white/10 hover:bg-white/15 flex items-center justify-center font-black'
            },
            '×'
          )
        ),

        h(
          'div',
          { className: 'p-4 overflow-y-auto max-h-[calc(78vh-56px)] space-y-4' },

          h(
            'div',
            { className: 'grid grid-cols-3 gap-2' },
            h(
              'button',
              {
                type: 'button',
                onClick: props.onTestGas,
                className: 'h-10 rounded-xl bg-blue-500/20 border border-blue-500/20 text-blue-200 text-xs font-black'
              },
              'Test GAS'
            ),
            h(
              'button',
              {
                type: 'button',
                onClick: props.onClearToken,
                className: 'h-10 rounded-xl bg-red-500/20 border border-red-500/20 text-red-200 text-xs font-black'
              },
              'Clear Token'
            ),
            h(
              'button',
              {
                type: 'button',
                onClick: props.onClearDebug,
                className: 'h-10 rounded-xl bg-white/10 border border-white/10 text-white/70 text-xs font-black'
              },
              'Clear Log'
            )
          ),

          h(DebugBlock, {
            title: 'Environment',
            data: {
              currentUrl: window.location.href,
              gasUrl: GAS_WEB_APP_URL,
              hasToken: !!safeGetStorage(SESSION_KEY),
              dashboardFiles: DASHBOARD_FILES
            }
          }),

          h(DebugBlock, {
            title: 'Last API Status',
            data: {
              status: props.status || '-'
            }
          }),

          h(
            'div',
            { className: 'rounded-2xl bg-white/5 border border-white/10 p-3' },
            h('h4', { className: 'text-xs font-black text-white/70 mb-2' }, 'Raw Response'),
            h(
              'pre',
              { className: 'text-[11px] leading-relaxed text-white/60 whitespace-pre-wrap break-words max-h-36 overflow-auto' },
              props.rawResponse || 'No raw response yet.'
            )
          ),

          h(DebugBlock, {
            title: 'Parsed JSON',
            data: props.parsedResponse || {
              message: 'No parsed JSON yet.'
            }
          }),

          h(
            'div',
            { className: 'rounded-2xl bg-white/5 border border-white/10 p-3' },
            h('h4', { className: 'text-xs font-black text-white/70 mb-2' }, 'Event Log'),
            props.debugRows.length === 0
              ? h('p', { className: 'text-xs text-white/40' }, 'No debug events yet.')
              : h(
                  'div',
                  { className: 'space-y-2' },
                  props.debugRows.map(function (row, index) {
                    return h(
                      'div',
                      {
                        key: index,
                        className: 'rounded-xl bg-black/30 border border-white/5 p-2'
                      },
                      h(
                        'div',
                        { className: 'flex items-center justify-between gap-3 mb-1' },
                        h('p', { className: 'text-xs font-black text-white/80' }, row.label),
                        h('p', { className: 'text-[10px] text-white/35' }, row.time)
                      ),
                      h(
                        'pre',
                        { className: 'text-[10px] text-white/45 whitespace-pre-wrap break-words' },
                        JSON.stringify(row.data, null, 2)
                      )
                    );
                  })
                )
          )
        )
      );
    }

    function DebugBlock(props) {
      return h(
        'div',
        { className: 'rounded-2xl bg-white/5 border border-white/10 p-3' },
        h('h4', { className: 'text-xs font-black text-white/70 mb-2' }, props.title),
        h(
          'pre',
          { className: 'text-[11px] leading-relaxed text-white/60 whitespace-pre-wrap break-words max-h-44 overflow-auto' },
          JSON.stringify(props.data, null, 2)
        )
      );
    }

    var rootElement = document.getElementById('root');

    if (ReactDOM.createRoot) {
      ReactDOM.createRoot(rootElement).render(h(App));
    } else {
      ReactDOM.render(h(App), rootElement);
    }
  </script>
</body>
</html>
