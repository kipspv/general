<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Manager Workspace - Kampung Inggris Pontianak</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            display: ["Lexend", "system-ui", "sans-serif"]
          },
          borderRadius: {
            "2xl": "1rem",
            "3xl": "1.5rem",
            "4xl": "2rem"
          }
        }
      }
    };
  </script>

  <style>
    :root { --dock-bottom: max(18px, env(safe-area-inset-bottom)); }
    * {
      -webkit-tap-highlight-color: transparent;
      transition: background-color 420ms ease, color 420ms ease, border-color 420ms ease, box-shadow 420ms ease, opacity 260ms ease, transform 260ms ease;
    }
    body { font-family: "Lexend", system-ui, sans-serif; }
    input, select, textarea { color-scheme: light; }
    .dark input, .dark select, .dark textarea { color-scheme: dark; }

    .fade-in { animation: fadeIn .45s ease both; }
    .slide-up { animation: slideUp .5s ease both; }
    .dock-pop { animation: dockPop .45s cubic-bezier(.2,.9,.2,1.2) both; }
    .modal-pop { animation: modalPop .28s cubic-bezier(.2,.9,.2,1.1) both; }
    .toast-in { animation: toastIn .32s ease both; }
    .theme-switching { pointer-events: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes dockPop { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes modalPop { from { opacity: 0; transform: translateY(18px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .glass-light { background: rgba(255,255,255,.78); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .glass-dark { background: rgba(15,23,42,.78); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .dock-glass-light { background: rgba(255,255,255,.82); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); }
    .dock-glass-dark { background: rgba(15,23,42,.84); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); }

    .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, .45); border-radius: 999px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, .7); }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 600, "GRAD" 0, "opsz" 24;
      line-height: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      *, .fade-in, .slide-up, .dock-pop, .modal-pop, .toast-in {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-950 dark:bg-[#020617] dark:text-white overflow-x-hidden">
  <div id="app"></div>

  <script>
    "use strict";

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxDYWpPcpH-viZMhGHPAxmpWP19GDb1JTuylNG_WH92atxCquoJ06vbPkN3GXifdQZqSQ/exec";
    const SESSION_KEY = "gas_auth_token";
    const THEME_KEY = "management_dashboard_theme";

    const MONTH_NAMES = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    const DEFAULT_ATTENDANCE_SETTINGS = { lowMax: 3, mediumMin: 4, mediumMax: 7, highMin: 8 };
    const DEFAULT_SUPPLY_SETTINGS = { lowMax: 50, mediumMin: 51, mediumMax: 100, highMin: 101 };
    const today = new Date();
    const todayString = today.toISOString().slice(0, 10);

    const state = {
      theme: localStorage.getItem(THEME_KEY) || "dark",
      activeMenu: "dashboard",
      user: null,
      loading: true,
      saving: false,
      accessError: "",
      toast: null,
      confirmDialog: null,

      branches: [],
      classes: [],
      inventory: [],

      dashboardMonth: today.getMonth() + 1,
      dashboardYear: today.getFullYear(),
      dashboardStudents: [],
      dashboardSupplies: [],

      trackerDate: todayString,
      trackerData: [],
      trackerLoading: false,

      users: [],
      tasks: [],

      dashboardTab: "attendance",
      taskTab: "tracker",

      taskModalOpen: false,
      taskEditItem: null,
      taskForm: emptyTaskForm(),

      userModalOpen: false,
      userEditItem: null,
      userForm: emptyUserForm()
    };

    const app = document.getElementById("app");

    function isDark() { return state.theme === "dark"; }
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function safeNumber(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }
    function normalizeDate(value) {
      const dateObj = new Date(value);
      if (Number.isNaN(dateObj.getTime())) return "";
      return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, "0")}-${String(dateObj.getDate()).padStart(2, "0")}`;
    }
    function getToken() { return localStorage.getItem(SESSION_KEY); }

    async function fetchAPI(action, payload = {}) {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, payload })
      });

      if (!response.ok) throw new Error("Network response was not ok");
      return response.json();
    }

    function setState(patch, shouldRender = true) {
      Object.assign(state, patch);
      applyTheme();
      if (shouldRender) render();
    }

    function applyTheme() {
      document.documentElement.classList.toggle("dark", isDark());
      localStorage.setItem(THEME_KEY, state.theme);
    }

    function redirectToLogin() {
      window.location.href = "index.html";
    }

    function showToast(type, text) {
      state.toast = { type, text };
      render();
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        state.toast = null;
        render();
      }, 3400);
    }

    function showSuccess(text) { showToast("success", text || "Success."); }
    function showError(text) { showToast("error", text || "Something went wrong."); }

    function openConfirm(config) {
      state.confirmDialog = {
        title: config.title || "Are you sure?",
        message: config.message || "This action needs confirmation.",
        confirmText: config.confirmText || "Confirm",
        cancelText: config.cancelText || "Cancel",
        tone: config.tone || "danger",
        actionName: config.actionName || ""
      };
      render();
    }

    function closeConfirm() {
      state.confirmDialog = null;
      render();
    }

    function toggleTheme() {
      document.body.classList.add("theme-switching");
      state.theme = isDark() ? "light" : "dark";
      applyTheme();
      render();
      setTimeout(() => document.body.classList.remove("theme-switching"), 450);
    }

    async function boot() {
      setState({ loading: true, accessError: "" }, false);
      applyTheme();

      try {
        const token = getToken();
        if (!token) return redirectToLogin();

        const sessionResponse = await fetchAPI("getUserSession", { token });
        if (!sessionResponse.success) {
          localStorage.removeItem(SESSION_KEY);
          return redirectToLogin();
        }

        if (!sessionResponse.user || sessionResponse.user.role !== "Management") {
          setState({
            accessError: "Akses ditolak. Halaman ini hanya untuk Management.",
            loading: false
          });
          return;
        }

        state.user = sessionResponse.user;

        const [branchRes, classRes, invRes] = await Promise.all([
          fetchAPI("getManagementBranches", { token }),
          fetchAPI("getClassDetails", { token }),
          fetchAPI("getInventoryDetails", { token })
        ]);

        state.branches = branchRes.success ? (branchRes.data || []) : [];
        state.classes = classRes.success ? (classRes.data || []) : [];
        state.inventory = invRes.success ? (invRes.data || []) : [];

        await loadDashboardMatrices(token, state.dashboardMonth, state.dashboardYear, false);

      } catch (error) {
        console.error(error);
        state.accessError = "Gagal memuat Management Dashboard.";
      } finally {
        state.loading = false;
        render();
      }
    }

    async function handleLogout() {
      closeConfirm();
      try {
        const token = getToken();
        if (token) await fetchAPI("logoutUser", { token });
      } catch (error) {
        console.error(error);
      }
      localStorage.removeItem(SESSION_KEY);
      redirectToLogin();
    }

    async function loadDashboardMatrices(tokenParam, month, year, shouldRender = true) {
      const token = tokenParam || getToken();
      const filters = { month: Number(month), year: Number(year) };

      try {
        const [studentsRes, suppliesRes] = await Promise.all([
          fetchAPI("getManagementStudents", { token, filters }),
          fetchAPI("getManagementSupplies", { token, filters })
        ]);

        state.dashboardStudents = studentsRes.success ? (studentsRes.data || []) : [];
        state.dashboardSupplies = suppliesRes.success ? (suppliesRes.data || []) : [];

        if (!studentsRes.success) showError(studentsRes.message || "Gagal memuat data students.");
        if (!suppliesRes.success) showError(suppliesRes.message || "Gagal memuat data supplies.");
      } catch (error) {
        console.error(error);
        showError("Gagal memuat data matriks dashboard.");
      } finally {
        if (shouldRender) render();
      }
    }

    async function loadTrackerData(date) {
      state.trackerLoading = true;
      render();

      try {
        const response = await fetchAPI("getManagementActivityTracker", { token: getToken(), date });
        if (response.success) {
          state.trackerData = response.data || [];
        } else {
          state.trackerData = [];
          showError(response.message || "Gagal memuat data tracker.");
        }
      } catch (error) {
        console.error(error);
        showError("Error saat menghubungi tracker.");
      } finally {
        state.trackerLoading = false;
        render();
      }
    }

    async function loadUsers() {
      try {
        const response = await fetchAPI("getAuthUsers", { token: getToken() });
        if (response.success) state.users = response.data || [];
        else showError(response.message || "Gagal memuat users.");
      } catch (error) {
        console.error(error);
        showError("Gagal memuat users.");
      } finally {
        render();
      }
    }

    async function loadTasks() {
      try {
        const response = await fetchAPI("getTeamLeaderActivityTasks", {
          token: getToken(),
          filters: { includeInactive: true }
        });
        if (response.success) state.tasks = response.data || [];
        else showError(response.message || "Gagal memuat tasks.");
      } catch (error) {
        console.error(error);
        showError("Gagal memuat tasks.");
      } finally {
        render();
      }
    }

    function changeMenu(menu) {
      state.activeMenu = menu;
      render();

      if (menu === "dashboard") {
        loadDashboardMatrices(null, state.dashboardMonth, state.dashboardYear);
      }
      if (menu === "users") loadUsers();
      if (menu === "tasks") loadTasks();
    }

    function emptyTaskForm() {
      return { shift: "General", taskName: "", description: "", sortOrder: "0", status: "Active" };
    }

    function openTaskModal(item) {
      state.taskEditItem = item || null;
      state.taskForm = item ? {
        shift: item.Shift || "General",
        taskName: item["Task Name"] || "",
        description: item.Description || "",
        sortOrder: item["Sort Order"] || "0",
        status: item.Status || "Active"
      } : emptyTaskForm();
      state.taskModalOpen = true;
      render();
    }

    function closeTaskModal() {
      state.taskModalOpen = false;
      state.taskEditItem = null;
      state.taskForm = emptyTaskForm();
      render();
    }

    async function saveTask() {
      const payload = { ...state.taskForm };
      if (!payload.taskName.trim()) return showError("Task Name wajib diisi.");

      state.saving = true;
      render();

      try {
        const response = state.taskEditItem
          ? await fetchAPI("updateTeamLeaderActivityTask", { token: getToken(), id: state.taskEditItem.ID, payload })
          : await fetchAPI("createTeamLeaderActivityTask", { token: getToken(), payload });

        if (response.success) {
          showSuccess(response.message || "Task berhasil disimpan.");
          closeTaskModal();
          await loadTasks();
        } else {
          showError(response.message || "Gagal menyimpan task.");
        }
      } catch (error) {
        console.error(error);
        showError("Terjadi error saat menyimpan task.");
      } finally {
        state.saving = false;
        render();
      }
    }

    async function disableTask(id) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const response = await fetchAPI("deleteTeamLeaderActivityTask", { token: getToken(), id });
        if (response.success) {
          showSuccess(response.message || "Task berhasil dinonaktifkan.");
          await loadTasks();
        } else {
          showError(response.message || "Gagal menonaktifkan task.");
        }
      } catch (error) {
        console.error(error);
        showError("Terjadi error saat menonaktifkan task.");
      } finally {
        state.saving = false;
        render();
      }
    }

    function emptyUserForm(branches = []) {
      return { username: "", password: "", role: "Team Leader", branch: branches[0] || "Pontianak", status: "Active" };
    }

    function openUserModal(item) {
      state.userEditItem = item || null;
      state.userForm = item ? {
        username: item.Username || "",
        password: item.Password || "",
        role: item.Role || "Team Leader",
        branch: item.Branch || "",
        status: item.Status || "Active"
      } : emptyUserForm(state.branches);
      state.userModalOpen = true;
      render();
    }

    function closeUserModal() {
      state.userModalOpen = false;
      state.userEditItem = null;
      state.userForm = emptyUserForm(state.branches);
      render();
    }

    async function saveUser() {
      const payload = { ...state.userForm };
      if (!payload.username.trim()) return showError("Username wajib diisi.");
      if (!state.userEditItem && !payload.password.trim()) return showError("Password wajib diisi untuk user baru.");

      state.saving = true;
      render();

      try {
        const response = state.userEditItem
          ? await fetchAPI("updateAuthUser", { token: getToken(), username: state.userEditItem.Username, payload })
          : await fetchAPI("createAuthUser", { token: getToken(), payload });

        if (response.success) {
          showSuccess(response.message || "User berhasil disimpan.");
          closeUserModal();
          await loadUsers();
        } else {
          showError(response.message || "Gagal menyimpan user.");
        }
      } catch (error) {
        console.error(error);
        showError("Terjadi error saat menyimpan user.");
      } finally {
        state.saving = false;
        render();
      }
    }

    async function deleteUser(username) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const response = await fetchAPI("deleteAuthUser", { token: getToken(), username });
        if (response.success) {
          showSuccess(response.message || "User berhasil dihapus.");
          await loadUsers();
        } else {
          showError(response.message || "Gagal menghapus user.");
        }
      } catch (error) {
        console.error(error);
        showError("Terjadi error saat menghapus user.");
      } finally {
        state.saving = false;
        render();
      }
    }

    function render() {
      applyTheme();

      if (state.loading) {
        app.innerHTML = pageShell(`
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="text-center fade-in">
              <div class="w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4 ${isDark() ? "border-white/20 border-t-white" : "border-slate-300 border-t-slate-950"}"></div>
              <p class="${isDark() ? "text-white/70" : "text-slate-500"} text-sm">Loading Management Dashboard...</p>
            </div>
          </div>
        `, false);
        return;
      }

      if (state.accessError && !state.user) {
        app.innerHTML = pageShell(`
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="${cardClass()} max-w-md w-full rounded-3xl p-6 text-center">
              <h1 class="text-xl font-black mb-2">Access Error</h1>
              <p class="text-red-500 text-sm mb-5">${escapeHtml(state.accessError)}</p>
              <button data-action="login" class="${primaryButtonClass()}">Back to Login</button>
            </div>
          </div>
        `, false);
        return;
      }

      const content = `
        ${backgroundGlow()}
        <div class="relative min-h-screen pb-32">
          ${header()}
          <main class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
            ${state.activeMenu === "dashboard" ? dashboardMatrixView() : ""}
            ${state.activeMenu === "tasks" ? tasksView() : ""}
            ${state.activeMenu === "users" ? usersView() : ""}
            ${state.activeMenu === "profile" ? profileView() : ""}
          </main>
          ${macDock()}
          ${toastHtml()}
          ${confirmDialogHtml()}
          ${state.taskModalOpen ? taskModalHtml() : ""}
          ${state.userModalOpen ? userModalHtml() : ""}
        </div>
      `;

      app.innerHTML = pageShell(content, false);
    }

    function pageShell(content) {
      return `<div class="${isDark() ? "dark min-h-screen bg-[#020617] text-white" : "min-h-screen bg-slate-100 text-slate-950"}">${content}</div>`;
    }

    function header() {
      return `
        <header class="${isDark() ? "sticky top-0 z-30 bg-[#020617]/80 backdrop-blur-xl border-b border-white/10" : "sticky top-0 z-30 bg-slate-100/80 backdrop-blur-xl border-b border-slate-200"}">
          <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between gap-4">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <div class="w-9 h-9 rounded-2xl flex items-center justify-center ${isDark() ? "bg-white text-slate-950" : "bg-slate-950 text-white"}">
                  ${icon("auto_awesome", "text-xl")}
                </div>
                <h1 class="text-xl sm:text-2xl font-black tracking-tight">Management System</h1>
              </div>
              <p class="${mutedClass()}">${escapeHtml(state.user?.username || "-")} • ${escapeHtml(state.user?.role || "-")} • Global Access</p>
            </div>
            <div class="flex items-center gap-2">
              <button data-action="toggle-theme" class="${iconButtonClass()}" title="Toggle theme">
                ${icon(isDark() ? "light_mode" : "dark_mode", "text-xl")}
              </button>
              <button data-action="logout-confirm" class="${iconButtonClass()}" title="Logout">
                ${icon("logout", "text-xl")}
              </button>
            </div>
          </div>
        </header>
      `;
    }

    function dashboardMatrixView() {
      const daysInMonth = new Date(Number(state.dashboardYear), Number(state.dashboardMonth), 0).getDate();
      const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);
      const attendanceMatrix = buildAttendanceMatrix(daysArray);
      const suppliesMatrix = buildSuppliesMatrix(daysArray);
      const currentMatrix = state.dashboardTab === "attendance" ? attendanceMatrix : suppliesMatrix;

      const branchCards = state.branches.map(branch => {
        const data = currentMatrix[branch] || [];
        if (!data.length) return "";

        return `
          <div class="${cardClass()} rounded-3xl p-5 sm:p-6 overflow-hidden">
            <div class="flex items-center gap-2 mb-4">
              <span class="w-3 h-3 rounded-full bg-blue-500"></span>
              <h3 class="text-lg font-black tracking-wide uppercase">${escapeHtml(branch)}</h3>
              <span class="${badgeClass()} ml-auto">${data.length} rows</span>
            </div>
            <div class="max-h-[56vh] overflow-auto custom-scroll border ${isDark() ? "border-white/5" : "border-slate-200"} rounded-2xl">
              <table class="w-full min-w-[1200px] text-xs">
                <thead class="${isDark() ? "sticky top-0 z-10 bg-slate-900/95 backdrop-blur-xl border-b border-white/10" : "sticky top-0 z-10 bg-white/95 backdrop-blur-xl border-b border-slate-200"}">
                  <tr>
                    <th class="sticky left-0 z-20 py-3 px-4 text-left min-w-[220px] bg-inherit">Class / Item Info</th>
                    ${daysArray.map(day => `<th class="py-3 px-2 text-center min-w-[45px] ${isWeekend(day) ? "text-red-400" : ""}">${day}</th>`).join("")}
                    <th class="py-3 px-3 text-center font-black min-w-[90px]">Total</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.map(row => `
                    <tr class="${isDark() ? "border-b border-white/5 hover:bg-white/5" : "border-b border-slate-100 hover:bg-slate-50"}">
                      <td class="sticky left-0 z-10 py-3 px-4 ${isDark() ? "bg-[#0b1120]" : "bg-white"}">
                        <p class="font-black">${escapeHtml(row["Trainer Name"] || row.trainerName || "-")}</p>
                        <p class="opacity-60 text-[10px]">${escapeHtml(row["Jam/Section"] || "")} • ${escapeHtml(row.Level || "")}</p>
                      </td>
                      ${row.rowDays.map(day => `
                        <td class="py-2 px-1 text-center border-l ${isDark() ? "border-white/5" : "border-slate-100"}">
                          ${state.dashboardTab === "attendance"
                            ? `<span class="${getAttendanceColor(day.val)}">${escapeHtml(day.val)}</span>`
                            : `<span class="${getSupplyColor(day.total, day.label)}">${escapeHtml(day.label)}</span>`}
                        </td>
                      `).join("")}
                      <td class="py-3 px-3 text-center font-black bg-blue-500/10 text-blue-500">
                        ${state.dashboardTab === "attendance" ? escapeHtml(row.total) : `${escapeHtml(row.totalP)}/${escapeHtml(row.totalPr)}`}
                      </td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }).join("");

      return `
        <section class="space-y-6 slide-up">
          <div class="${cardClass()} rounded-3xl p-5 sm:p-6">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-3xl flex items-center justify-center ${softBoxClass()}">${icon("monitoring", "text-2xl")}</div>
                <div>
                  <h2 class="text-xl font-black">Global Data Matrix</h2>
                  <p class="${mutedClass()}">1-${daysInMonth} day view tracking across all active branches.</p>
                </div>
              </div>

              <div class="flex flex-wrap items-end gap-3">
                <div class="flex rounded-xl overflow-hidden border ${isDark() ? "border-white/10" : "border-slate-200"}">
                  <button data-tab="attendance" class="matrix-tab px-4 py-2 text-sm font-black ${state.dashboardTab === "attendance" ? "bg-blue-500 text-white" : isDark() ? "bg-white/5 text-white/50" : "bg-slate-200 text-slate-500"}">Attendance</button>

    function buildAttendanceMatrix(daysArray) {
      const dict = {};
      state.dashboardStudents.forEach(item => {
        const dt = normalizeDate(item.Date);
        const key = `${item.Branch}|${dt}|${item["Jam/Section"]}|${item.Level}|${item["Trainer Name"]}`;
        dict[key] = item["Murid Hadir"];
      });

      const grouped = {};
      state.branches.forEach(branch => { grouped[branch] = []; });

      state.classes.filter(item => item.Status === "Active").forEach(item => {
        if (!grouped[item.Branch]) grouped[item.Branch] = [];

        const rowDays = daysArray.map(day => {
          const dateStr = `${state.dashboardYear}-${String(state.dashboardMonth).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
          const key = `${item.Branch}|${dateStr}|${item["Jam/Section"]}|${item.Level}|${item["Trainer Name"]}`;
          return { day, val: dict[key] !== undefined && dict[key] !== "" ? dict[key] : "-" };
        });

        const total = rowDays.reduce((sum, day) => sum + (day.val !== "-" ? safeNumber(day.val) : 0), 0);
        grouped[item.Branch].push({ ...item, rowDays, total });
      });

      return grouped;
    }

    function buildSuppliesMatrix(daysArray) {
      const dict = {};
      state.dashboardSupplies.forEach(item => {
        const dt = normalizeDate(item.Date);
        const key = `${item.Branch}|${dt}|${item["Jam/Section"]}|${item.Level}|${item["Trainer Name"]}`;
        dict[key] = { p: item["Paper Used"], pr: item["Printing Used"] };
      });

      const grouped = {};
      state.branches.forEach(branch => { grouped[branch] = []; });

      state.inventory.filter(item => item.Status === "Active").forEach(item => {
        if (!grouped[item.Branch]) grouped[item.Branch] = [];

        const rowDays = daysArray.map(day => {
          const dateStr = `${state.dashboardYear}-${String(state.dashboardMonth).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
          const key = `${item.Branch}|${dateStr}|${item["Jam/Section"]}|${item.Level}|${item["Trainer Name"]}`;
          const val = dict[key];
          const paper = val ? safeNumber(val.p) : 0;
          const printing = val ? safeNumber(val.pr) : 0;
          return {
            day,
            label: val ? `${paper}/${printing}` : "-",
            total: paper + printing
          };
        });

        const totalP = rowDays.reduce((sum, day) => sum + (day.label !== "-" ? safeNumber(day.label.split("/")[0]) : 0), 0);
        const totalPr = rowDays.reduce((sum, day) => sum + (day.label !== "-" ? safeNumber(day.label.split("/")[1]) : 0), 0);
        grouped[item.Branch].push({ ...item, rowDays, totalP, totalPr });
      });

      return grouped;
    }

    function isWeekend(day) {
      const d = new Date(Number(state.dashboardYear), Number(state.dashboardMonth) - 1, day).getDay();
      return d === 0 || d === 6;

        <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
          <div class="absolute -top-24 -left-24 w-96 h-96 rounded-full blur-3xl ${isDark() ? "bg-blue-500/10" : "bg-blue-300/20"}"></div>
          <div class="absolute top-1/3 -right-24 w-96 h-96 rounded-full blur-3xl ${isDark() ? "bg-purple-500/10" : "bg-purple-300/20"}"></div>
          <div class="absolute -bottom-32 left-1/3 w-96 h-96 rounded-full blur-3xl ${isDark() ? "bg-emerald-500/10" : "bg-emerald-300/20"}"></div>
        </div>
      `;
    }

    function getAttendanceColor(val) {
      if (val === "-" || val === "") return "inline-flex min-w-7 h-7 items-center justify-center rounded bg-slate-500/10 text-slate-400 text-[10px] font-black";
      const num = safeNumber(val);
      if (num <= DEFAULT_ATTENDANCE_SETTINGS.lowMax) return "inline-flex min-w-7 h-7 items-center justify-center rounded bg-red-500/20 text-red-500 text-[10px] font-black";
      if (num >= DEFAULT_ATTENDANCE_SETTINGS.highMin) return "inline-flex min-w-7 h-7 items-center justify-center rounded bg-emerald-500/20 text-emerald-500 text-[10px] font-black";
      return "inline-flex min-w-7 h-7 items-center justify-center rounded bg-amber-500/20 text-amber-500 text-[10px] font-black";
    }

    function getSupplyColor(total, label) {
      if (label === "-" || label === "") return "inline-flex min-w-9 h-7 items-center justify-center rounded bg-slate-500/10 text-slate-400 text-[10px] font-black px-1";
      const num = safeNumber(total);
      if (num <= DEFAULT_SUPPLY_SETTINGS.lowMax) return "inline-flex min-w-9 h-7 items-center justify-center rounded bg-red-500/20 text-red-500 text-[10px] font-black px-1";
      if (num >= DEFAULT_SUPPLY_SETTINGS.highMin) return "inline-flex min-w-9 h-7 items-center justify-center rounded bg-emerald-500/20 text-emerald-500 text-[10px] font-black px-1";
      return "inline-flex min-w-9 h-7 items-center justify-center rounded bg-amber-500/20 text-amber-500 text-[10px] font-black px-1";
    }

    function icon(name, className = "text-xl") {
      return `<span class="material-symbols-outlined ${className}">${name}</span>`;
    }

    function cardClass() {
      return isDark() ? "glass-dark border border-white/10 shadow-2xl" : "glass-light border border-white shadow-xl";
    }
    function softBoxClass() {
      return isDark() ? "bg-white/10 border border-white/10" : "bg-slate-950/5 border border-slate-200";
    }
    function mutedClass() {
      return isDark() ? "text-sm text-white/50" : "text-sm text-slate-500";
    }
    function badgeClass() {
      return isDark()
        ? "inline-flex items-center h-8 px-3 rounded-full bg-white/10 border border-white/10 text-xs font-black"
        : "inline-flex items-center h-8 px-3 rounded-full bg-slate-950/5 border border-slate-200 text-xs font-black";
    }
    function inputClass(disabled = false) {
      if (disabled) return isDark()
        ? "w-full h-10 rounded-xl bg-white/5 border border-white/10 px-3 outline-none opacity-50"
        : "w-full h-10 rounded-xl bg-slate-100 border border-slate-200 px-3 outline-none opacity-50";
      return isDark()
        ? "w-full h-10 rounded-xl bg-white/10 border border-white/10 text-white px-3 outline-none focus:border-white/30"
        : "w-full h-10 rounded-xl bg-white border border-slate-200 text-slate-900 px-3 outline-none focus:border-slate-400";
    }
    function primaryButtonClass() {
      return isDark()
        ? "w-full h-10 rounded-xl bg-white text-slate-900 font-black hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed"
        : "w-full h-10 rounded-xl bg-slate-950 text-white font-black hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed";
    }
    function secondaryButtonClass() {
      return isDark()
        ? "h-10 px-4 rounded-xl bg-white/10 border border-white/10 text-white font-black hover:bg-white/20"
        : "h-10 px-4 rounded-xl bg-white border border-slate-200 text-slate-700 font-black hover:bg-slate-50";
    }
    function iconButtonClass() {
      return isDark()
        ? "w-10 h-10 rounded-xl bg-white/10 border border-white/10 text-white hover:bg-white/20 flex items-center justify-center"
        : "w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-900 hover:bg-slate-50 flex items-center justify-center";
    }

    document.addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const action = button.dataset.action;
      const menu = button.dataset.menu;
      const matrixTab = button.dataset.tab;
      const taskTab = button.dataset.taskTab;
      const taskEditId = button.dataset.taskEdit;
      const taskDisableId = button.dataset.taskDisable;
      const userEditUsername = button.dataset.userEdit;
      const userDeleteUsername = button.dataset.userDelete;

      if (menu) return changeMenu(menu);

      if (matrixTab) {
        state.dashboardTab = matrixTab;
        render();
        return;
      }

      if (taskTab) {
        state.taskTab = taskTab;
        render();
        if (taskTab === "master") loadTasks();
        return;
      }

      if (taskEditId) {
        const item = state.tasks.find(task => String(task.ID) === String(taskEditId));
        return openTaskModal(item);
      }

      if (taskDisableId) {
        return openConfirm({
          title: "Disable Task?",
          message: "Task ini akan dinonaktifkan dari master checklist.",
          confirmText: "Disable",
          tone: "danger",
          actionName: `disable-task:${taskDisableId}`
        });
      }

      if (userEditUsername) {
        const item = state.users.find(user => String(user.Username) === String(userEditUsername));
        return openUserModal(item);
      }

      if (userDeleteUsername) {
        return openConfirm({
          title: "Delete User?",
          message: `User ${userDeleteUsername} akan dihapus dari akses sistem.`,
          confirmText: "Delete",
          tone: "danger",
          actionName: `delete-user:${userDeleteUsername}`
        });
      }

      switch (action) {
        case "login":
          redirectToLogin();
          break;
        case "toggle-theme":
          toggleTheme();
          break;
        case "logout-confirm":
          openConfirm({
            title: "Logout?",
            message: "Session kamu akan diakhiri dan kamu akan kembali ke halaman login.",
            confirmText: "Logout",
            tone: "neutral",
            actionName: "logout"
          });
          break;
        case "close-confirm":
          closeConfirm();
          break;
        case "confirm-action":
          if (!state.confirmDialog) return;
          if (state.confirmDialog.actionName === "logout") return handleLogout();
          if (state.confirmDialog.actionName.startsWith("disable-task:")) return disableTask(state.confirmDialog.actionName.split(":")[1]);
          if (state.confirmDialog.actionName.startsWith("delete-user:")) return deleteUser(state.confirmDialog.actionName.split(":")[1]);
          break;
        case "load-tracker":
          loadTrackerData(state.trackerDate);
          break;
        case "add-task":
          openTaskModal(null);
          break;
        case "close-task-modal":
          closeTaskModal();
          break;
        case "save-task":
          saveTask();
          break;
        case "add-user":
          openUserModal(null);
          break;
        case "close-user-modal":
          closeUserModal();
          break;
        case "save-user":
          saveUser();
          break;
      }
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (!target || !target.id) return;

      if (target.id === "dashboard-month") {
        state.dashboardMonth = Number(target.value);
        render();
        loadDashboardMatrices(null, state.dashboardMonth, state.dashboardYear);
      }
      if (target.id === "dashboard-year") {
        state.dashboardYear = Number(target.value);
        render();
        loadDashboardMatrices(null, state.dashboardMonth, state.dashboardYear);
      }
      if (target.id === "tracker-date") {
        state.trackerDate = target.value;
      }

      if (target.id === "task-shift") state.taskForm.shift = target.value;
      if (target.id === "task-status") state.taskForm.status = target.value;
      if (target.id === "user-role") {
        state.userForm.role = target.value;
        if (target.value === "Management") state.userForm.branch = "";
        render();
      }
      if (target.id === "user-status") state.userForm.status = target.value;
      if (target.id === "user-branch") state.userForm.branch = target.value;
    });

    document.addEventListener("input", (event) => {
      const target = event.target;
      if (!target || !target.id) return;

      if (target.id === "task-name") state.taskForm.taskName = target.value;
      if (target.id === "task-description") state.taskForm.description = target.value;
      if (target.id === "task-sort") state.taskForm.sortOrder = target.value;

      if (target.id === "user-username") state.userForm.username = target.value;
      if (target.id === "user-password") state.userForm.password = target.value;
    });

    applyTheme();
    render();
    boot();
  </script>
</body>
</html>
