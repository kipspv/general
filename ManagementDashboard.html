<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Management Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root { --dock-bottom: max(18px, env(safe-area-inset-bottom)); }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .fade-in { animation: fadeIn 0.35s ease both; }
    .slide-up { animation: slideUp 0.38s ease both; }
    .dock-pop { animation: dockPop 0.35s cubic-bezier(.2,.9,.2,1.2) both; }
    .modal-pop { animation: modalPop 0.24s cubic-bezier(.2,.9,.2,1.1) both; }
    .toast-in { animation: toastIn 0.26s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dockPop {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(14px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    input, select, textarea { color-scheme: light; }
    .dark input, .dark select, .dark textarea { color-scheme: dark; }

    .glass-light {
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-dark {
      background: rgba(15,23,42,.76);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .dock-glass-light {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .dock-glass-dark {
      background: rgba(15,23,42,.84);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scroll::-webkit-scrollbar-track { background: transparent; }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, .45);
      border-radius: 999px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, .7); }

    @media (prefers-reduced-motion: reduce) {
      *, .fade-in, .slide-up, .dock-pop, .modal-pop, .toast-in {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyNngZ57fzkW_GcM6nAxwKoEGL-oIwkK7_URfXVmAF8XIdunWx792jGQWYNXnfkxyYiMQ/exec';
    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'management_dashboard_theme';

    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const DEFAULT_ATTENDANCE_SETTINGS = {
      lowMax: 3,
      mediumMin: 4,
      mediumMax: 7,
      highMin: 8
    };

    const DEFAULT_SUPPLY_SETTINGS = {
      lowMax: 50,
      mediumMin: 51,
      mediumMax: 100,
      highMin: 101
    };

    const SHIFT_OPTIONS = [
      { value: 'General', label: 'General / All' },
      { value: 'Shift 1', label: 'Shift 1' },
      { value: 'Shift 2', label: 'Shift 2' },
      { value: 'Shift 3', label: 'Shift 3' }
    ];

    const ROLE_OPTIONS = [
      { value: 'Admin', label: 'Admin' },
      { value: 'Team Leader', label: 'Team Leader' },
      { value: 'Management', label: 'Management' }
    ];

    const STATUS_OPTIONS = [
      { value: 'Active', label: 'Active' },
      { value: 'Inactive', label: 'Inactive' }
    ];

    const TODAY = new Date().toISOString().slice(0, 10);

    const state = {
      loading: true,
      saving: false,
      theme: safeGet(THEME_KEY) || 'dark',
      activeMenu: 'dashboard',
      user: null,
      accessError: '',

      toast: null,
      confirmDialog: null,
      confirmAction: null,

      branches: [],
      classes: [],
      inventory: [],

      dashboardTab: 'attendance',
      dashboardMonth: new Date().getMonth() + 1,
      dashboardYear: new Date().getFullYear(),
      dashboardStudents: [],
      dashboardSupplies: [],

      taskTab: 'tracker',
      trackerDate: TODAY,
      trackerData: [],
      trackerLoading: false,

      users: [],
      tasks: [],

      taskModalOpen: false,
      taskEditItem: null,
      taskForm: defaultTaskForm(),

      userModalOpen: false,
      userEditItem: null,
      userForm: defaultUserForm()
    };

    const root = document.getElementById('root');

    async function apiCall(action, data = {}) {
      if (!GAS_API_URL || GAS_API_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS API URL belum diisi.');
      }

      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action,
          ...data
        })
      });

      if (!response.ok) {
        throw new Error('HTTP error ' + response.status);
      }

      return response.json();
    }

    function safeGet(key) {
      try { return localStorage.getItem(key); } catch (error) { return ''; }
    }

    function safeSet(key, value) {
      try { localStorage.setItem(key, value); } catch (error) {}
    }

    function safeRemove(key) {
      try { localStorage.removeItem(key); } catch (error) {}
    }

    function esc(value) {
      return String(value === null || value === undefined ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function isDark() {
      return state.theme === 'dark';
    }

    function redirectToLogin() {
      window.location.href = 'Index.html';
    }

    function pageClass() {
      return isDark()
        ? 'dark min-h-screen bg-[#020617] text-white'
        : 'min-h-screen bg-slate-100 text-slate-950';
    }

    function cardClass() {
      return isDark()
        ? 'glass-dark border border-white/10 shadow-2xl shadow-black/20'
        : 'glass-light border border-white shadow-xl shadow-slate-300/40';
    }

    function softBoxClass() {
      return isDark()
        ? 'bg-white/5 border border-white/10'
        : 'bg-slate-950/5 border border-slate-200';
    }

    function mutedClass() {
      return isDark()
        ? 'text-sm text-white/50'
        : 'text-sm text-slate-500';
    }

    function badgeClass() {
      return isDark()
        ? 'inline-flex h-8 items-center px-3 rounded-full bg-white/10 border border-white/10 text-white/80 text-xs font-black'
        : 'inline-flex h-8 items-center px-3 rounded-full bg-slate-950/5 border border-slate-200 text-slate-700 text-xs font-black';
    }

    function inputClass(disabled) {
      if (disabled) {
        return isDark()
          ? 'w-full h-11 rounded-2xl bg-white/5 border border-white/10 text-white/40 px-4 outline-none cursor-not-allowed'
          : 'w-full h-11 rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 px-4 outline-none cursor-not-allowed';
      }

      return isDark()
        ? 'w-full h-11 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 outline-none focus:ring-2 focus:ring-white/30'
        : 'w-full h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 outline-none focus:ring-2 focus:ring-slate-300';
    }

    function textareaClass() {
      return isDark()
        ? 'w-full rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 py-3 outline-none focus:ring-2 focus:ring-white/30 resize-none'
        : 'w-full rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 py-3 outline-none focus:ring-2 focus:ring-slate-300 resize-none';
    }

    function primaryButtonClass() {
      return isDark()
        ? 'w-full h-11 rounded-2xl bg-white text-slate-950 font-black hover:bg-slate-200 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed'
        : 'w-full h-11 rounded-2xl bg-slate-950 text-white font-black hover:bg-slate-800 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed';
    }

    function secondaryButtonClass() {
      return isDark()
        ? 'h-11 px-4 rounded-2xl bg-white/10 border border-white/10 text-white font-black hover:bg-white/15 disabled:opacity-60 disabled:cursor-not-allowed'
        : 'h-11 px-4 rounded-2xl bg-white border border-slate-200 text-slate-700 font-black hover:bg-slate-50 disabled:opacity-60 disabled:cursor-not-allowed';
    }

    function iconButtonClass() {
      return isDark()
        ? 'w-11 h-11 rounded-2xl bg-white/10 border border-white/10 text-white hover:bg-white/15 flex items-center justify-center'
        : 'w-11 h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 hover:bg-slate-50 flex items-center justify-center';
    }

    function segmentButtonClass(active) {
      if (active) return 'px-4 py-2 text-sm font-black bg-blue-500 text-white';
      return isDark()
        ? 'px-4 py-2 text-sm font-black bg-white/5 text-white/50 hover:bg-white/10'
        : 'px-4 py-2 text-sm font-black bg-slate-200 text-slate-500 hover:bg-slate-300';
    }

    function icon(name, cls) {
      const className = cls || 'w-5 h-5';

      const icons = {
        chart:
          '<path d="M3 3v18h18" />' +
          '<path d="M7 16V9" />' +
          '<path d="M12 16V5" />' +
          '<path d="M17 16v-3" />',
        activity:
          '<path d="M22 12h-4l-3 8-6-16-3 8H2" />',
        user:
          '<path d="M20 21a8 8 0 0 0-16 0" />' +
          '<circle cx="12" cy="7" r="4" />',
        users:
          '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />' +
          '<circle cx="9" cy="7" r="4" />' +
          '<path d="M22 21v-2a4 4 0 0 0-3-3.87" />' +
          '<path d="M16 3.13a4 4 0 0 1 0 7.75" />',
        settings:
          '<path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />' +
          '<path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 7.03 3.84l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.18.36.5.72 1 .9.33.12.7.1 1.1.1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" />',
        spark:
          '<path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z" />',
        sun:
          '<circle cx="12" cy="12" r="4" />' +
          '<path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />',
        moon:
          '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />',
        logout:
          '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />' +
          '<path d="M16 17l5-5-5-5" />' +
          '<path d="M21 12H9" />',
        check:
          '<path d="m20 6-11 11-5-5" />',
        alert:
          '<path d="M12 9v4" />' +
          '<path d="M12 17h.01" />' +
          '<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />',
        trash:
          '<path d="M3 6h18" />' +
          '<path d="M8 6V4h8v2" />' +
          '<path d="M19 6l-1 14H6L5 6" />' +
          '<path d="M10 11v6" />' +
          '<path d="M14 11v6" />',
        edit:
          '<path d="M12 20h9" />' +
          '<path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" />',
        database:
          '<ellipse cx="12" cy="5" rx="8" ry="3" />' +
          '<path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5" />' +
          '<path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />',
        x:
          '<path d="M18 6 6 18" />' +
          '<path d="m6 6 12 12" />',
        empty:
          '<path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />' +
          '<path d="M3.3 7 12 12l8.7-5" />' +
          '<path d="M12 22V12" />'
      };

      return (
        '<svg class="' + className + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
          (icons[name] || icons.spark) +
        '</svg>'
      );
    }

    function normalizeDate(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      if (/^\d{4}-\d{2}-\d{2}/.test(text)) return text.slice(0, 10);
      const date = new Date(text);
      if (isNaN(date.getTime())) return text;
      return date.toISOString().slice(0, 10);
    }

    function getAttendanceColor(value) {
      if (value === '-' || value === '' || value === null || value === undefined) {
        return 'inline-flex min-w-7 h-7 items-center justify-center rounded bg-slate-500/10 text-slate-400 text-[10px] font-black';
      }

      const number = Number(value);

      if (isNaN(number)) {
        return 'inline-flex min-w-7 h-7 items-center justify-center rounded bg-slate-500/10 text-slate-400 text-[10px] font-black';
      }

      if (number <= DEFAULT_ATTENDANCE_SETTINGS.lowMax) {
        return 'inline-flex min-w-7 h-7 items-center justify-center rounded bg-red-500/20 text-red-500 text-[10px] font-black';
      }

      if (number >= DEFAULT_ATTENDANCE_SETTINGS.highMin) {
        return 'inline-flex min-w-7 h-7 items-center justify-center rounded bg-emerald-500/20 text-emerald-500 text-[10px] font-black';
      }

      return 'inline-flex min-w-7 h-7 items-center justify-center rounded bg-amber-500/20 text-amber-500 text-[10px] font-black';
    }

    function getSupplyColor(total, label) {
      if (label === '-' || label === '' || label === null || label === undefined) {
        return 'inline-flex min-w-9 h-7 items-center justify-center rounded bg-slate-500/10 text-slate-400 text-[10px] font-black px-1';
      }

      const number = Number(total);

      if (isNaN(number)) {
        return 'inline-flex min-w-9 h-7 items-center justify-center rounded bg-slate-500/10 text-slate-400 text-[10px] font-black px-1';
      }

      if (number <= DEFAULT_SUPPLY_SETTINGS.lowMax) {
        return 'inline-flex min-w-9 h-7 items-center justify-center rounded bg-red-500/20 text-red-500 text-[10px] font-black px-1';
      }

      if (number >= DEFAULT_SUPPLY_SETTINGS.highMin) {
        return 'inline-flex min-w-9 h-7 items-center justify-center rounded bg-emerald-500/20 text-emerald-500 text-[10px] font-black px-1';
      }

      return 'inline-flex min-w-9 h-7 items-center justify-center rounded bg-amber-500/20 text-amber-500 text-[10px] font-black px-1';
    }

    function render() {
      document.documentElement.classList.toggle('dark', isDark());

      if (state.loading) {
        root.innerHTML = renderLoading();
        return;
      }

      if (state.accessError && !state.user) {
        root.innerHTML = renderAccessError();
        return;
      }

      root.innerHTML = renderApp();
    }

    function renderLoading() {
      return `
        <div class="${pageClass()}">
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="text-center fade-in">
              <div class="w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4 ${isDark() ? 'border-white/20 border-t-white' : 'border-slate-300 border-t-slate-950'}"></div>
              <p class="${isDark() ? 'text-white/70 text-sm' : 'text-slate-500 text-sm'}">Loading Management Dashboard...</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderAccessError() {
      return `
        <div class="${pageClass()}">
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="${cardClass()} max-w-md w-full rounded-3xl p-6 text-center">
              <h1 class="text-xl font-black mb-2">Access Error</h1>
              <p class="text-red-500 text-sm mb-5">${esc(state.accessError)}</p>
              <button data-action="go-login" class="${primaryButtonClass()}">Back to Login</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      return `
        <div class="${pageClass()}">
          ${renderBackgroundGlow()}

          <div class="relative min-h-screen pb-32">
            ${renderHeader()}

            <main class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
              ${state.activeMenu === 'dashboard' ? renderDashboardMatrixView() : ''}
              ${state.activeMenu === 'tasks' ? renderTasksView() : ''}
              ${state.activeMenu === 'users' ? renderUsersView() : ''}
              ${state.activeMenu === 'profile' ? renderProfileView() : ''}
            </main>

            ${renderDock()}
            ${renderToast()}
            ${renderConfirmDialog()}
            ${renderTaskModal()}
            ${renderUserModal()}
          </div>
        </div>
      `;
    }

    function renderHeader() {
      const user = state.user || {};

      return `
        <header class="${isDark() ? 'sticky top-0 z-30 bg-[#020617]/80 backdrop-blur-xl border-b border-white/10' : 'sticky top-0 z-30 bg-slate-100/80 backdrop-blur-xl border-b border-slate-200'}">
          <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between gap-4">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <div class="${isDark() ? 'w-9 h-9 rounded-2xl bg-white text-slate-950 flex items-center justify-center' : 'w-9 h-9 rounded-2xl bg-slate-950 text-white flex items-center justify-center'}">
                    ${icon('spark', 'w-5 h-5')}
                  </div>
                  <h1 class="text-xl sm:text-2xl font-black tracking-tight">Management System</h1>
                </div>
                <p class="${mutedClass()}">${esc(user.username)} • ${esc(user.role)} • Global Access</p>
              </div>

              <div class="flex items-center gap-2">
                <button data-action="toggle-theme" class="${iconButtonClass()}" title="Toggle theme">
                  ${icon(state.theme === 'dark' ? 'sun' : 'moon', 'w-5 h-5')}
                </button>
                <button data-action="confirm-logout" class="${iconButtonClass()}" title="Logout">
                  ${icon('logout', 'w-5 h-5')}
                </button>
              </div>
            </div>
          </div>
        </header>
      `;
    }

    function renderDock() {
      const menus = [
        { key: 'dashboard', label: 'Matrices', icon: 'chart' },
        { key: 'tasks', label: 'Tasks', icon: 'activity' },
        { key: 'users', label: 'Users', icon: 'users' },
        { key: 'profile', label: 'Profile', icon: 'settings' }
      ];

      let buttons = '';

      menus.forEach(function(menu) {
        const active = state.activeMenu === menu.key;

        const activeClass = active
          ? isDark()
            ? 'w-20 h-20 bg-white text-slate-950 -translate-y-3 shadow-xl'
            : 'w-20 h-20 bg-slate-950 text-white -translate-y-3 shadow-xl'
          : isDark()
            ? 'w-16 h-16 bg-white/10 text-white/70 hover:bg-white/15 hover:-translate-y-2'
            : 'w-16 h-16 bg-slate-950/5 text-slate-600 hover:bg-slate-950/10 hover:-translate-y-2';

        buttons += `
          <button data-menu="${menu.key}" class="group relative flex flex-col items-center justify-center rounded-3xl transition-all duration-300 shrink-0 ${activeClass}">
            ${icon(menu.icon, active ? 'w-7 h-7' : 'w-6 h-6')}
            <span class="text-[10px] font-black mt-1 ${active ? 'opacity-100' : 'opacity-70'}">${esc(menu.label)}</span>
          </button>
        `;
      });

      return `
        <nav class="fixed left-0 right-0 z-40 flex justify-center px-4 dock-pop" style="bottom:var(--dock-bottom)">
          <div class="${isDark() ? 'dock-glass-dark border-white/15 shadow-black/40' : 'dock-glass-light border-white shadow-slate-300/60'} border shadow-2xl rounded-[2rem] px-3 py-3 flex items-end gap-2 max-w-full overflow-x-auto custom-scroll">
            ${buttons}
          </div>
        </nav>
      `;
    }

    function renderDashboardMatrixView() {
      const daysInMonth = new Date(Number(state.dashboardYear), Number(state.dashboardMonth), 0).getDate();
      const daysArray = Array.from({ length: daysInMonth }, function(_, index) { return index + 1; });
      const branches = state.branches || [];
      const attendanceMatrix = buildAttendanceMatrix(daysArray);
      const suppliesMatrix = buildSuppliesMatrix(daysArray);

      let monthOptions = '';

      MONTH_NAMES.forEach(function(name, index) {
        const value = index + 1;
        monthOptions += `<option value="${value}" ${Number(state.dashboardMonth) === value ? 'selected' : ''}>${name}</option>`;
      });

      let branchSections = '';

      branches.forEach(function(branch) {
        const data = state.dashboardTab === 'attendance' ? attendanceMatrix[branch] : suppliesMatrix[branch];
        if (!data || data.length === 0) return;

        branchSections += renderBranchMatrix(branch, data, daysArray);
      });

      if (!branchSections) {
        branchSections = renderEmptyState('Belum ada data aktif untuk matrix ini.');
      }

      return `
        <section class="space-y-6 slide-up">
          <div class="${cardClass()} rounded-3xl p-5 sm:p-6">

                ${icon('chart', 'w-8 h-8')}

                  <h2 class="text-xl font-black">Global Data Matrix</h2>
                  <p class="${mutedClass()}">1-31 day view tracking across all active branches.</p>

              </div>

              <div class="flex flex-wrap items-center gap-3">
                <div class="flex rounded-2xl overflow-hidden border ${isDark() ? 'border-white/10' : 'border-slate-200'}">

            ${renderStatCard('Inventory', state.inventory.filter(function(item) { return item.Status === 'Active'; }).length, 'activity')}
            ${renderStatCard('Mode', state.dashboardTab === 'attendance' ? 'Attendance' : 'Supplies', state.dashboardTab === 'attendance' ? 'users' : 'settings')}
          </div>

          ${branchSections}
        </section>
      `;
    }

    function buildAttendanceMatrix(daysArray) {
      const dict = {};
      const grouped = {};

      state.branches.forEach(function(branch) {
        grouped[branch] = [];
      });

      state.dashboardStudents.forEach(function(item) {
        const date = normalizeDate(item.Date);
        const key = [
          item.Branch,
          date,
          item['Jam/Section'],
          item.Level,
          item['Trainer Name']
        ].join('|');

        dict[key] = item['Murid Hadir'];
      });

      state.classes
        .filter(function(item) { return item.Status === 'Active'; })
        .forEach(function(item) {
          if (!grouped[item.Branch]) grouped[item.Branch] = [];

          const rowDays = daysArray.map(function(day) {
            const date = state.dashboardYear + '-' + String(state.dashboardMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
            const key = [
              item.Branch,
              date,
              item['Jam/Section'],
              item.Level,
              item['Trainer Name']
            ].join('|');

            return {
              day: day,
              value: dict[key] !== undefined ? dict[key] : '-'
            };
          });

          const total = rowDays.reduce(function(sum, day) {
            return sum + (day.value !== '-' ? Number(day.value || 0) : 0);
          }, 0);

          grouped[item.Branch].push(Object.assign({}, item, {
            rowDays: rowDays,
            total: total
          }));
        });

      return grouped;
    }

    function buildSuppliesMatrix(daysArray) {
      const dict = {};
      const grouped = {};

      state.branches.forEach(function(branch) {
        grouped[branch] = [];
      });

      state.dashboardSupplies.forEach(function(item) {
        const date = normalizeDate(item.Date);
        const key = [
          item.Branch,
          date,
          item['Jam/Section'],
          item.Level,
          item['Trainer Name']
        ].join('|');

        dict[key] = {
          paper: item['Paper Used'],
          printing: item['Printing Used']
        };
      });

      state.inventory
        .filter(function(item) { return item.Status === 'Active'; })
        .forEach(function(item) {
          if (!grouped[item.Branch]) grouped[item.Branch] = [];

          const rowDays = daysArray.map(function(day) {
            const date = state.dashboardYear + '-' + String(state.dashboardMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
            const key = [
              item.Branch,
              date,
              item['Jam/Section'],
              item.Level,
              item['Trainer Name']
            ].join('|');

            const value = dict[key];

            return {
              day: day,
              label: value ? (value.paper || 0) + '/' + (value.printing || 0) : '-',
              total: value ? Number(value.paper || 0) + Number(value.printing || 0) : 0
            };
          });

          const totalPaper = rowDays.reduce(function(sum, day) {
            return sum + (day.label !== '-' ? Number(String(day.label).split('/')[0] || 0) : 0);
          }, 0);

          const totalPrinting = rowDays.reduce(function(sum, day) {
            return sum + (day.label !== '-' ? Number(String(day.label).split('/')[1] || 0) : 0);
          }, 0);

          grouped[item.Branch].push(Object.assign({}, item, {
            rowDays: rowDays,
            totalPaper: totalPaper,
            totalPrinting: totalPrinting
          }));
        });

      return grouped;
    }

    function renderBranchMatrix(branch, data, daysArray) {
      let dayHeaders = '';

      daysArray.forEach(function(day) {
        const weekend = isWeekend(day);
        dayHeaders += `<th class="py-3 px-2 text-center min-w-[45px] ${weekend ? 'text-red-400' : ''}">${day}</th>`;
      });

      let rows = '';

      data.forEach(function(row) {
        let cells = '';

        row.rowDays.forEach(function(day) {
          cells += `
            <td class="py-2 px-1 text-center border-l ${isDark() ? 'border-white/5' : 'border-slate-100'}">
              ${
                state.dashboardTab === 'attendance'
                  ? `<span class="${getAttendanceColor(day.value)}">${esc(day.value)}</span>`
                  : `<span class="${getSupplyColor(day.total, day.label)}">${esc(day.label)}</span>`
              }
            </td>
          `;
        });

        rows += `
          <tr class="${isDark() ? 'border-b border-white/5 hover:bg-white/5' : 'border-b border-slate-200 hover:bg-slate-50'}">
            <td class="sticky left-0 z-10 py-3 px-4 shadow-[1px_0_0_0_rgba(255,255,255,0.05)] ${isDark() ? 'bg-[#0b1120]' : 'bg-white'}">
              <p class="font-black">${esc(row['Trainer Name'])}</p>
              <p class="opacity-60 text-[10px]">${esc(row['Jam/Section'])} • ${esc(row.Level)}</p>
            </td>

            ${cells}

            <td class="py-3 px-3 text-center font-black bg-blue-500/10 text-blue-500">
              ${state.dashboardTab === 'attendance' ? esc(row.total) : esc(row.totalPaper + '/' + row.totalPrinting)}
            </td>
          </tr>
        `;
      });

      return `
        <div class="${cardClass()} rounded-3xl p-5 sm:p-6 overflow-hidden">
          <div class="flex items-center gap-2 mb-4">
            <span class="w-3 h-3 rounded-full bg-blue-500"></span>
            <h3 class="text-lg font-black tracking-wide uppercase">${esc(branch)}</h3>
          </div>

          <div class="max-h-[50vh] overflow-auto custom-scroll border ${isDark() ? 'border-white/5' : 'border-slate-200'} rounded-2xl">
            <table class="w-full min-w-[1200px] text-xs">
              <thead class="${isDark() ? 'sticky top-0 z-10 bg-slate-900/95 backdrop-blur-xl border-b border-white/10' : 'sticky top-0 z-10 bg-slate-100/95 backdrop-blur-xl border-b border-slate-200'}">
                <tr>
                  <th class="sticky left-0 z-20 py-3 px-4 text-left min-w-[200px] bg-inherit shadow-[1px_0_0_0_rgba(255,255,255,0.05)]">
                    Class / Item Info
                  </th>
                  ${dayHeaders}
                  <th class="py-3 px-3 text-center font-black">Total</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function isWeekend(day) {
      const date = new Date(state.dashboardYear, state.dashboardMonth - 1, day);
      const dayNumber = date.getDay();
      return dayNumber === 0 || dayNumber === 6;
    }

            <div>
              <p class="${mutedClass()}">${esc(label)}</p>
              <h3 class="text-2xl sm:text-3xl font-black mt-1">${esc(value)}</h3>
            </div>
            <div class="${isDark() ? 'w-11 h-11 rounded-2xl bg-white/10 flex items-center justify-center' : 'w-11 h-11 rounded-2xl bg-slate-950/5 flex items-center justify-center'}">
              ${icon(iconName, 'w-5 h-5')}
            </div>
          </div>
        </div>
      `;
    }

    function renderStatusText(status) {
      return status === 'Active'
        ? '<span class="text-emerald-500 font-bold">Active</span>'
        : '<span class="text-red-500 font-bold">' + esc(status || 'Inactive') + '</span>';
    }

    function renderEmptyState(text) {
      return `
        <div class="${softBoxClass()} rounded-3xl p-8 text-center">
          <div class="mx-auto w-14 h-14 rounded-3xl flex items-center justify-center mb-4 bg-slate-500/10">
            ${icon('empty', 'w-7 h-7 opacity-60')}
          </div>
          <p class="${mutedClass()}">${esc(text)}</p>
        </div>
      `;
    }

    function renderInfoBox(label, value) {
      return `
        <div class="${softBoxClass()} rounded-2xl p-4">
          <p class="${mutedClass()}">${esc(label)}</p>
          <p class="font-black mt-1 break-all">${value ? esc(value) : '-'}</p>
        </div>
      `;
    }

    function renderToast() {
      if (!state.toast) return '';

      const cls = state.toast.type === 'success'
        ? 'bg-emerald-500 text-white'
        : 'bg-red-500 text-white';

      return `
        <div class="fixed top-6 right-6 z-50 toast-in">
          <div class="px-5 py-3 rounded-2xl font-bold shadow-xl ${cls}">
            ${esc(state.toast.text)}
          </div>
        </div>
      `;
    }

    function renderConfirmDialog() {
      if (!state.confirmDialog) return '';

      const dialog = state.confirmDialog;
      const confirmClass = dialog.tone === 'danger'
        ? 'bg-red-500 text-white hover:bg-red-600'
        : dialog.tone === 'neutral'
          ? (isDark() ? 'bg-white text-slate-950 hover:bg-slate-200' : 'bg-slate-950 text-white hover:bg-slate-800')
          : 'bg-emerald-500 text-white hover:bg-emerald-600';

      return `
        <div class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/50 backdrop-blur-sm">
          <div class="${cardClass()} w-full max-w-sm rounded-3xl p-6 modal-pop text-center">
            <h3 class="text-xl font-black mb-2">${esc(dialog.title)}</h3>
            <p class="opacity-70 mb-6 text-sm">${esc(dialog.message)}</p>
            <div class="flex gap-3">
              <button data-action="close-confirm" class="${secondaryButtonClass()} flex-1">${esc(dialog.cancelText)}</button>
              <button data-action="run-confirm" class="h-11 px-5 rounded-2xl font-black flex-1 ${confirmClass}">
                ${esc(dialog.confirmText)}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderBackgroundGlow() {
      return `
        <div class="fixed inset-0 pointer-events-none overflow-hidden">
          <div class="absolute -top-24 -left-24 w-96 h-96 rounded-full blur-3xl ${isDark() ? 'bg-blue-500/10' : 'bg-blue-300/20'}"></div>
          <div class="absolute top-1/3 -right-24 w-96 h-96 rounded-full blur-3xl ${isDark() ? 'bg-purple-500/10' : 'bg-purple-300/20'}"></div>
        </div>
      `;
    }

    function defaultTaskForm() {
      return {
        shift: 'General',
        taskName: '',
        description: '',
        sortOrder: '0',
        status: 'Active'
      };
    }

    function defaultUserForm() {
      return {
        username: '',
        password: '',
        role: 'Team Leader',
        branch: 'Pontianak',
        status: 'Active'
      };
    }

    function showToast(type, text) {
      state.toast = { type: type, text: text };
      render();

      setTimeout(function() {
        state.toast = null;
        render();
      }, 3200);
    }

    function showSuccess(text) {
      showToast('success', text);
    }

    function showError(text) {
      showToast('error', text);
    }

    function openConfirm(config) {
      state.confirmAction = config.onConfirm;
      state.confirmDialog = {
        title: config.title || 'Are you sure?',
        message: config.message || 'This action needs confirmation.',
        confirmText: config.confirmText || 'Confirm',
        cancelText: config.cancelText || 'Cancel',
        tone: config.tone || 'danger'
      };
      render();
    }

    function closeConfirm() {
      state.confirmDialog = null;
      state.confirmAction = null;
      render();
    }

    async function boot() {
      state.loading = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);

        if (!token) {
          redirectToLogin();
          return;
        }

        const sessionResponse = await apiCall('getUserSession', { token });

        if (!sessionResponse || !sessionResponse.success) {
          safeRemove(SESSION_KEY);
          redirectToLogin();
          return;
        }

        if (!sessionResponse.user || sessionResponse.user.role !== 'Management') {
          state.accessError = 'Akses ditolak. Halaman ini hanya untuk Management.';
          state.loading = false;
          render();
          return;
        }

        state.user = sessionResponse.user;

        const branchRes = await apiCall('getManagementBranches', { token });
        const classRes = await apiCall('getClassDetails', { token });
        const inventoryRes = await apiCall('getInventoryDetails', { token });

        if (branchRes && branchRes.success) state.branches = branchRes.data || [];
        if (classRes && classRes.success) state.classes = classRes.data || [];
        if (inventoryRes && inventoryRes.success) state.inventory = inventoryRes.data || [];

        if (!state.userForm.branch) {
          state.userForm.branch = state.branches[0] || 'Pontianak';
        }

        await loadDashboardMatrices(token, state.dashboardMonth, state.dashboardYear, false);

      } catch (error) {
        console.error(error);
        state.accessError = error && error.message ? error.message : 'Gagal memuat Management Dashboard.';
      } finally {
        state.loading = false;
        render();
      }
    }

    async function loadDashboardMatrices(tokenParam, month, year, shouldRender) {
      const token = tokenParam || safeGet(SESSION_KEY);
      const filters = { month: month, year: year };

      try {
        const studentsRes = await apiCall('getManagementStudents', {
          token,
          filters: JSON.stringify(filters)
        });

        const suppliesRes = await apiCall('getManagementSupplies', {
          token,
          filters: JSON.stringify(filters)
        });

        if (studentsRes && studentsRes.success) state.dashboardStudents = studentsRes.data || [];
        if (suppliesRes && suppliesRes.success) state.dashboardSupplies = suppliesRes.data || [];

      } catch (error) {
        showError('Gagal memuat data matriks dashboard.');
      }

      if (shouldRender !== false) render();
    }

    async function loadTrackerData() {
      state.trackerLoading = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('getManagementActivityTracker', {
          token,
          date: state.trackerDate
        });

        if (response && response.success) {
          state.trackerData = response.data || [];
        } else {
          showError(response && response.message ? response.message : 'Gagal memuat data tracker.');
        }

      } catch (error) {
        showError('Error saat menghubungi tracker.');
      } finally {
        state.trackerLoading = false;
        render();
      }
    }

    async function loadUsers(shouldRender) {
      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('getAuthUsers', { token });

        if (response && response.success) {
          state.users = response.data || [];
        } else {
          showError(response && response.message ? response.message : 'Gagal memuat users.');
        }
      } catch (error) {
        showError('Gagal memuat users.');
      }

      if (shouldRender !== false) render();
    }

    async function loadTasks(shouldRender) {
      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('getTeamLeaderActivityTasks', {
          token,
          filters: JSON.stringify({ includeInactive: true })
        });

        if (response && response.success) {
          state.tasks = response.data || [];
        } else {
          showError(response && response.message ? response.message : 'Gagal memuat tasks.');
        }
      } catch (error) {
        showError('Gagal memuat tasks.');
      }

      if (shouldRender !== false) render();
    }

    async function handleLogout() {
      closeConfirm();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('logoutUser', { token });

        safeRemove(SESSION_KEY);

        if (response && response.redirectUrl) {
          window.location.href = response.redirectUrl;
          return;
        }
      } catch (error) {
        safeRemove(SESSION_KEY);
      }

      redirectToLogin();
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      safeSet(THEME_KEY, state.theme);
      render();
    }

    async function changeMenu(menu) {
      state.activeMenu = menu;
      render();

      if (menu === 'dashboard') {
        await loadDashboardMatrices(null, state.dashboardMonth, state.dashboardYear, true);
      }

      if (menu === 'users') {
        await loadUsers(true);
      }

      if (menu === 'tasks') {
        await loadTasks(true);
      }
    }

    async function changeDashboardMonth(value) {
      state.dashboardMonth = Number(value);
      render();
      await loadDashboardMatrices(null, state.dashboardMonth, state.dashboardYear, true);
    }

    async function changeDashboardYear(value) {
      state.dashboardYear = Number(value);
      render();
      await loadDashboardMatrices(null, state.dashboardMonth, state.dashboardYear, true);
    }

    function openTaskModal(index) {
      if (index === null || index === undefined) {
        state.taskEditItem = null;
        state.taskForm = defaultTaskForm();
      } else {
        const item = state.tasks[index];
        if (!item) return;

        state.taskEditItem = item;
        state.taskForm = {
          shift: item.Shift || 'General',
          taskName: item['Task Name'] || '',
          description: item.Description || '',
          sortOrder: item['Sort Order'] || '0',
          status: item.Status || 'Active'
        };
      }

      state.taskModalOpen = true;
      render();
    }

    async function saveTask(event) {
      event.preventDefault();

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const payload = Object.assign({}, state.taskForm);

        const response = state.taskEditItem
          ? await apiCall('updateTeamLeaderActivityTask', {
              token,
              id: state.taskEditItem.ID,
              payload: JSON.stringify(payload)
            })
          : await apiCall('createTeamLeaderActivityTask', {
              token,
              payload: JSON.stringify(payload)
            });

        if (response && response.success) {
          state.taskModalOpen = false;
          state.taskEditItem = null;
          await loadTasks(false);
          showSuccess(response.message || 'Task berhasil disimpan.');
        } else {
          showError(response && response.message ? response.message : 'Gagal menyimpan task.');
        }

      } catch (error) {
        showError('Gagal menyimpan task.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function requestDisableTask(id) {
      openConfirm({
        title: 'Disable Task?',
        message: 'Task ini akan dinonaktifkan dan tidak muncul sebagai task aktif.',
        confirmText: 'Disable',
        tone: 'danger',
        onConfirm: function() {
          disableTask(id);
        }
      });
    }

    async function disableTask(id) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('deleteTeamLeaderActivityTask', {
          token,
          id
        });

        if (response && response.success) {
          await loadTasks(false);
          showSuccess(response.message || 'Task berhasil dinonaktifkan.');
        } else {
          showError(response && response.message ? response.message : 'Gagal disable task.');
        }

      } catch (error) {
        showError('Gagal disable task.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function openUserModal(index) {
      if (index === null || index === undefined) {
        state.userEditItem = null;
        state.userForm = defaultUserForm();
        state.userForm.branch = state.branches[0] || 'Pontianak';
      } else {
        const item = state.users[index];
        if (!item) return;

        state.userEditItem = item;
        state.userForm = {
          username: item.Username || '',
          password: item.Password || '',
          role: item.Role || 'Team Leader',
          branch: item.Branch || '',
          status: item.Status || 'Active'
        };
      }

      state.userModalOpen = true;
      render();
    }

    async function saveUser(event) {
      event.preventDefault();

      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const payload = Object.assign({}, state.userForm);

        const response = state.userEditItem
          ? await apiCall('updateAuthUser', {
              token,
              username: state.userEditItem.Username,
              payload: JSON.stringify(payload)
            })
          : await apiCall('createAuthUser', {
              token,
              payload: JSON.stringify(payload)
            });

        if (response && response.success) {
          state.userModalOpen = false;
          state.userEditItem = null;
          await loadUsers(false);
          showSuccess(response.message || 'User berhasil disimpan.');
        } else {
          showError(response && response.message ? response.message : 'Gagal menyimpan user.');
        }

      } catch (error) {
        showError('Gagal menyimpan user.');
      } finally {
        state.saving = false;
        render();
      }
    }

    function requestDeleteUser(username) {
      openConfirm({
        title: 'Delete User?',
        message: 'User ini akan dihapus dari Auth. Aksi ini tidak bisa dibatalkan.',
        confirmText: 'Delete',
        tone: 'danger',
        onConfirm: function() {
          deleteUser(username);
        }
      });
    }

    async function deleteUser(username) {
      closeConfirm();
      state.saving = true;
      render();

      try {
        const token = safeGet(SESSION_KEY);
        const response = await apiCall('deleteAuthUser', {
          token,
          username
        });

        if (response && response.success) {
          await loadUsers(false);
          showSuccess(response.message || 'User berhasil dihapus.');
        } else {
          showError(response && response.message ? response.message : 'Gagal menghapus user.');
        }

      } catch (error) {
        showError('Gagal menghapus user.');
      } finally {
        state.saving = false;
        render();
      }
    }

    root.addEventListener('click', function(event) {
      const target = event.target.closest('button, [data-action], [data-menu], [data-dashboard-tab], [data-task-tab], [data-edit-task], [data-disable-task], [data-edit-user], [data-delete-user]');
      if (!target) return;

      const action = target.getAttribute('data-action');

      if (target.hasAttribute('data-menu')) {
        changeMenu(target.getAttribute('data-menu'));
        return;
      }

      if (target.hasAttribute('data-dashboard-tab')) {
        state.dashboardTab = target.getAttribute('data-dashboard-tab');
        render();
        return;
      }

      if (target.hasAttribute('data-task-tab')) {
        state.taskTab = target.getAttribute('data-task-tab');
        render();
        return;
      }

      if (target.hasAttribute('data-edit-task')) {
        openTaskModal(Number(target.getAttribute('data-edit-task')));
        return;
      }

      if (target.hasAttribute('data-disable-task')) {
        requestDisableTask(target.getAttribute('data-disable-task'));
        return;
      }

      if (target.hasAttribute('data-edit-user')) {
        openUserModal(Number(target.getAttribute('data-edit-user')));
        return;
      }

      if (target.hasAttribute('data-delete-user')) {
        requestDeleteUser(target.getAttribute('data-delete-user'));
        return;
      }

      if (action === 'go-login') redirectToLogin();
      if (action === 'toggle-theme') toggleTheme();

      if (action === 'confirm-logout') {
        openConfirm({
          title: 'Logout?',
          message: 'Session kamu akan diakhiri dan kamu akan kembali ke halaman login.',
          confirmText: 'Logout',
          cancelText: 'Cancel',
          tone: 'neutral',
          onConfirm: handleLogout
        });
      }

      if (action === 'close-confirm') closeConfirm();
      if (action === 'run-confirm' && typeof state.confirmAction === 'function') state.confirmAction();

      if (action === 'load-tracker') loadTrackerData();

      if (action === 'add-task') openTaskModal();
      if (action === 'close-task-modal') {
        state.taskModalOpen = false;
        state.taskEditItem = null;
        render();
      }

      if (action === 'add-user') openUserModal();
      if (action === 'close-user-modal') {
        state.userModalOpen = false;
        state.userEditItem = null;
        render();
      }
    });

    root.addEventListener('input', function(event) {
      const target = event.target;

      if (target.hasAttribute('data-tracker-date')) {
        state.trackerDate = target.value;
        return;
      }

      if (target.hasAttribute('data-task-field')) {
        state.taskForm[target.getAttribute('data-task-field')] = target.value;
        return;
      }

      if (target.hasAttribute('data-user-field')) {
        const key = target.getAttribute('data-user-field');
        state.userForm[key] = target.value;

        if (key === 'role') render();
        return;
      }
    });

    root.addEventListener('change', function(event) {
      const target = event.target;
      const change = target.getAttribute('data-change');

      if (change === 'dashboard-month') {
        changeDashboardMonth(target.value);
        return;
      }

      if (change === 'dashboard-year') {
        changeDashboardYear(target.value);
        return;
      }

      if (target.hasAttribute('data-task-field')) {
        state.taskForm[target.getAttribute('data-task-field')] = target.value;
        return;
      }

      if (target.hasAttribute('data-user-field')) {
        const key = target.getAttribute('data-user-field');
        state.userForm[key] = target.value;

        if (key === 'role') render();
      }
    });

    root.addEventListener('submit', function(event) {
      const form = event.target;

      if (form.getAttribute('data-form') === 'task') {
        saveTask(event);
        return;
      }

      if (form.getAttribute('data-form') === 'user') {
        saveUser(event);
        return;
      }
    });

    render();
    boot();
  </script>
</body>
</html>
